# This workflow runs the repo's own Tools/ check scripts (compile, format, docs-drift, EditMode
# tests), which boot a locally-installed Unity 6000.4.5f1 in batch mode — so it requires a
# self-hosted macOS runner with Unity installed and licensed. None is configured yet, so the whole
# workflow is commented out to avoid runs queueing indefinitely against a non-existent runner.
#
# TO RE-ENABLE: register a self-hosted macOS runner (repo Settings > Actions > Runners), then
# uncomment everything below. The runner auto-gets the `self-hosted` and `macOS` labels this job
# requires. The first run does a one-time cold asset import (~minutes); later runs reuse Library/.
# (Alternative for GitHub-hosted runners: switch the job to game-ci with UNITY_LICENSE secrets —
# but that bypasses these scripts, so the self-hosted route keeps CI and local checks identical.)
