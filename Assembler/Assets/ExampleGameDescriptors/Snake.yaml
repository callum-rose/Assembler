Game:
  Title: Snake
  Description: >
    Classic Snake. Use WASD to change direction. The snake moves one step every
    interval. Eat food to grow and score points. Hit a wall or yourself and it's
    game over. Reach 10 points to win.

World:
  Dimensionality: 2
  BackgroundColor: "#000000"

Physics:
  Gravity: !vec { X: 0, Y: 0 }

Constants:
  # Scoring
  initial score: 0
  score per food: 1
  score to win: 10

  # Grid / movement
  cell size: 0.6
  step interval: 0.15

  # Directions (one cell per step)
  dir up: !vec { X: 0, Y: 0.6 }
  dir down: !vec { X: 0, Y: -0.6 }
  dir left: !vec { X: -0.6, Y: 0 }
  dir right: !vec { X: 0.6, Y: 0 }

  # Starting state
  head start position: !vec { X: 0, Y: 0 }
  initial direction: !vec { X: 0.6, Y: 0 }

  # Sizes
  head size: !vec { X: 0.55, Y: 0.55 }
  segment size: !vec { X: 0.55, Y: 0.55 }
  food size: !vec { X: 0.5, Y: 0.5 }
  horizontal wall size: !vec { X: 15.6, Y: 0.6 }
  vertical wall size: !vec { X: 0.6, Y: 15.6 }

  # Wall positions
  top wall position: !vec { X: 0, Y: 7.5 }
  bottom wall position: !vec { X: 0, Y: -7.5 }
  left wall position: !vec { X: -7.5, Y: 0 }
  right wall position: !vec { X: 7.5, Y: 0 }

  # Offscreen dump
  food offscreen: !vec { X: 999, Y: 999 }

  # Camera
  camera position: !vec { X: 0, Y: 0, Z: -10 }
  camera rotation: !vec { X: 0, Y: 0, Z: 0 }

Variables:
  score: !const initial score
  direction: !const initial direction
  is dead: false

Expressions:
  int add:
    ArgumentTypes: [ int, int ]
    ArgumentNames: [ a, b ]
    ReturnType: int
    Expression: "a + b;"

  int greater or equal:
    ArgumentTypes: [ int, int ]
    ArgumentNames: [ a, b ]
    ReturnType: bool
    Expression: "a >= b;"

  is game over:
    ArgumentTypes: [ int, int, bool ]
    ArgumentNames: [ score, target, dead ]
    ReturnType: bool
    Expression: "score >= target || dead;"

  # Returns a random food position snapped to the cell grid, within the arena bounds
  next food position:
    ReturnType: vector
    Expression: >
      float halfArena = 6.6f;
      float cell = 0.6f;
      float x = UnityEngine.Mathf.Round(UnityEngine.Random.Range(-halfArena, halfArena) / cell) * cell;
      float y = UnityEngine.Mathf.Round(UnityEngine.Random.Range(-halfArena, halfArena) / cell) * cell;
      return new UnityEngine.Vector3(x, y, 0f);

  vec add:
    ArgumentTypes: [ vector, vector ]
    ArgumentNames: [ a, b ]
    ReturnType: vector
    Expression: "new UnityEngine.Vector3(a.x + b.x, a.y + b.y, a.z + b.z);"

Templates:
  h_wall_template:
    Tags:
      - wall
    Behaviours:
      box collider:
        Type: box collider
        Properties:
          Size: !const horizontal wall size
          IsTrigger: false

  v_wall_template:
    Tags:
      - wall
    Behaviours:
      box collider:
        Type: box collider
        Properties:
          Size: !const vertical wall size
          IsTrigger: false

  # Body segment — spawned at the head's position each step.
  # Has a timer trigger that destroys it after a delay, creating
  # the tail effect.
  segment_template:
    Tags:
      - segment
    Behaviours:
      box collider:
        Type: box collider
        Properties:
          Size: !const segment size
          IsTrigger: true
      lifetime timer:
        Type: timer trigger
        Properties:
          Delay: 0.75
        Listeners:
          - EntityId: !parameter self_id
            BehaviourId: self destruct
      self destruct:
        Type: destroy

  # Food — hides itself on contact, advances food index, spawns next food
  food_template:
    Tags:
      - food
    Behaviours:
      box collider:
        Type: box collider
        Properties:
          Size: !const food size
          IsTrigger: true
      eaten trigger:
        Type: trigger enter trigger
        Properties:
          TagsToDetect:
            - head
        Listeners:
          - EntityId: !parameter self_id
            BehaviourId: hide self
          - EntityId: food manager
            BehaviourId: spawn next food
          - EntityId: score tracker
            BehaviourId: increment score
      hide self:
        Type: position setter
        Properties:
          Position: !const food offscreen

Entities:
  # --- Walls ---
  top wall:
    Template: { Id: h_wall_template }
    Position: !const top wall position

  bottom wall:
    Template: { Id: h_wall_template }
    Position: !const bottom wall position

  left wall:
    Template: { Id: v_wall_template }
    Position: !const left wall position

  right wall:
    Template: { Id: v_wall_template }
    Position: !const right wall position

  # --- Snake Head ---
  snake head:
    Tags:
      - head
    Position: !const head start position
    Behaviours:
      box collider:
        Type: box collider
        Properties:
          Size: !const head size
          IsTrigger: false

      rigidbody:
        Type: rigidbody
        Properties:
          UseGravity: false

      # Stepped movement: fires every interval
      step timer:
        Type: interval trigger
        Properties:
          Interval: !const step interval
        Listeners:
          - EntityId: snake head
            BehaviourId: step move
          - EntityId: segment manager
            BehaviourId: spawn segment at head

      step move:
        Type: translate
        Properties:
          Displacement: !var direction

      # Direction input — key down (one event per press, not continuous)
      up key:
        Type: key down trigger
        Properties:
          Key: "w"
        Listeners:
          - EntityId: snake head
            BehaviourId: set dir up
      set dir up:
        Type: vector variable setter
        Properties:
          VariableId: !var direction
          Value: !const dir up

      down key:
        Type: key down trigger
        Properties:
          Key: "s"
        Listeners:
          - EntityId: snake head
            BehaviourId: set dir down
      set dir down:
        Type: vector variable setter
        Properties:
          VariableId: !var direction
          Value: !const dir down

      left key:
        Type: key down trigger
        Properties:
          Key: "a"
        Listeners:
          - EntityId: snake head
            BehaviourId: set dir left
      set dir left:
        Type: vector variable setter
        Properties:
          VariableId: !var direction
          Value: !const dir left

      right key:
        Type: key down trigger
        Properties:
          Key: "d"
        Listeners:
          - EntityId: snake head
            BehaviourId: set dir right
      set dir right:
        Type: vector variable setter
        Properties:
          VariableId: !var direction
          Value: !const dir right

      # Death triggers — wall or self collision sets is dead = true
      wall hit:
        Type: collision enter trigger
        Properties:
          TagsToDetect:
            - wall
        Listeners:
          - EntityId: game manager
            BehaviourId: set dead

      self hit:
        Type: trigger enter trigger
        Properties:
          TagsToDetect:
            - segment
        Listeners:
          - EntityId: game manager
            BehaviourId: set dead

  # --- Segment Manager ---
  segment manager:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      spawn segment at head:
        Type: spawner
        Properties:
          TemplateId: segment_template
          Position: !vec { X: 0, Y: 0 }

  # --- Score Tracker ---
  score tracker:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      increment score:
        Type: int variable setter
        Properties:
          VariableId: !var score
          Value: !expr
            ExpressionId: int add
            Arguments:
              - !var score
              - !const score per food

  # --- Food Manager ---
  food manager:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      on start:
        Type: on start trigger
        Listeners:
          - EntityId: food manager
            BehaviourId: spawn next food

      spawn next food:
        Type: spawner
        Properties:
          TemplateId: food_template
          Position: !expr
            ExpressionId: next food position

  # --- Game Manager ---
  game manager:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      set dead:
        Type: bool variable setter
        Properties:
          VariableId: !var is dead
          Value: true

      win condition gate:
        Type: condition gate
        Properties:
          Condition: !expr
            ExpressionId: int greater or equal
            Arguments:
              - !var score
              - !const score to win

  # --- Camera ---
  camera:
    Tags:
      - camera
    Position: !const camera position
    Rotation: !const camera rotation
    Behaviours:
      camera:
        Type: camera
        Properties:
          View: "orthographic"
          Size: 10

GameOverCondition: !expr
  ExpressionId: is game over
  Arguments:
    - !var score
    - !const score to win
    - !var is dead
