Game:
  Title: Game Over Demo
  Description: |
    Demonstrates the `!gameover` listener tag — an event-driven way to end and
    unload a game.

    A green player cube is moved with WASD around a field of red mines. The
    game ends the instant the player touches a mine, or when the player presses
    Q to give up.

    Both endings are wired the same way: the trigger that detects the event
    (`trigger enter trigger` for the mine, the `quit` `input action` for Q) lists
    a single `- !gameover` listener. That tag targets the framework's implicit
    end-game behaviour, which logs "Game Over" and destroys the whole game.

    The `!gameover` listeners are the only thing ending this game, satisfying
    the build-time requirement that every game have a way to end. This is the
    purely event-driven path: no flag variable, no per-frame polling. To end on
    a continuous condition instead, poll it with an every-frame trigger feeding
    a condition gate that fires `!gameover` (see Tetris, Pong, FlappyBird).

World:
  Dimensionality: 2
  BackgroundColor: "#101018"

Physics:
  Gravity: !vec { X: 0, Y: 0 }

Constants:
  player colour: !colour { R: 0.3, G: 0.85, B: 0.4, A: 1 }
  mine colour: !colour { R: 0.9, G: 0.25, B: 0.25, A: 1 }

  player size: !vec { X: 0.6, Y: 0.6, Z: 0.6 }
  mine size: !vec { X: 0.6, Y: 0.6, Z: 0.6 }

  camera position: !vec { X: 0, Y: 0, Z: -10 }
  camera view: "orthographic"
  camera size: 5

Templates:
  # A static red mine. Touching it ends the game (the player's trigger detects
  # the [mine] tag). Only needs a trigger collider so the player can overlap it.
  mine_template:
    Tags: [ mine ]
    Behaviours:
      body:
        Type: cube gizmo
        Properties:
          Size: !var mine size
          IsWire: false
          Colour: !var mine colour
      collider:
        Type: box collider
        Properties:
          Size: !var mine size
          IsTrigger: true

# Abstract input actions + the physical keys that feed them (desktop scheme).
# Entities listen to the named actions via `input action`, never to raw keys.
Controls:
  Actions:
    left:  { Type: button, Phase: hold }
    right: { Type: button, Phase: hold }
    up:    { Type: button, Phase: hold }
    down:  { Type: button, Phase: hold }
    quit:  { Type: button, Phase: down }

  Bindings:
    desktop:
      left:  [ "<Keyboard>/a" ]
      right: [ "<Keyboard>/d" ]
      up:    [ "<Keyboard>/w" ]
      down:  [ "<Keyboard>/s" ]
      quit:  [ "<Keyboard>/q" ]
    # Mobile: each on-screen button below derives its control path from here, so
    # every action needs one distinct simple path (a virtual gamepad control).
    mobile:
      left:  [ "<Gamepad>/dpad/left" ]
      right: [ "<Gamepad>/dpad/right" ]
      up:    [ "<Gamepad>/dpad/up" ]
      down:  [ "<Gamepad>/dpad/down" ]
      quit:  [ "<Gamepad>/start" ]

  # On-screen touch controls, rendered only on the Mobile platform: a d-pad cross
  # of move buttons (lower-left) and a Quit button (upper-right).
  OnScreen:
    - { Type: button, Action: up,    Label: "▲", Anchor: lower-left,  Offset: { X: 305, Y: 450 }, Size: { X: 200, Y: 200 } }
    - { Type: button, Action: down,  Label: "▼", Anchor: lower-left,  Offset: { X: 305, Y: 20 },  Size: { X: 200, Y: 200 } }
    - { Type: button, Action: left,  Label: "◀", Anchor: lower-left,  Offset: { X: 80,  Y: 235 }, Size: { X: 200, Y: 200 } }
    - { Type: button, Action: right, Label: "▶", Anchor: lower-left,  Offset: { X: 530, Y: 235 }, Size: { X: 200, Y: 200 } }
    - { Type: button, Action: quit,  Label: "Quit", Anchor: upper-right, Offset: { X: 120, Y: 120 }, Size: { X: 180, Y: 180 } }

Entities:
  player:
    Tags: [ player ]
    Position: !vec { X: -3, Y: -3, Z: 0 }
    Behaviours:
      body:
        Type: cube gizmo
        Properties:
          Size: !var player size
          IsWire: false
          Colour: !var player colour

      # Trigger collider + rigidbody so the player generates trigger-enter
      # events as it moves over a mine (same setup as FlappyBird's bird).
      collider:
        Type: box collider
        Properties:
          Size: !var player size
          IsTrigger: true
      rigidbody:
        Type: rigidbody
        Properties:
          UseGravity: false

      # --- WASD movement: each input action drives a translate while held. ---
      hold left:
        Type: input action
        Properties: { Action: left }
        Listeners:
          - EntityId: player
            BehaviourId: move left
      move left:
        Type: translate
        Properties:
          Displacement: !vec { X: -0.12, Y: 0, Z: 0 }

      hold right:
        Type: input action
        Properties: { Action: right }
        Listeners:
          - EntityId: player
            BehaviourId: move right
      move right:
        Type: translate
        Properties:
          Displacement: !vec { X: 0.12, Y: 0, Z: 0 }

      hold up:
        Type: input action
        Properties: { Action: up }
        Listeners:
          - EntityId: player
            BehaviourId: move up
      move up:
        Type: translate
        Properties:
          Displacement: !vec { X: 0, Y: 0.12, Z: 0 }

      hold down:
        Type: input action
        Properties: { Action: down }
        Listeners:
          - EntityId: player
            BehaviourId: move down
      move down:
        Type: translate
        Properties:
          Displacement: !vec { X: 0, Y: -0.12, Z: 0 }

      # --- The feature: touching a mine ends the game, event-driven. ---
      hit mine:
        Type: trigger enter trigger
        Properties:
          TagsToDetect: [ mine ]
        Listeners:
          - !gameover

      # --- The feature again: press Q to quit, the simplest possible wiring. ---
      quit key:
        Type: input action
        Properties: { Action: quit }
        Listeners:
          - !gameover

  mine a:
    Template: { Id: mine_template }
    Position: !vec { X: -2, Y: 1, Z: 0 }

  mine b:
    Template: { Id: mine_template }
    Position: !vec { X: 2, Y: -1, Z: 0 }

  mine c:
    Template: { Id: mine_template }
    Position: !vec { X: 0, Y: 2.5, Z: 0 }

  mine d:
    Template: { Id: mine_template }
    Position: !vec { X: 3, Y: 2, Z: 0 }

  hud:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      instructions:
        Type: text label
        Properties:
          Label: ""
          Text: "WASD to move - avoid the red mines - press Q to quit. Any ending fires !gameover."
          FontSize: 18
          Rect:
            Anchor: top-left
            X: 20
            Y: 20
            Width: 640
            Height: 40

  camera:
    Position: !var camera position
    Behaviours:
      camera:
        Type: camera
        Properties:
          View: !var camera view
          Size: !var camera size
