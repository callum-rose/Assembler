Game:
  Title: Spawned Bubbles Demo
  Description: |
    Demonstrates dynamic variables on *dynamically spawned* entities. A spawner
    creates a new "bubble" every second. Each bubble is spawned with a random
    `lifetime` (computed by an expression at spawn time) which is fed into the
    template as a !parameter and stored as the bubble's per-entity variable.
    The bubble's timer trigger reads `!var lifetime`, which the implicit
    self-scope resolves to *that* bubble's lifetime — so every bubble pops at
    its own time, independently. A global `bubbles popped` counter shows the
    chained lookup (local → global fallback) working in the same expression.

World:
  Dimensionality: 2
  BackgroundColor: "#1a1a2e"

Physics:
  Gravity: !vec { X: 0, Y: 0 }

Constants:
  spawn interval: 1.0
  bubble size: 0.6
  rise speed: !vec { X: 0, Y: 1.2 }
  one: 1
  bubbles to pop: 10
  camera position: !vec { X: 0, Y: 0, Z: -10 }
  camera rotation: !vec { X: 0, Y: 0, Z: 0 }
  camera view: "orthographic"
  camera size: 5

Variables:
  bubbles spawned: 0
  bubbles popped: 0

Localisation:
  DefaultLocale: en
  Locales:
    en:
      hud.stats: "Spawned: {0}   Popped: {1}"

Templates:
  bubble_template:
    Tags: [ bubble ]
    Variables:
      # Each spawned bubble owns its own `lifetime`, seeded by the
      # `life_seconds` !parameter that the spawner supplies.
      lifetime: !parameter life_seconds
    Behaviours:
      gizmo:
        Type: sphere gizmo
        Properties:
          Radius: !var bubble size
          IsWire: false
          Colour: !colour cyan
      rise:
        Type: velocity
        Properties:
          Velocity: !var rise speed
      # Delay resolves to THIS bubble's lifetime via the per-entity scope.
      pop timer:
        Type: timer trigger
        Properties:
          Delay: !var lifetime
        Listeners: [ increment pop counter, self destruct ]
      # Local `lifetime` is read here, global `bubbles popped` is written.
      increment pop counter:
        Type: int variable setter
        Properties:
          VariableId: !var bubbles popped
          Value: !expr
            Do: intAdd
            With:
              a: !var bubbles popped
              b: !var one
      self destruct:
        Type: destroy

Expressions:
  intAdd:
    ArgumentTypes: [ int, int ]
    ArgumentNames: [ a, b ]
    ReturnType: int
    Expression: "a + b;"

Controls:
  Actions:
    quit: { Type: button, Phase: down }

  Bindings:
    desktop:
      quit: [ "<Keyboard>/q" ]
    mobile:
      quit: [ "<Gamepad>/start" ]

  OnScreen:
    - { Type: button, Action: quit, Label: "Quit", Anchor: upper-right, Offset: { X: 120, Y: 120 }, Size: { X: 180, Y: 180 } }

Entities:
  controls:
    Behaviours:
      quit:
        Type: input action
        Properties: { Action: quit }
        Listeners: [ !gameover ]

  # Game-over poll: every frame the gate checks whether enough bubbles have been
  # popped; once they have, the gate fires !gameover, which ends the game.
  game over:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      tick:
        Type: every frame trigger
        Listeners: [ gate ]
      gate:
        Type: condition gate
        Properties:
          Condition: !expr
            Do: 'bubbles_popped >= bubbles_to_pop'
            With:
              bubbles_popped: !var bubbles popped
              bubbles_to_pop: !var bubbles to pop
        Listeners:
          - !gameover

  bubble spawner:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      # Every `spawn interval` seconds, spawn a new bubble.
      tick:
        Type: interval trigger
        Properties:
          Interval: !var spawn interval
        Listeners: [ increment spawn counter, spawn bubble ]
      increment spawn counter:
        Type: int variable setter
        Properties:
          VariableId: !var bubbles spawned
          Value: !expr
            Do: intAdd
            With:
              a: !var bubbles spawned
              b: !var one
      spawn bubble:
        Type: spawner
        Properties:
          TemplateId: bubble_template
          Position: !expr { Do: 'new Vector3(RandomFloat(-4f, 4f), -4.5f, 0)', RegisterTypes: [ UnityEngine.Vector3 ] }
          Parameters:
            life_seconds: !expr { Do: 'RandomFloat(1.5f, 5.0f)', ReturnType: float }

  camera:
    Tags: [ camera ]
    Position: !var camera position
    Rotation: !var camera rotation
    Behaviours:
      camera:
        Type: camera
        Properties:
          View: !var camera view
          Size: !var camera size

  # HUD: a ui canvas roots the tree; a vertical ui container auto-lays-out its
  # child label. The label's Text is re-read each frame, so the localised
  # template tracking both counters updates live.
  ui:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      canvas:
        Type: ui canvas
        Properties:
          MatchWidthOrHeight: 0.5
    Children:
      hud:
        Behaviours:
          layout:
            Type: ui container
            Properties:
              Direction: vertical
              Spacing: 12
              Padding: 24
              ChildAlignment: upper-left
              FitContent: false
        Children:
          stats:
            Behaviours:
              label:
                Type: text label
                Properties:
                  Text: !text { Key: hud.stats, Arguments: [ !var bubbles spawned, !var bubbles popped ] }
                  FontSize: 28
                  PreferredWidth: 500
                  PreferredHeight: 44
