Game:
  Title: Simple Pong Game
  Description: A basic implementation of the classic Pong game with two paddles and a ball.

World:
  Dimensionality: 2
  BackgroundColor: "#000000"

Physics:
  Gravity: !vec { X: 0, Y: 0 }

Constants:
  initial score: 0
  left paddle initial position: !vec { X: -5, Y: 0 }
  right paddle initial position: !vec { X: 5, Y: 0 }
  # Per-frame nudge applied by the hold-action -> translate paddle movement below.
  paddle move up step: !vec { X: 0, Y: 0.12 }
  paddle move down step: !vec { X: 0, Y: -0.12 }
  upper wall position: !vec { X: 0, Y: 3 }
  lower wall position: !vec { X: 0, Y: -3 }
  left goal position: !vec { X: -6, Y: 0 }
  right goal position: !vec { X: 6, Y: 0 }
  goal size: !vec { X: 0.2, Y: 6 }
  wall width: 12.2
  wall height: 0.2
  paddle height: 1.0
  paddle width: 0.2
  ball radius: 0.2
  score per goal: 1
  score to win: 5
  camera position: !vec { X: 0, Y: 0, Z: -10 }
  camera rotation: !vec { X: 0, Y: 0, Z: 0 }
  camera view: "orthographic"
  camera size: 4
  paddle bounce factor: 8

Variables:
  left score: !var initial score
  right score: !var initial score
  ball velocity: !vec { X: 3, Y: 3 }

Templates:
  paddle_template:
    Behaviours:
      gizmo:
        Type: cube gizmo
        Properties:
          Size: !vec
            X: !var paddle width
            Y: !var paddle height
          IsWire: false
          Colour: !colour red
      box collider:
        Type: box collider
        Properties:
          Size: !vec
            X: !var paddle width
            Y: !var paddle height
          IsTrigger: false
      up action:
        Type: input action
        Properties:
          Action: !parameter up_action
        Listeners:
          - EntityId: !parameter self_id
            BehaviourId: move up
      move up:
        Type: translate
        Properties:
          # The action fires every frame it is held (key-hold semantics); each fire
          # nudges the paddle by this step. A `velocity` behaviour ignores Execute, so
          # targeting one from a trigger is a no-op and now a build error (issue #201).
          Displacement: !var paddle move up step
      down action:
        Type: input action
        Properties:
          Action: !parameter down_action
        Listeners:
          - EntityId: !parameter self_id
            BehaviourId: move down
      move down:
        Type: translate
        Properties:
          Displacement: !var paddle move down step

  wall_template:
    Tags: [ wall ]
    Behaviours:
      gizmo:
        Type: cube gizmo
        Properties:
          Size: !vec
            X: !var wall width
            Y: !var wall height
          IsWire: false
          Colour: !colour white
      box collider:
        Type: box collider
        Properties:
          Size: !vec
            X: !var wall width
            Y: !var wall height

  goal_template:
    Tags: [ goal ]
    Behaviours:
      box collider:
        Type: box collider
        Properties:
          Size: !var goal size
          IsTrigger: true
      goal trigger:
        Type: trigger enter trigger
        Properties:
          TagsToDetect: [ ball ]
        Listeners:
          - EntityId: !parameter self_id
            BehaviourId: score incrementer
      score incrementer:
        Type: int variable setter
        Properties:
          VariableId: !parameter score_var
          Value: !expr
            Do: 'current_score + increment'
            ArgumentTypes: [ int, int ]
            With:
              current_score: !parameter score_var
              increment: !var score per goal

  ball_template:
    Tags: [ ball ]
    Behaviours:
      gizmo:
        Type: sphere gizmo
        Properties:
          Radius: !var ball radius
          IsWire: false
          Colour: !colour blue
      sphere collider:
        Type: sphere collider
        Properties:
          Radius: !var ball radius
      rigidbody:
        Type: rigidbody
        Properties:
          UseGravity: false
      velocity:
        Type: velocity
        Properties:
          Velocity: !var ball velocity
      paddle collision trigger:
        Type: collision enter trigger
        Properties:
          TagsToDetect:
            - left paddle
            - right paddle
        Listeners:
          - EntityId: !parameter self_id
            BehaviourId: paddle bounce velocity setter
            Outputs:
              contact_point: hit_point
              other_position: paddle_position
      paddle bounce velocity setter:
        Type: vector variable setter
        Properties:
          VariableId: !var ball velocity
          Value: !expr
            Do: paddle bounce
            With:
              ball_vel: !var ball velocity
              hit_point: !output hit_point
              paddle_pos: !output paddle_position
              factor: !var paddle bounce factor
      wall collision trigger:
        Type: collision enter trigger
        Properties:
          TagsToDetect:
            - wall
        Listeners:
          - EntityId: !parameter self_id
            BehaviourId: wall bounce velocity setter
      wall bounce velocity setter:
        Type: vector variable setter
        Properties:
          VariableId: !var ball velocity
          Value: !expr
            Do: 'new UnityEngine.Vector3(velocity.x * flip.x, velocity.y * flip.y, velocity.z * flip.z)'
            With:
              velocity: !var ball velocity
              flip: !vec { X: 1, Y: -1 }
      goal detector:
        Type: trigger enter trigger
        Properties:
          TagsToDetect:
            - goal
        Listeners:
          - EntityId: !parameter self_id
            BehaviourId: self destructor
          - EntityId: ball spawner
            BehaviourId: spawn ball
      self destructor:
        Type: destroy

Controls:
  Actions:
    move-left-up:    { Type: button, Phase: hold }
    move-left-down:  { Type: button, Phase: hold }
    move-right-up:   { Type: button, Phase: hold }
    move-right-down: { Type: button, Phase: hold }

  Bindings:
    desktop:
      move-left-up:    [ "<Keyboard>/w" ]
      move-left-down:  [ "<Keyboard>/s" ]
      move-right-up:   [ "<Keyboard>/upArrow" ]
      move-right-down: [ "<Keyboard>/downArrow" ]
    gamepad:
      move-left-up:    [ "<Gamepad>/leftStick/up" ]
      move-left-down:  [ "<Gamepad>/leftStick/down" ]
      move-right-up:   [ "<Gamepad>/rightStick/up" ]
      move-right-down: [ "<Gamepad>/rightStick/down" ]
    # Mobile scheme: each on-screen button derives its control path from here.
    # Four distinct simple button paths so the four hold-buttons are independent.
    mobile:
      move-left-up:    [ "<Gamepad>/dpad/up" ]
      move-left-down:  [ "<Gamepad>/dpad/down" ]
      move-right-up:   [ "<Gamepad>/buttonNorth" ]
      move-right-down: [ "<Gamepad>/buttonSouth" ]

  # On-screen touch buttons, rendered only when the active platform is Mobile:
  # left paddle up/down on the left edge, right paddle up/down on the right edge.
  OnScreen:
    - Type: button
      Action: move-left-up
      Label: "P1 ▲"
      Anchor: lower-left
      Offset: { X: 200, Y: 540 }
      Size:   { X: 220, Y: 220 }
    - Type: button
      Action: move-left-down
      Label: "P1 ▼"
      Anchor: lower-left
      Offset: { X: 200, Y: 200 }
      Size:   { X: 220, Y: 220 }
    - Type: button
      Action: move-right-up
      Label: "P2 ▲"
      Anchor: lower-right
      Offset: { X: 200, Y: 540 }
      Size:   { X: 220, Y: 220 }
    - Type: button
      Action: move-right-down
      Label: "P2 ▼"
      Anchor: lower-right
      Offset: { X: 200, Y: 200 }
      Size:   { X: 220, Y: 220 }

Expressions:
  paddle bounce:
    ArgumentTypes: [ vector, vector, vector, float ]
    ArgumentNames: [ ball_vel, hit_point, paddle_pos, factor ]
    ReturnType: vector
    Expression: "var speed = Magnitude(ball_vel);
      var dir = new UnityEngine.Vector3(-ball_vel.x, (hit_point.y - paddle_pos.y) * factor, 0f);
      ScaleVector(Normalize(dir), speed);"
  int greater or equal:
    ArgumentTypes: [ int, int ]
    ArgumentNames: [ a, b ]
    ReturnType: bool
    Expression: "a >= b;"
Entities:
  # Game-over poll: every frame the gate checks the end condition; when it
  # holds, the gate fires !gameover, which ends and unloads the game.
  game over:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      tick:
        Type: every frame trigger
        Listeners:
          - EntityId: game over
            BehaviourId: gate
      gate:
        Type: condition gate
        Properties:
          Condition: !expr
            Do: 'left >= target || right >= target'
            With:
              left: !var left score
              right: !var right score
              target: !var score to win
        Listeners:
          - !gameover

  left paddle:
    Template:
      Id: paddle_template
      Parameters:
        up_action: move-left-up
        down_action: move-left-down
    Tags: [ left paddle ]
    Position: !var left paddle initial position
  right paddle:
    Template:
      Id: paddle_template
      Parameters:
        up_action: move-right-up
        down_action: move-right-down
    Tags: [ right paddle ]
    Position: !var right paddle initial position
  upper wall:
    Template: { Id: wall_template }
    Position: !var upper wall position
  lower wall:
    Template: { Id: wall_template }
    Position: !var lower wall position
  left goal:
    Template:
      Id: goal_template
      Parameters:
        score_var: !var right score
    Position: !var left goal position
  right goal:
    Template:
      Id: goal_template
      Parameters:
        score_var: !var left score
    Position: !var right goal position
  camera:
    Tags:
      - camera
    Position: !var camera position
    Rotation: !var camera rotation
    Behaviours:
      camera:
        Type: camera
        Properties:
          View: !var camera view
          Size: !var camera size
  win condition checker:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      left score win condition gate:
        Type: condition gate
        Properties:
          Condition: !expr
            Do: int greater or equal
            With:
              a: !var left score
              b: !var score to win
      right score win condition gate:
        Type: condition gate
        Properties:
          Condition: !expr
            Do: int greater or equal
            With:
              a: !var right score
              b: !var score to win
  ball spawner:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      initial spawn trigger:
        Type: on start trigger
        Listeners:
          - EntityId: ball spawner
            BehaviourId: spawn ball
      spawn ball:
        Type: spawner
        Properties:
          TemplateId: ball_template
          Position: !expr { Do: 'new Vector3(0, RandomFloat(-2f, 2f), 0)', RegisterTypes: [ UnityEngine.Vector3 ] }

  left score display:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      score text:
        Type: text label
        Properties:
          Text: !expr
            Do: '"P1: " + score'
            With:
              score: !var left score
          FontSize: 32
          Rect:
            Anchor: top-left
            X: 20
            Y: 20
            Width: 200
            Height: 50

  right score display:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      score text:
        Type: text label
        Properties:
          Text: !expr
            Do: '"P2: " + score'
            With:
              score: !var right score
          FontSize: 32
          Rect:
            Anchor: top-right
            X: -220
            Y: 20
            Width: 200
            Height: 50
