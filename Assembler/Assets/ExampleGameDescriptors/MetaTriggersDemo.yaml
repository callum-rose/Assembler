Game:
  Title: Meta Triggers Demo
  Description: |
    A focused demo of the three trigger combinators:

      condition      — SPACE ends the game, but only while `allow quit` is true.
                       The predicate is a declared boolean expression invoked by id.
      when all       — pressing 'a' AND 'b' (in any order, each at least once) bumps
                       `both count`, then re-arms for the next pair of presses.
      trigger stay   — every physics frame the player overlaps the green zone,
                       `overlap frames` ticks up.

    Nothing is drawn for the counters — inspect the variables while it runs.

World:
  Dimensionality: 2
  BackgroundColor: "#0d1117"

Physics:
  Gravity: !vec { X: 0, Y: 0 }

Variables:
  allow quit: true
  both count: 0
  overlap frames: 0

Expressions:
  identity bool:
    ArgumentTypes: [ bool ]
    ArgumentNames: [ flag ]
    ReturnType: bool
    Expression: "return flag;"
  increment:
    ArgumentTypes: [ int ]
    ArgumentNames: [ n ]
    ReturnType: int
    Expression: "return n + 1;"

Entities:
  player:
    Position: !vec { X: 0, Y: 0 }
    Behaviours:
      look:
        Type: primitive
        Properties:
          Shape: cube
          Colour: !colour cyan
          Size: !vec { X: 1, Y: 1 }
      hitbox:
        Type: box collider
        Properties:
          IsTrigger: true
      # A kinematic body so the overlap with the zone raises trigger-stay callbacks.
      body:
        Type: rigidbody
        Properties:
          IsKinematic: true
          UseGravity: false

      # condition — SPACE only ends the game while `allow quit` evaluates true.
      quit key:
        Type: key down trigger
        Properties: { Key: "space" }
        Listeners:
          - EntityId: player
            BehaviourId: quit gate
      quit gate:
        Type: condition
        Properties:
          ExpressionId: identity bool
          Arguments: [ !var allow quit ]
        Listeners:
          - !gameover

      # when all — fires `count both` only after both 'a' and 'b' have been pressed.
      a key:
        Type: key down trigger
        Properties: { Key: "a" }
        Listeners:
          - EntityId: player
            BehaviourId: both keys
      b key:
        Type: key down trigger
        Properties: { Key: "b" }
        Listeners:
          - EntityId: player
            BehaviourId: both keys
      both keys:
        Type: when all
        Properties:
          TriggerIds: [ a key, b key ]
        Listeners:
          - EntityId: player
            BehaviourId: count both
      count both:
        Type: int variable setter
        Properties:
          VariableId: !var both count
          Value: !expr { Do: increment, With: [ !var both count ] }

      # trigger stay — ticks `overlap frames` while overlapping any `zone`-tagged entity.
      overlap:
        Type: trigger stay trigger
        Properties:
          TagsToDetect: [ zone ]
        Listeners:
          - EntityId: player
            BehaviourId: count overlap
      count overlap:
        Type: int variable setter
        Properties:
          VariableId: !var overlap frames
          Value: !expr { Do: increment, With: [ !var overlap frames ] }

  zone:
    Tags: [ zone ]
    Position: !vec { X: 0, Y: 0 }
    Behaviours:
      look:
        Type: primitive
        Properties:
          Shape: cube
          Colour: !colour { R: 0.2, G: 0.5, B: 0.2 }
          Size: !vec { X: 2, Y: 2 }
      hitbox:
        Type: box collider
        Properties:
          IsTrigger: true
