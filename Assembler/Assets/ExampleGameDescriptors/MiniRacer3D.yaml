Game:
  Title: Mini Racer 3D
  Description: >
    A small 3D arcade racer. The car is a non-kinematic rigidbody with grippy
    handling that breaks into a drift: W/S ease its forward speed up to a cruise
    (and let it coast back down), while A/D steer. The car's velocity mostly
    follows its nose, but its sideways (lateral) momentum only bleeds off
    gradually — governed by the `lateral grip` constant — so cranking the wheel at
    speed breaks traction and the tail slides wide, the car drifting through the
    corner before grip hauls it back into line. Steering authority builds with
    speed and stays available mid-slide, so the car steers gently at a crawl, can't
    pivot on the spot at a standstill, but can still be steered into a drift. The
    car is constrained to the ground plane (Y position and pitch/roll are frozen)
    and is stopped by the outer walls. Drive around the solid central infield,
    between it and the outer walls. You must pass the far checkpoint and then cross
    the start/finish line for a lap to count — three laps wins.

World:
  Dimensionality: 3
  BackgroundColor: "#10141c"

Physics:
  Gravity: !vec { X: 0, Y: 0, Z: 0 }

# Driving is wired to one abstract `move` (vector2) action, not to physical
# keys. The action emits x (steer, A/D or left/right) and y (throttle, W/S or
# up/down) every frame. Physical bindings live here, per platform, so the car
# entity never mentions a keycode.
Controls:
  Actions:
    move: { Type: value, ValueType: vector2 }

  Bindings:
    desktop:
      move:
        - Composite: 2DVector
          Up: "<Keyboard>/w"
          Down: "<Keyboard>/s"
          Left: "<Keyboard>/a"
          Right: "<Keyboard>/d"
        - Composite: 2DVector
          Up: "<Keyboard>/upArrow"
          Down: "<Keyboard>/downArrow"
          Left: "<Keyboard>/leftArrow"
          Right: "<Keyboard>/rightArrow"
    gamepad:
      move:
        - "<Gamepad>/leftStick"

Constants:
  # --- Handling (tune these for feel) ---
  max speed: 9          # top forward cruise speed (units/sec) the throttle eases toward
  reverse max: 4        # top reverse speed (units/sec)
  accel: 2.5            # how fast speed eases toward the throttle target (per sec); also the coast-down rate
  brake: 5              # stronger easing when the throttle opposes current motion (braking / reversing)
  turn rate: 2.4        # peak steering yaw rate in radians/sec (~137 deg/sec), reached at full grip
  grip speed: 3         # speed (units/sec) at which steering reaches full authority
  lateral grip: 3.5     # how fast sideways slide bleeds off (per sec); lower = longer, looser drifts

  lap target: 3
  car start: !vec { X: 5, Y: 0.35, Z: -17 }
  follow offset: !vec { X: 0, Y: 9, Z: -14 }
  camera start: !vec { X: 0, Y: 9, Z: -14 }

Variables:
  laps: 0
  lap armed: false   # set when the checkpoint is crossed; cleared when a lap is scored

Expressions:
  # The car's new world-space velocity, set fresh every frame. The velocity is
  # split into two parts against the car's heading: a forward component along the
  # nose, and a lateral (sideways) component. The forward part is throttle-driven;
  # the lateral part is what makes the car drift — instead of being discarded (which
  # would make handling perfectly grippy), it is retained and only bled off
  # gradually by `grip`, so when the nose yaws away from the car's momentum the car
  # keeps sliding in its old direction (a drift) until grip pulls it back in line.
  #
  # The heading is the car's Y euler angle: Rotate2D turns the unit +Y vector into a
  # (sin, cos) pair we map onto the XZ ground plane to get the forward unit vector;
  # `right` is its in-plane perpendicular. The current forward speed is the live
  # velocity projected onto the heading (signed: negative when reversing); it eases
  # toward a throttle-driven target — `top` forward, the weaker `reverse` backward —
  # using `accel`, or the stronger `brake` rate when the throttle opposes the motion
  # (braking / changing direction). The lateral speed is the velocity projected onto
  # `right`; it eases toward zero at the `grip` rate (lower grip = a longer slide).
  # dt makes both easings frame-rate independent.
  drive velocity:
    ArgumentTypes: [ vector, vector, float, float, float, float, float, float, float ]
    ArgumentNames: [ rotation, velocity, throttle, top, reverse, accel, brake, grip, dt ]
    ReturnType: vector
    RegisterTypes: [ UnityEngine.Vector3 ]
    Expression: |
      var heading = Rotate2D(new Vector3(0f, 1f, 0f), -rotation.y);
      var forward = new Vector3(heading.x, 0f, heading.y);
      var right = new Vector3(forward.z, 0f, -forward.x);
      var current = Dot(velocity, forward);
      var lateral = Dot(velocity, right);
      var target = throttle >= 0f ? throttle * top : throttle * reverse;
      var ease = target * current < 0f ? brake : accel;
      var next = Lerp(current, target, Clamp01(ease * dt));
      var keptLateral = Lerp(lateral, 0f, Clamp01(grip * dt));
      return AddVector(ScaleVector(forward, next), ScaleVector(right, keptLateral));

  # Desired yaw angular velocity (rad/s about +Y) from the move action's x (steer,
  # in [-1, 1]). Authority ramps in with the car's total speed (the live velocity's
  # magnitude) up to `gripSpeed`: at a standstill it's zero — the car cannot pivot
  # on the spot — and it grows to the full `rate` once rolling. Using total speed
  # (not just the forward projection) keeps full steering available mid-drift, when
  # much of the velocity is sideways, so you can steer into and hold a slide. The
  # yaw is flipped by the sign of the forward speed so the car steers the intuitive
  # way in reverse (it backs into the turn) rather than swinging the wrong way. Set
  # as a steady state every frame so steering is smooth; the body turning drags the
  # car's grippy forward velocity round with it while the lateral part slides.
  steer yaw:
    ArgumentTypes: [ float, vector, vector, float, float ]
    ArgumentNames: [ steer, rotation, velocity, rate, gripSpeed ]
    ReturnType: vector
    RegisterTypes: [ UnityEngine.Vector3 ]
    Expression: |
      var heading = Rotate2D(new Vector3(0f, 1f, 0f), -rotation.y);
      var forward = new Vector3(heading.x, 0f, heading.y);
      var forwardSpeed = Dot(velocity, forward);
      var authority = Clamp01(Magnitude(velocity) / gripSpeed);
      var direction = forwardSpeed < 0f ? -1f : 1f;
      return new Vector3(0f, steer * rate * authority * direction, 0f);

  next lap:
    ArgumentTypes: [ int ]
    ArgumentNames: [ current ]
    ReturnType: int
    Expression: |
      return current + 1;

  is finished:
    ArgumentTypes: [ int, int ]
    ArgumentNames: [ laps, target ]
    ReturnType: bool
    Expression: |
      return laps >= target;

Entities:
  # ---- The drivable car ----------------------------------------------------
  car:
    Tags: [ car ]
    Position: !var car start
    Rotation: !vec { X: 0, Y: 90, Z: 0 }   # facing +X along the south straight
    Behaviours:
      body:
        Type: primitive
        Properties:
          Shape: cube
          Size: !vec { X: 1, Y: 0.5, Z: 2 }
          Colour: !colour "#e8413c"
      collider:
        Type: box collider
        Properties:
          Size: !vec { X: 1, Y: 0.5, Z: 2 }
          IsTrigger: false
      rb:
        Type: rigidbody
        Properties:
          UseGravity: false
          IsKinematic: false
          Mass: 1
          LinearDamping: 0        # speed is managed directly each frame, not via drag
          AngularDamping: 0       # yaw is set directly, not accumulated via torque
          FreezePosition: !vec { X: 0, Y: 1, Z: 0 }   # pin to the ground plane
          FreezeRotation: !vec { X: 1, Y: 0, Z: 1 }   # upright; only yaw is free

      # --- Input: one value action drives both throttle (y) and steering (x).
      # It fires every frame with the current stick/key values (zero included), so
      # both the velocity and the steering are recomputed each frame — which is why
      # the car coasts to a stop when the throttle is released.
      drive input:
        Type: input action
        Properties: { Action: move }
        Listeners:
          - EntityId: car
            BehaviourId: apply drive
          - EntityId: car
            BehaviourId: apply steer
      apply drive:
        Type: set velocity
        Properties:
          Velocity: !expr
            Do: drive velocity
            With:
              - !entity { Id: car, Property: Rotation }
              - !rigidbody { Id: car, Property: Velocity }
              - !output y
              - !var max speed
              - !var reverse max
              - !var accel
              - !var brake
              - !var lateral grip
              - !clock deltaTime
      apply steer:
        Type: set angular velocity
        Properties:
          AngularVelocity: !expr
            Do: steer yaw
            With:
              - !output x
              - !entity { Id: car, Property: Rotation }
              - !rigidbody { Id: car, Property: Velocity }
              - !var turn rate
              - !var grip speed
    Children:
      roof:
        Position: !vec { X: 0, Y: 0.45, Z: -0.1 }
        Behaviours:
          body:
            Type: primitive
            Properties:
              Shape: cube
              Size: !vec { X: 0.8, Y: 0.45, Z: 1 }
              Colour: !colour "#f7d046"

  # ---- Track surface and (solid) infield ----------------------------------
  ground:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      body:
        Type: primitive
        Properties:
          Shape: cube
          Size: !vec { X: 42, Y: 0.2, Z: 42 }
          Colour: !colour "#2b2f38"

  infield:
    Position: !vec { X: 0, Y: 0.5, Z: 0 }
    Behaviours:
      body:
        Type: primitive
        Properties:
          Shape: cube
          Size: !vec { X: 24, Y: 1, Z: 28 }
          Colour: !colour "#2f7d46"
      collider:
        Type: box collider
        Properties:
          Size: !vec { X: 24, Y: 1, Z: 28 }
          IsTrigger: false

  # ---- Outer barrier walls (solid) ----------------------------------------
  wall north:
    Position: !vec { X: 0, Y: 0.6, Z: 20 }
    Behaviours:
      body:
        Type: primitive
        Properties:
          Shape: cube
          Size: !vec { X: 42, Y: 1.2, Z: 1 }
          Colour: !colour "#cdd3dc"
      collider:
        Type: box collider
        Properties:
          Size: !vec { X: 42, Y: 1.2, Z: 1 }
          IsTrigger: false
  wall south:
    Position: !vec { X: 0, Y: 0.6, Z: -20 }
    Behaviours:
      body:
        Type: primitive
        Properties:
          Shape: cube
          Size: !vec { X: 42, Y: 1.2, Z: 1 }
          Colour: !colour "#cdd3dc"
      collider:
        Type: box collider
        Properties:
          Size: !vec { X: 42, Y: 1.2, Z: 1 }
          IsTrigger: false
  wall east:
    Position: !vec { X: 20, Y: 0.6, Z: 0 }
    Behaviours:
      body:
        Type: primitive
        Properties:
          Shape: cube
          Size: !vec { X: 1, Y: 1.2, Z: 42 }
          Colour: !colour "#cdd3dc"
      collider:
        Type: box collider
        Properties:
          Size: !vec { X: 1, Y: 1.2, Z: 42 }
          IsTrigger: false
  wall west:
    Position: !vec { X: -20, Y: 0.6, Z: 0 }
    Behaviours:
      body:
        Type: primitive
        Properties:
          Shape: cube
          Size: !vec { X: 1, Y: 1.2, Z: 42 }
          Colour: !colour "#cdd3dc"
      collider:
        Type: box collider
        Properties:
          Size: !vec { X: 1, Y: 1.2, Z: 42 }
          IsTrigger: false

  # ---- Start / finish: painted stripe + trigger volume --------------------
  finish stripe:
    Position: !vec { X: 0, Y: 0.12, Z: -17 }
    Behaviours:
      body:
        Type: primitive
        Properties:
          Shape: cube
          Size: !vec { X: 0.6, Y: 0.06, Z: 6 }
          Colour: !colour white

  finish:
    Tags: [ finish ]
    Position: !vec { X: 0, Y: 1, Z: -17 }
    Behaviours:
      gate:
        Type: box collider
        Properties:
          Size: !vec { X: 1.5, Y: 2, Z: 6 }
          IsTrigger: true
      crossed:
        Type: trigger enter trigger
        Properties:
          TagsToDetect: [ car ]
        Listeners:
          - EntityId: race
            BehaviourId: lap gate

  # ---- Checkpoint on the far (north) straight: arms the next lap -----------
  checkpoint stripe:
    Position: !vec { X: 0, Y: 0.12, Z: 17 }
    Behaviours:
      body:
        Type: primitive
        Properties:
          Shape: cube
          Size: !vec { X: 0.6, Y: 0.06, Z: 6 }
          Colour: !colour "#39c6e8"

  checkpoint:
    Tags: [ checkpoint ]
    Position: !vec { X: 0, Y: 1, Z: 17 }
    Behaviours:
      gate:
        Type: box collider
        Properties:
          Size: !vec { X: 1.5, Y: 2, Z: 6 }
          IsTrigger: true
      crossed:
        Type: trigger enter trigger
        Properties:
          TagsToDetect: [ car ]
        Listeners:
          - EntityId: race
            BehaviourId: arm lap

  # ---- Race state: lap counter, checkpoint arming, win check --------------
  race:
    Behaviours:
      arm lap:
        Type: bool variable setter
        Properties:
          VariableId: !var lap armed
          Value: true
      # A finish crossing only counts when the checkpoint armed the lap.
      lap gate:
        Type: condition gate
        Properties:
          Condition: !var lap armed
        Listeners:
          - EntityId: race
            BehaviourId: add lap
          - EntityId: race
            BehaviourId: disarm lap
      add lap:
        Type: int variable setter
        Properties:
          VariableId: !var laps
          Value: !expr
            Do: next lap
            With:
              - !var laps
      disarm lap:
        Type: bool variable setter
        Properties:
          VariableId: !var lap armed
          Value: false
      tick:
        Type: every frame trigger
        Listeners:
          - EntityId: race
            BehaviourId: win gate
      win gate:
        Type: condition gate
        Properties:
          Condition: !expr
            Do: is finished
            With:
              - !var laps
              - !var lap target
        Listeners:
          - !gameover

  # ---- Chase camera --------------------------------------------------------
  camera:
    Tags: [ camera ]
    Position: !var camera start
    Behaviours:
      camera:
        Type: camera
        Properties:
          View: "perspective"
          DefaultBlend: 0.4
  camera rig:
    Position: !var camera start
    Behaviours:
      follow:
        Type: camera follow
        Properties:
          Target: { Tag: car }
          LookAt: { Tag: car }
          Mode: "3d"
          Priority: 10
          Lens: 60
          Damping: 0.6
          FollowOffset: !var follow offset

  # ---- HUD -----------------------------------------------------------------
  ui:
    Behaviours:
      canvas:
        Type: ui canvas
        Properties:
          MatchWidthOrHeight: 0.5
          ReferenceResolution: !vec { X: 1920, Y: 1080 }
    Children:
      hud:
        Behaviours:
          layout:
            Type: ui container
            Properties:
              Direction: vertical
              Spacing: 8
              Padding: 24
              ChildAlignment: upper-left
        Children:
          lap count:
            Behaviours:
              label:
                Type: text label
                Properties:
                  Text: !text { Key: hud.lap, Arguments: [ !var laps, !var lap target ] }
                  FontSize: 40
                  PreferredWidth: 500
                  PreferredHeight: 52
          hint:
            Behaviours:
              label:
                Type: text label
                Properties:
                  Text: !text hud.hint
                  FontSize: 24
                  PreferredWidth: 640
                  PreferredHeight: 34

Localisation:
  DefaultLocale: en
  Locales:
    en:
      hud.lap: "Lap {0} / {1}"
      hud.hint: "WASD to drive — pass the blue checkpoint, then the line, 3 times"
