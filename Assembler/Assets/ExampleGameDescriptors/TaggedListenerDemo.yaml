Game:
  Title: Dynamic Tag Listener Demo
  Description: |
    Red enemies spawn at random positions every half-second.

      SPACE  — destroys every enemy currently alive.
               Uses an EntityTag listener (`EntityTag: !var target tag,
               BehaviourId: ...`), so it targets a specific behaviour
               on every entity carrying that tag.

      F      — scores 1 point per alive enemy (no destruction).
               Uses a BehaviourTag listener (`BehaviourTag: scoreable`),
               which targets every behaviour carrying that tag directly,
               with no entity reference at all.

    Both listeners were wired up at game start but pick up enemies
    that spawn long after — their target sets are resolved at
    notify-time, not build-time.

World:
  Dimensionality: 2
  BackgroundColor: "#0d1117"

Physics:
  Gravity: !vec { X: 0, Y: 0 }

Constants:
  spawn interval: 0.5
  enemy size: !vec { X: 0.6, Y: 0.6 }
  scoreable tag: "scoreable"
  one: 1
  camera position: !vec { X: 0, Y: 0, Z: -10 }
  camera rotation: !vec { X: 0, Y: 0, Z: 0 }
  camera view: "orthographic"
  camera size: 5

Variables:
  # The tag the SPACE-key listener will broadcast to.
  # Stored as a variable so the listener uses `!var target tag` —
  # demonstrating that EntityTag is a full ValueSource<string>.
  target tag: "enemy"
  enemies spawned: 0
  enemies destroyed: 0
  zap count: 0
  score: 0

Templates:
  enemy_template:
    Tags: [ enemy ]
    Behaviours:
      gizmo:
        Type: cube gizmo
        Properties:
          Size: !var enemy size
          IsWire: false
          Colour: !colour red
      # The two behaviours the broadcaster targets, by behaviour id,
      # on every entity tagged `enemy`.
      count as destroyed:
        Type: int variable setter
        Properties:
          VariableId: !var enemies destroyed
          Value: !expr
            Do: intAdd
            With:
              a: !var enemies destroyed
              b: !var one
      self destruct:
        Type: destroy
      # Behaviour tag — the F-key listener finds this by tag alone,
      # without referencing the entity or even a behaviour id.
      score me:
        Tags: [ scoreable ]
        Type: int variable setter
        Properties:
          VariableId: !var score
          Value: !expr
            Do: intAdd
            With:
              a: !var score
              b: !var one

Expressions:
  intAdd:
    ArgumentTypes: [ int, int ]
    ArgumentNames: [ a, b ]
    ReturnType: int
    Expression: "a + b;"
# Two button actions drive the demo: Space fires the zapper, F scores. The keys
# now live as bindings here rather than `fire key` / `score key` constants.
Controls:
  Actions:
    fire:  { Type: button, Phase: down }
    score: { Type: button, Phase: down }
    quit:  { Type: button, Phase: down }

  Bindings:
    desktop:
      fire:  [ "<Keyboard>/space" ]
      score: [ "<Keyboard>/f" ]
      quit:  [ "<Keyboard>/q" ]
    mobile:
      fire:  [ "<Gamepad>/buttonSouth" ]
      score: [ "<Gamepad>/buttonWest" ]
      quit:  [ "<Gamepad>/start" ]

  OnScreen:
    - { Type: button, Action: fire,  Label: "Fire",  Anchor: lower-right, Offset: { X: 200, Y: 440 }, Size: { X: 240, Y: 200 } }
    - { Type: button, Action: score, Label: "Score", Anchor: lower-right, Offset: { X: 200, Y: 200 }, Size: { X: 240, Y: 200 } }
    - { Type: button, Action: quit,  Label: "Quit",  Anchor: upper-right, Offset: { X: 120, Y: 120 }, Size: { X: 180, Y: 180 } }

Entities:
  controls:
    Behaviours:
      quit:
        Type: input action
        Properties: { Action: quit }
        Listeners: [ !gameover ]

  enemy spawner:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      tick:
        Type: interval trigger
        Properties:
          Interval: !var spawn interval
        Listeners: [ count spawn, spawn enemy ]
      count spawn:
        Type: int variable setter
        Properties:
          VariableId: !var enemies spawned
          Value: !expr
            Do: intAdd
            With:
              a: !var enemies spawned
              b: !var one
      spawn enemy:
        Type: spawner
        Properties:
          TemplateId: enemy_template
          Position: !expr { Do: 'new Vector3(RandomFloat(-4f, 4f), RandomFloat(-3f, 3f), 0)', RegisterTypes: [ UnityEngine.Vector3 ] }

  # The whole point of the demo lives in this one entity.
  # `fire` is a tagged listener: one keypress destroys every enemy
  # currently tagged with whatever `target tag` resolves to, even
  # though none of those enemies existed when this entity was built.
  zapper:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      fire:
        Type: input action
        Properties: { Action: fire }
        Listeners:
          - count zap
          - EntityTag: !var target tag
            BehaviourId: count as destroyed
          - EntityTag: !var target tag
            BehaviourId: self destruct
      count zap:
        Type: int variable setter
        Properties:
          VariableId: !var zap count
          Value: !expr
            Do: intAdd
            With:
              a: !var zap count
              b: !var one

      # F-key uses a BehaviourTag listener — pure behaviour-tag dispatch.
      # No entity is mentioned; every behaviour tagged `scoreable` runs.
      score all:
        Type: input action
        Properties: { Action: score }
        Listeners:
          - BehaviourTag: !var scoreable tag

  camera:
    Tags: [ camera ]
    Position: !var camera position
    Rotation: !var camera rotation
    Behaviours:
      camera:
        Type: camera
        Properties:
          View: !var camera view
          Size: !var camera size

  hud:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      title:
        Type: text label
        Properties:
          Text: "SPACE = destroy all enemies     F = score per alive enemy"
          FontSize: 22
          Rect:
            Anchor: top-left
            X: 20
            Y: 20
            Width: 700
            Height: 40
      alive:
        Type: text label
        Properties:
          Text: !expr
            Do: '"Alive now: " + (enemies_spawned - enemies_destroyed)'
            With:
              enemies_spawned: !var enemies spawned
              enemies_destroyed: !var enemies destroyed
          FontSize: 22
          Rect:
            Anchor: top-left
            X: 20
            Y: 60
            Width: 400
            Height: 30
      totals:
        Type: text label
        Properties:
          Text: !expr
            Do: '"Spawned: " + enemies_spawned + "     Destroyed: " + enemies_destroyed + "     Zaps: " + zap_count + "     Score: " + score'
            With:
              enemies_spawned: !var enemies spawned
              enemies_destroyed: !var enemies destroyed
              zap_count: !var zap count
              score: !var score
          FontSize: 18
          Rect:
            Anchor: top-left
            X: 20
            Y: 90
            Width: 600
            Height: 30
