Game:
  Title: Pacman
  Description: |
    A maze-chase built around grid navigation. Showcases:

    - `grid mover` — Pacman and the ghosts both move tile-to-tile on the nav grid
      (never free-roaming, never diagonal), turning only at cell centres. Pacman reads
      WASD; each ghost reads the direction its `navigate` pathfinder writes out.
    - `Navigation: Diagonal: false` — the ghosts' `navigate` A* is four-connected, so
      the path it feeds the grid mover is orthogonal.
    - The dot field is one `Placements` entry whose `At` is an `!expr` building a
      hole-punched grid with a `PositionList`; four power pills and three ghosts are
      two more `Placements` entries.
    - Power pills flip every ghost into frightened mode (they flee to the far corner
      and turn blue, and can be eaten for bonus points) for a few seconds.
    - Left/right tunnels: walking into a side opening warps Pacman across the screen.

    Move with WASD. Eat every dot to win; a ghost catches you (while not frightened)
    and the run ends.

World:
  Dimensionality: 2
  BackgroundColor: "#05050f"

Physics:
  Gravity: !vec { X: 0, Y: 0 }

# The shared walkability grid. Cell size 1 with these bounds puts cell centres on
# integer coordinates, so the dots, Pacman's tile steps and the ghosts' paths all
# share one lattice. Diagonal: false makes every search four-connected.
Navigation:
  CellSize: 1
  Bounds: { Min: !vec { X: -8.5, Y: -6.5 }, Max: !vec { X: 8.5, Y: 6.5 } }
  ObstacleTag: wall
  Diagonal: false

Constants:
  wall colour: !colour { R: 0.16, G: 0.20, B: 0.70, A: 1 }
  pill colour: !colour { R: 0.98, G: 0.85, B: 0.55, A: 1 }
  power colour: !colour { R: 1.0, G: 0.55, B: 0.85, A: 1 }
  pacman colour: !colour { R: 0.98, G: 0.85, B: 0.10, A: 1 }
  ghost colour: !colour { R: 0.90, G: 0.25, B: 0.35, A: 1 }
  fright colour: !colour { R: 0.30, G: 0.45, B: 1.0, A: 1 }

  pacman speed: 5
  ghost speed: 3.5
  fright duration: 6
  move cell: 1.0          # heading magnitude fed to the grid mover (one cell)

  ghost house: !vec { X: 0, Y: 4, Z: 0 }

  camera position: !vec { X: 0, Y: 0, Z: -10 }
  camera size: 7.5

Variables:
  score: 0
  dots eaten: 0
  dots total: 0
  pac dir: !vec { X: 0, Y: 0, Z: 0 }
  frightened: false
  fright until: 0.0

# Pacman's heading is wired to one abstract `move` (vector2) action. Desktop feeds
# it with a WASD 2DVector composite; mobile feeds the same action from the on-screen
# d-pad. `snap dir` turns that vector into a unit cardinal heading for the grid mover.
Controls:
  Actions:
    move: { Type: value, ValueType: vector2 }

  Bindings:
    desktop:
      move:
        - Composite: 2DVector
          Up: "<Keyboard>/w"
          Down: "<Keyboard>/s"
          Left: "<Keyboard>/a"
          Right: "<Keyboard>/d"
    mobile:
      move: [ "<Gamepad>/dpad" ]   # d-pad → a Vector2 dpad control

  OnScreen:
    - Type: dpad
      Action: move
      Anchor: lower-left
      Offset: { X: 280, Y: 280 }
      Size:   { X: 380, Y: 380 }

Localisation:
  DefaultLocale: en
  Locales:
    en:
      hud.line: "Score {0}    Dots {1}/{2}    WASD to move — power pills scare the ghosts"

Expressions:
  # True when integer cell (x, y) sits inside one of the maze's inner wall blocks.
  # Mirrors the wall entities below so dots are never placed inside a wall.
  is blocked:
    ArgumentTypes: [ int, int ]
    ArgumentNames: [ x, y ]
    ReturnType: bool
    Expression: >
      return (x >= -1 && x <= 1 && y >= 2 && y <= 3)
          || (x >= -1 && x <= 1 && y >= -3 && y <= -2)
          || (x >= -5 && x <= -4 && y >= 2 && y <= 3)
          || (x >= 4 && x <= 5 && y >= 2 && y <= 3)
          || (x >= -5 && x <= -4 && y >= -3 && y <= -2)
          || (x >= 4 && x <= 5 && y >= -3 && y <= -2);

  # True at the four corner cells reserved for power pills (so the dot field skips them).
  is power cell:
    ArgumentTypes: [ int, int ]
    ArgumentNames: [ x, y ]
    ReturnType: bool
    Expression: "return (x == -7 || x == 7) && (y == -5 || y == 5);"

  # The dot positions: every interior cell that is neither a wall nor a power-pill corner.
  # Built imperatively with the PositionList builder (the compiler has no collection
  # initializers, so we Add in a loop).
  pill field:
    ReturnType: vector list
    Expression: >
      var b = new PositionList();
      for (int x = -7; x <= 7; x++)
      {
          for (int y = -5; y <= 5; y++)
          {
              if (!isBlocked(x, y) && !isPowerCell(x, y))
              {
                  b.Add(new UnityEngine.Vector3((float)x, (float)y, 0f));
              }
          }
      }
      return b.ToList();

  # Number of dots on the board, so the win check knows the target.
  pill count:
    ReturnType: int
    Expression: "return pillField().Count();"

  # Convert the move action's analogue/d-pad vector into a unit cardinal heading
  # for the grid mover. Neutral input keeps the current heading (so Pacman waits
  # at the start and keeps gliding between presses).
  snap dir:
    ArgumentTypes: [ vector, vector, float ]
    ArgumentNames: [ input, current, cell ]
    ReturnType: vector
    RegisterTypes: [ UnityEngine.Vector3 ]
    Expression: >
      if (Abs(input.x) < 0.3f && Abs(input.y) < 0.3f) { return current; }
      if (Abs(input.x) >= Abs(input.y)) { return new Vector3(input.x > 0f ? cell : -cell, 0f, 0f); }
      return new Vector3(0f, input.y > 0f ? cell : -cell, 0f);

  # Where a frightened ghost runs to: the maze corner diagonally opposite Pacman.
  flee target:
    ArgumentTypes: [ vector ]
    ArgumentNames: [ p ]
    ReturnType: vector
    Expression: "return new UnityEngine.Vector3(p.x < 0f ? 7f : -7f, p.y < 0f ? 5f : -5f, 0f);"

Templates:
  # One dot. Eating it bumps the score and the dot counter, then it removes itself.
  pill:
    Behaviours:
      body:
        Type: sphere gizmo
        Properties: { Radius: 0.12, IsWire: false, Colour: !var pill colour }
      collider:
        Type: sphere collider
        Properties: { Radius: 0.25, IsTrigger: true }
      eaten:
        Type: trigger enter trigger
        Properties: { TagsToDetect: [ pacman ] }
        Listeners:
          - EntityId: trackers
            BehaviourId: add dot score
          - EntityId: trackers
            BehaviourId: add dot count
          - EntityId: !parameter self_id
            BehaviourId: remove
      remove:
        Type: destroy

  # One power pill. Eating it scores big and arms frightened mode for every ghost.
  power:
    Behaviours:
      body:
        Type: sphere gizmo
        Properties: { Radius: 0.3, IsWire: false, Colour: !var power colour }
      collider:
        Type: sphere collider
        Properties: { Radius: 0.35, IsTrigger: true }
      eaten:
        Type: trigger enter trigger
        Properties: { TagsToDetect: [ pacman ] }
        Listeners:
          - EntityId: trackers
            BehaviourId: add power score
          - EntityId: trackers
            BehaviourId: arm fright
          - EntityId: !parameter self_id
            BehaviourId: remove
      remove:
        Type: destroy

  # One ghost. Chases Pacman with four-connected A*; when frightened it flees to the far
  # corner, turns blue, and can be eaten (sending it home for bonus points) instead of
  # ending the game.
  ghost:
    Tags: [ ghost ]
    # Per-ghost heading: `navigate` writes the direction toward its goal here each frame, and the
    # `grid mover` consumes it — so the ghost steps cell-to-cell (cardinal only) instead of `navigate`
    # steering it smoothly and clipping corners diagonally.
    Variables:
      ghost dir: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      body:
        Type: sphere gizmo
        Properties:
          Radius: 0.4
          IsWire: false
          Colour: !expr
            Do: 'frightened ? fright_colour : ghost_colour'
            With: { frightened: !var frightened, fright_colour: !var fright colour, ghost_colour: !var ghost colour }
            ArgumentTypes: [ bool, colour, colour ]
            ReturnType: colour
      collider:
        Type: sphere collider
        Properties: { Radius: 0.4, IsTrigger: true }
      # Pathfinder: A* to Pacman (or the far corner when frightened). With Output set it writes the
      # desired direction into `ghost dir` instead of moving the ghost itself.
      chase:
        Type: navigate
        Properties:
          Target: !expr
            Do: 'frightened ? fleeTarget(pacman_position) : pacman_position'
            With: { frightened: !var frightened, pacman_position: !entity { Id: pacman, Property: Position } }
            ArgumentTypes: [ bool, vector ]
            ReturnType: vector
          Speed: !var ghost speed
          SlowingRadius: 0.1
          Recompute: 0.25
          Mode: astar
          Output: !var ghost dir
      # Grid-locked movement (same behaviour as Pacman), driven by the pathfinder's direction.
      move:
        Type: grid mover
        Properties:
          Direction: !var ghost dir
          Speed: !var ghost speed
      catch:
        Type: trigger enter trigger
        Properties: { TagsToDetect: [ pacman ] }
        Listeners:
          - EntityId: !parameter self_id
            BehaviourId: lose gate
          - EntityId: !parameter self_id
            BehaviourId: eat gate
      # Not frightened -> the catch ends the game.
      lose gate:
        Type: inverse condition gate
        Properties: { Condition: !var frightened }
        Listeners:
          - !gameover
      # Frightened -> the ghost is eaten: home it and award the bonus.
      eat gate:
        Type: condition gate
        Properties: { Condition: !var frightened }
        Listeners:
          - EntityId: !parameter self_id
            BehaviourId: go home
          - EntityId: trackers
            BehaviourId: add ghost score
      go home:
        Type: position setter
        Properties: { Position: !var ghost house }

Placements:
  # The dot field — an !expr `At` returning a hole-punched grid.
  dots:
    Template: pill
    At: !expr { Do: pill field }

  # Four power pills, one per corner.
  power pills:
    Template: power
    At:
      - !vec { X: -7, Y: 5, Z: 0 }
      - !vec { X: 7, Y: 5, Z: 0 }
      - !vec { X: -7, Y: -5, Z: 0 }
      - !vec { X: 7, Y: -5, Z: 0 }

  # Three ghosts at open spawn cells.
  ghosts:
    Template: ghost
    At:
      - !vec { X: -6, Y: 4, Z: 0 }
      - !vec { X: 0, Y: 4, Z: 0 }
      - !vec { X: 6, Y: 4, Z: 0 }

Entities:
  # --- Maze. Outer border (with a gap at y=0 on each side for the tunnels) plus six
  #     inner blocks that match the `is blocked` rectangles. ---
  wall top:
    Position: !vec { X: 0, Y: 6, Z: 0 }
    Tags: [ wall ]
    Behaviours:
      body: { Type: cube gizmo, Properties: { Size: !vec { X: 18, Y: 1, Z: 1 }, IsWire: false, Colour: !var wall colour } }
      collider: { Type: box collider, Properties: { Size: !vec { X: 18, Y: 1, Z: 1 }, IsTrigger: false } }
  wall bottom:
    Position: !vec { X: 0, Y: -6, Z: 0 }
    Tags: [ wall ]
    Behaviours:
      body: { Type: cube gizmo, Properties: { Size: !vec { X: 18, Y: 1, Z: 1 }, IsWire: false, Colour: !var wall colour } }
      collider: { Type: box collider, Properties: { Size: !vec { X: 18, Y: 1, Z: 1 }, IsTrigger: false } }
  wall left upper:                # cells x=-8, y=1..6
    Position: !vec { X: -8, Y: 3.5, Z: 0 }
    Tags: [ wall ]
    Behaviours:
      body: { Type: cube gizmo, Properties: { Size: !vec { X: 1, Y: 6, Z: 1 }, IsWire: false, Colour: !var wall colour } }
      collider: { Type: box collider, Properties: { Size: !vec { X: 1, Y: 6, Z: 1 }, IsTrigger: false } }
  wall left lower:                # cells x=-8, y=-6..-1  (gap at y=0)
    Position: !vec { X: -8, Y: -3.5, Z: 0 }
    Tags: [ wall ]
    Behaviours:
      body: { Type: cube gizmo, Properties: { Size: !vec { X: 1, Y: 6, Z: 1 }, IsWire: false, Colour: !var wall colour } }
      collider: { Type: box collider, Properties: { Size: !vec { X: 1, Y: 6, Z: 1 }, IsTrigger: false } }
  wall right upper:               # cells x=8, y=1..6
    Position: !vec { X: 8, Y: 3.5, Z: 0 }
    Tags: [ wall ]
    Behaviours:
      body: { Type: cube gizmo, Properties: { Size: !vec { X: 1, Y: 6, Z: 1 }, IsWire: false, Colour: !var wall colour } }
      collider: { Type: box collider, Properties: { Size: !vec { X: 1, Y: 6, Z: 1 }, IsTrigger: false } }
  wall right lower:               # cells x=8, y=-6..-1  (gap at y=0)
    Position: !vec { X: 8, Y: -3.5, Z: 0 }
    Tags: [ wall ]
    Behaviours:
      body: { Type: cube gizmo, Properties: { Size: !vec { X: 1, Y: 6, Z: 1 }, IsWire: false, Colour: !var wall colour } }
      collider: { Type: box collider, Properties: { Size: !vec { X: 1, Y: 6, Z: 1 }, IsTrigger: false } }

  wall top centre:                # cells x[-1,1] y[2,3]
    Position: !vec { X: 0, Y: 2.5, Z: 0 }
    Tags: [ wall ]
    Behaviours:
      body: { Type: cube gizmo, Properties: { Size: !vec { X: 3, Y: 2, Z: 1 }, IsWire: false, Colour: !var wall colour } }
      collider: { Type: box collider, Properties: { Size: !vec { X: 3, Y: 2, Z: 1 }, IsTrigger: false } }
  wall bottom centre:             # cells x[-1,1] y[-3,-2]
    Position: !vec { X: 0, Y: -2.5, Z: 0 }
    Tags: [ wall ]
    Behaviours:
      body: { Type: cube gizmo, Properties: { Size: !vec { X: 3, Y: 2, Z: 1 }, IsWire: false, Colour: !var wall colour } }
      collider: { Type: box collider, Properties: { Size: !vec { X: 3, Y: 2, Z: 1 }, IsTrigger: false } }
  wall top left:                  # cells x[-5,-4] y[2,3]
    Position: !vec { X: -4.5, Y: 2.5, Z: 0 }
    Tags: [ wall ]
    Behaviours:
      body: { Type: cube gizmo, Properties: { Size: !vec { X: 2, Y: 2, Z: 1 }, IsWire: false, Colour: !var wall colour } }
      collider: { Type: box collider, Properties: { Size: !vec { X: 2, Y: 2, Z: 1 }, IsTrigger: false } }
  wall top right:                 # cells x[4,5] y[2,3]
    Position: !vec { X: 4.5, Y: 2.5, Z: 0 }
    Tags: [ wall ]
    Behaviours:
      body: { Type: cube gizmo, Properties: { Size: !vec { X: 2, Y: 2, Z: 1 }, IsWire: false, Colour: !var wall colour } }
      collider: { Type: box collider, Properties: { Size: !vec { X: 2, Y: 2, Z: 1 }, IsTrigger: false } }
  wall bottom left:               # cells x[-5,-4] y[-3,-2]
    Position: !vec { X: -4.5, Y: -2.5, Z: 0 }
    Tags: [ wall ]
    Behaviours:
      body: { Type: cube gizmo, Properties: { Size: !vec { X: 2, Y: 2, Z: 1 }, IsWire: false, Colour: !var wall colour } }
      collider: { Type: box collider, Properties: { Size: !vec { X: 2, Y: 2, Z: 1 }, IsTrigger: false } }
  wall bottom right:              # cells x[4,5] y[-3,-2]
    Position: !vec { X: 4.5, Y: -2.5, Z: 0 }
    Tags: [ wall ]
    Behaviours:
      body: { Type: cube gizmo, Properties: { Size: !vec { X: 2, Y: 2, Z: 1 }, IsWire: false, Colour: !var wall colour } }
      collider: { Type: box collider, Properties: { Size: !vec { X: 2, Y: 2, Z: 1 }, IsTrigger: false } }

  # --- Pacman: grid-locked movement; a kinematic rigidbody so its trigger overlaps
  #     (dots, ghosts, tunnel sensors) still fire while the grid mover drives it. ---
  pacman:
    Position: !vec { X: 0, Y: -5, Z: 0 }
    Tags: [ pacman ]
    Behaviours:
      body:
        Type: sphere gizmo
        Properties: { Radius: 0.4, IsWire: false, Colour: !var pacman colour }
      collider:
        Type: box collider
        Properties: { Size: !vec { X: 0.7, Y: 0.7, Z: 0.7 }, IsTrigger: true }
      rigidbody:
        Type: rigidbody
        Properties: { UseGravity: false, IsKinematic: true }
      mover:
        Type: grid mover
        Properties:
          Direction: !var pac dir
          Speed: !var pacman speed

      # The `move` action (WASD on desktop, on-screen d-pad on mobile) sets the
      # requested heading; the grid mover applies it at the next cell centre.
      # `snap dir` keeps the current heading while the pad is neutral.
      move input:
        Type: input action
        Properties: { Action: move }
        Listeners: [ { EntityId: pacman, BehaviourId: apply dir } ]
      apply dir:
        Type: vector variable setter
        Properties:
          VariableId: !var pac dir
          Value: !expr
            Do: snap dir
            With:
              input: !output axis
              current: !var pac dir
              cell: !var move cell

      # The tunnel sensors warp Pacman across; the grid mover re-anchors after the jump.
      to right side:
        Type: position setter
        Properties: { Position: !vec { X: 7, Y: 0, Z: 0 } }
      to left side:
        Type: position setter
        Properties: { Position: !vec { X: -7, Y: 0, Z: 0 } }

  # --- Tunnel mouths: stepping into a side opening warps Pacman to the other side. ---
  tunnel left:
    Position: !vec { X: -8, Y: 0, Z: 0 }
    Behaviours:
      collider:
        Type: box collider
        Properties: { Size: !vec { X: 1, Y: 1, Z: 1 }, IsTrigger: true }
      sense:
        Type: trigger enter trigger
        Properties: { TagsToDetect: [ pacman ] }
        Listeners: [ { EntityId: pacman, BehaviourId: to right side } ]
  tunnel right:
    Position: !vec { X: 8, Y: 0, Z: 0 }
    Behaviours:
      collider:
        Type: box collider
        Properties: { Size: !vec { X: 1, Y: 1, Z: 1 }, IsTrigger: true }
      sense:
        Type: trigger enter trigger
        Properties: { TagsToDetect: [ pacman ] }
        Listeners: [ { EntityId: pacman, BehaviourId: to left side } ]

  # --- Shared counters every dot / power pill / eaten ghost writes to. ---
  trackers:
    Behaviours:
      add dot score:
        Type: int variable setter
        Properties:
          VariableId: !var score
          Value: !expr { Do: 'score + 10', With: { score: !var score }, ArgumentTypes: [ int ] }
      add dot count:
        Type: int variable setter
        Properties:
          VariableId: !var dots eaten
          Value: !expr { Do: 'dots_eaten + 1', With: { dots_eaten: !var dots eaten }, ArgumentTypes: [ int ] }
      add power score:
        Type: int variable setter
        Properties:
          VariableId: !var score
          Value: !expr { Do: 'score + 50', With: { score: !var score }, ArgumentTypes: [ int ] }
      arm fright:
        Type: float variable setter
        Properties:
          VariableId: !var fright until
          Value: !expr
            Do: 'time + fright_duration'
            With: { time: !clock time, fright_duration: !var fright duration }
            ArgumentTypes: [ float, float ]
            ReturnType: float
      add ghost score:
        Type: int variable setter
        Properties:
          VariableId: !var score
          Value: !expr { Do: 'score + 200', With: { score: !var score }, ArgumentTypes: [ int ] }

  # --- Game logic: capture the dot total, keep `frightened` in sync, end on a clear. ---
  logic:
    Behaviours:
      setup:
        Type: on start trigger
        Listeners: [ { EntityId: logic, BehaviourId: set total } ]
      set total:
        Type: int variable setter
        Properties:
          VariableId: !var dots total
          Value: !expr { Do: pill count }
      fright tick:
        Type: every frame trigger
        Listeners: [ { EntityId: logic, BehaviourId: update fright } ]
      update fright:
        Type: bool variable setter
        Properties:
          VariableId: !var frightened
          Value: !expr
            Do: 'time < fright_until'
            With: { time: !clock time, fright_until: !var fright until }
            ArgumentTypes: [ float, float ]
            ReturnType: bool
      win tick:
        Type: every frame trigger
        Listeners: [ { EntityId: logic, BehaviourId: win gate } ]
      win gate:
        Type: condition gate
        Properties:
          Condition: !expr
            Do: 'dots_total > 0 && dots_eaten >= dots_total'
            With: { dots_total: !var dots total, dots_eaten: !var dots eaten }
            ArgumentTypes: [ int, int ]
        Listeners: [ !gameover ]

  # --- HUD ---
  hud:
    Behaviours:
      canvas:
        Type: ui canvas
        Properties: { MatchWidthOrHeight: 0.5 }
    Children:
      row:
        Behaviours:
          layout:
            Type: ui container
            Properties: { Direction: vertical, Padding: 16, ChildAlignment: upper-center }
        Children:
          line:
            Behaviours:
              label:
                Type: text label
                Properties:
                  Text: !text { Key: hud.line, Arguments: [ !var score, !var dots eaten, !var dots total ] }
                  FontSize: 26
                  PreferredWidth: 900
                  PreferredHeight: 44

  camera:
    Position: !var camera position
    Behaviours:
      camera:
        Type: camera
        Properties: { View: "orthographic", Size: !var camera size }
