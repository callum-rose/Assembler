Game:
  Title: Flappy Bird
  Description: >
    Press Space to flap. Gravity pulls the bird down; hit the ground,
    ceiling, or a pipe and it's game over. Pass through a pipe gap to score.

World:
  Dimensionality: 2
  BackgroundColor: "#70C5CE"

Physics:
  # Gravity is applied manually to the bird's velocity each frame.
  Gravity: !vec { X: 0, Y: 0 }

Constants:
  # Bird
  bird start position: !vec { X: -3, Y: 0 }
  bird size: !vec { X: 0.6, Y: 0.6 }
  bird gravity: 18.0
  jump velocity: !vec { X: 0, Y: 7 }
  initial bird velocity: !vec { X: 0, Y: 0 }

  # Pipes
  pipe spawn x: 8.0
  pipe lifetime: 5.0
  pipe velocity: !vec { X: -5.5, Y: 0 }
  pipe spawn interval: 1.3
  pipe size: !vec { X: 1.0, Y: 6.0 }
  pipe half height: 3.0
  gap half height: 2.0
  gap y min: -1.8
  gap y max: 1.8
  initial gap y: 0.0
  score zone size: !vec { X: 0.3, Y: 4.0 }

  # Walls
  ground position: !vec { X: 0, Y: -5.0 }
  ground size: !vec { X: 30, Y: 1 }
  ground colour: !colour { R: 0.55, G: 0.35, B: 0.15 }
  ceiling position: !vec { X: 0, Y: 5.5 }
  ceiling size: !vec { X: 30, Y: 1 }

  # Score
  initial score: 0
  score per pipe: 1

  # Camera
  camera position: !vec { X: 0, Y: 0, Z: -10 }
  camera view: "orthographic"
  camera size: 6

Variables:
  bird velocity: !var initial bird velocity
  is dead: false
  score: !var initial score
  current gap y: !var initial gap y

# Flapping is wired to one abstract `flap` button action. Desktop binds it to
# Space; mobile binds it to the on-screen Flap button.
Controls:
  Actions:
    flap: { Type: button, Phase: down }

  Bindings:
    desktop:
      flap: [ "<Keyboard>/space" ]
    mobile:
      flap: [ "<Gamepad>/buttonSouth" ]

  OnScreen:
    - Type: button
      Action: flap
      Label: Flap
      Anchor: lower-center
      Offset: { X: 0, Y: 240 }
      Size:   { X: 460, Y: 300 }

Templates:
  pipe_template:
    Tags: [ pipe ]
    Behaviours:
      gizmo:
        Type: cube gizmo
        Properties:
          Size: !var pipe size
          IsWire: false
          Colour: !colour green
      collider:
        Type: box collider
        Properties:
          Size: !var pipe size
          IsTrigger: true
      move:
        Type: velocity
        Properties:
          Velocity: !var pipe velocity
      lifetime:
        Type: timer trigger
        Properties:
          Delay: !var pipe lifetime
        Listeners: [ self destruct ]
      self destruct:
        Type: destroy

  score_zone_template:
    Tags: [ score zone ]
    Behaviours:
      collider:
        Type: box collider
        Properties:
          Size: !var score zone size
          IsTrigger: true
      move:
        Type: velocity
        Properties:
          Velocity: !var pipe velocity
      bird passed:
        Type: trigger enter trigger
        Properties:
          TagsToDetect: [ bird ]
        Listeners:
          - EntityId: score tracker
            BehaviourId: increment score
          - self destruct
      lifetime:
        Type: timer trigger
        Properties:
          Delay: !var pipe lifetime
        Listeners: [ self destruct ]
      self destruct:
        Type: destroy

Entities:
  # Game-over poll: every frame the gate checks the end condition; when it
  # holds, the gate fires !gameover, which ends and unloads the game.
  game over:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      tick:
        Type: every frame trigger
        Listeners: [ gate ]
      gate:
        Type: condition gate
        Properties:
          Condition: !expr
            Do: 'is_dead'
            With:
              is_dead: !var is dead
        Listeners:
          - !gameover

  # --- Bird ---
  bird:
    Tags: [ bird ]
    Position: !var bird start position
    Behaviours:
      gizmo:
        Type: cube gizmo
        Properties:
          Size: !var bird size
          IsWire: false
          Colour: !colour yellow
      collider:
        Type: box collider
        Properties:
          Size: !var bird size
          IsTrigger: true
      rigidbody:
        Type: rigidbody
        Properties:
          UseGravity: false
      move:
        Type: velocity
        Properties:
          Velocity: !var bird velocity

      tick:
        Type: every frame trigger
        Listeners: [ apply gravity ]
      apply gravity:
        Type: vector variable setter
        Properties:
          VariableId: !var bird velocity
          Value: !expr
            Do: 'IntegratePosition(velocity, new UnityEngine.Vector3(0f, -gravity, 0f), dt)'
            With:
              velocity: !var bird velocity
              gravity: !var bird gravity
              dt: !clock deltaTime

      jump key:
        Type: input action
        Properties: { Action: flap }
        Listeners: [ jump ]
      jump:
        Type: vector variable setter
        Properties:
          VariableId: !var bird velocity
          Value: !var jump velocity

      hit obstacle:
        Type: trigger enter trigger
        Properties:
          TagsToDetect: [ pipe, wall ]
        Listeners: [ die ]
      die:
        Type: bool variable setter
        Properties:
          VariableId: !var is dead
          Value: true

  # --- Walls ---
  ground:
    Tags: [ wall ]
    Position: !var ground position
    Behaviours:
      gizmo:
        Type: cube gizmo
        Properties:
          Size: !var ground size
          IsWire: false
          Colour: !var ground colour
      collider:
        Type: box collider
        Properties:
          Size: !var ground size
          IsTrigger: true

  ceiling:
    Tags: [ wall ]
    Position: !var ceiling position
    Behaviours:
      collider:
        Type: box collider
        Properties:
          Size: !var ceiling size
          IsTrigger: true

  # --- Pipe spawner ---
  pipe spawner:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      tick:
        Type: interval trigger
        Properties:
          Interval: !var pipe spawn interval
          Count: 0
          AutoStart: true
        Listeners:
          - randomize gap
          - spawn top pipe
          - spawn bottom pipe
          - spawn score zone

      randomize gap:
        Type: float variable setter
        Properties:
          VariableId: !var current gap y
          Value: !expr
            Do: 'RandomFloat(min, max)'
            With:
              min: !var gap y min
              max: !var gap y max

      spawn top pipe:
        Type: spawner
        Properties:
          TemplateId: pipe_template
          Position: !expr
            Do: 'new UnityEngine.Vector3(spawn_x, gap_y + gap_half + pipe_half, 0f)'
            With:
              spawn_x: !var pipe spawn x
              gap_y: !var current gap y
              gap_half: !var gap half height
              pipe_half: !var pipe half height
          Rotation: !vec { X: 0, Y: 0, Z: 0 }

      spawn bottom pipe:
        Type: spawner
        Properties:
          TemplateId: pipe_template
          Position: !expr
            Do: 'new UnityEngine.Vector3(spawn_x, gap_y - gap_half - pipe_half, 0f)'
            With:
              spawn_x: !var pipe spawn x
              gap_y: !var current gap y
              gap_half: !var gap half height
              pipe_half: !var pipe half height
          Rotation: !vec { X: 0, Y: 0, Z: 0 }

      spawn score zone:
        Type: spawner
        Properties:
          TemplateId: score_zone_template
          Position: !expr
            Do: 'new UnityEngine.Vector3(spawn_x, gap_y, 0f)'
            With:
              spawn_x: !var pipe spawn x
              gap_y: !var current gap y
          Rotation: !vec { X: 0, Y: 0, Z: 0 }

  # --- Score tracker ---
  score tracker:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      increment score:
        Type: int variable setter
        Properties:
          VariableId: !var score
          Value: !expr
            Do: 'current_score + increment'
            With:
              current_score: !var score
              increment: !var score per pipe

  # --- Camera ---
  camera:
    Tags: [ camera ]
    Position: !var camera position
    Behaviours:
      camera:
        Type: camera
        Properties:
          View: !var camera view
          Size: !var camera size

  # --- HUD ---
  score display:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      label:
        Type: text label
        Properties:
          Text: !expr
            Do: '"Score: " + score'
            With:
              score: !var score
          FontSize: 32
          Rect:
            Anchor: top-center
            X: -50
            Y: 20
            Width: 200
            Height: 50
