Game:
  Title: Camera Orbit + Confiner Demo (3D)
  Description: >
    A single Cinemachine `camera orbit` rig auto-orbits the player at a fixed radius and height
    (OrbitSpeed spins it continuously, so it visibly circles even when nothing moves), and a
    `camera confiner` (3D mode) clamps that orbiting camera inside the arena box — the arena is
    deliberately smaller than the orbit radius, so you can see the circular path get squared off
    against the walls. Move the player with WASD; press Q to quit.

World:
  Dimensionality: 3
  BackgroundColor: "#141821"

Constants:
  step forward: !vec { X: 0, Y: 0, Z: 0.12 }
  step back: !vec { X: 0, Y: 0, Z: -0.12 }
  step left: !vec { X: -0.12, Y: 0, Z: 0 }
  step right: !vec { X: 0.12, Y: 0, Z: 0 }
  camera start: !vec { X: 0, Y: 6, Z: -12 }

Entities:
  player:
    Tags: [ player ]
    Position: !vec { X: 0, Y: 0.5, Z: 0 }
    Rotation: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      body:
        Type: cube gizmo
        Properties:
          Size: !vec { X: 1, Y: 1, Z: 1 }
          IsWire: false
          Colour: !colour green
      hold forward:
        Type: key hold trigger
        Properties:
          Key: "w"
        Listeners:
          - EntityId: player
            BehaviourId: move forward
      move forward:
        Type: translate
        Properties:
          Displacement: !var step forward
      hold back:
        Type: key hold trigger
        Properties:
          Key: "s"
        Listeners:
          - EntityId: player
            BehaviourId: move back
      move back:
        Type: translate
        Properties:
          Displacement: !var step back
      hold left:
        Type: key hold trigger
        Properties:
          Key: "a"
        Listeners:
          - EntityId: player
            BehaviourId: move left
      move left:
        Type: translate
        Properties:
          Displacement: !var step left
      hold right:
        Type: key hold trigger
        Properties:
          Key: "d"
        Listeners:
          - EntityId: player
            BehaviourId: move right
      move right:
        Type: translate
        Properties:
          Displacement: !var step right
      quit:
        Type: key down trigger
        Properties:
          Key: "q"
        Listeners: [ !gameover ]

  # Corner posts give the orbiting camera some parallax so the motion reads clearly.
  post a:
    Position: !vec { X: -6, Y: 1.5, Z: 6 }
    Rotation: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      body:
        Type: cube gizmo
        Properties:
          Size: !vec { X: 1, Y: 3, Z: 1 }
          IsWire: false
          Colour: !colour red

  post b:
    Position: !vec { X: 6, Y: 1.5, Z: -6 }
    Rotation: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      body:
        Type: cube gizmo
        Properties:
          Size: !vec { X: 1, Y: 3, Z: 1 }
          IsWire: false
          Colour: !colour blue

  ground:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Rotation: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      body:
        Type: cube gizmo
        Properties:
          Size: !vec { X: 40, Y: 0.1, Z: 40 }
          IsWire: true
          Colour: !colour grey

  # 16-wide box (half-extent 8) — smaller than the 10-unit orbit radius, so the confiner clamps the
  # camera against the walls and the circular orbit visibly flattens at the edges.
  arena bounds:
    Position: !vec { X: 0, Y: 5, Z: 0 }
    Rotation: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      body:
        Type: cube gizmo
        Properties:
          Size: !vec { X: 16, Y: 12, Z: 16 }
          IsWire: true
          Colour: !colour cyan
      bounds:
        Type: box collider
        Properties:
          Size: !vec { X: 16, Y: 12, Z: 16 }
          IsTrigger: true

  camera:
    Tags: [ camera ]
    Position: !var camera start
    Rotation: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      camera:
        Type: camera
        Properties:
          View: "perspective"
          DefaultBlend: 0.5

  orbit rig:
    Position: !var camera start
    Rotation: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      orbit:
        Type: camera orbit
        Properties:
          Target: { Tag: player }
          Radius: 10
          Height: 3
          OrbitSpeed: 30
          Damping: 0.5
          Priority: 10
          Lens: 60
      # Modifier: clamps the orbiting camera inside the arena box. Must come after `orbit`.
      confine:
        Type: camera confiner
        Properties:
          Bounds: { Id: arena bounds }
          Mode: "3d"
          Padding: 0.5
