Game:
  Title: Lit Primitives (3D)
  Description: >
    A WASD-driven cube on a ground plane amid coloured pillars, all rendered with
    real `primitive` meshes (not editor gizmos) lit by a single directional `light`.
    Demonstrates that a 3D scene built from primitives is visible in the Game view
    without any manual editor lighting setup — the directional light is oriented by
    its entity's Rotation (Euler), and a dim point light adds local fill.

World:
  Dimensionality: 3
  BackgroundColor: "#141821"

Constants:
  step forward: !vec { X: 0, Y: 0, Z: 0.12 }
  step back: !vec { X: 0, Y: 0, Z: -0.12 }
  step left: !vec { X: -0.12, Y: 0, Z: 0 }
  step right: !vec { X: 0.12, Y: 0, Z: 0 }
  follow offset: !vec { X: 0, Y: 5, Z: -10 }
  camera start: !vec { X: 0, Y: 5, Z: -10 }

Entities:
  sun:
    # A directional light shines along its forward axis; tilt it via Rotation so the
    # scene is lit from above-front rather than straight down +Z.
    Rotation: !vec { X: 50, Y: -30, Z: 0 }
    Behaviours:
      light:
        Type: light
        Properties:
          Type: directional
          Colour: !colour white
          Intensity: 1.1

  fill:
    Position: !vec { X: 0, Y: 4, Z: 8 }
    Behaviours:
      light:
        Type: light
        Properties:
          Type: point
          Colour: !colour "#88aaff"
          Intensity: 0.6
          Range: 25

  player:
    Tags: [ player ]
    Position: !vec { X: 0, Y: 0.5, Z: 0 }
    Behaviours:
      body:
        Type: primitive
        Properties:
          Shape: cube
          Colour: !colour green
          Size: !vec { X: 1, Y: 1, Z: 1 }
      hold forward:
        Type: key hold trigger
        Properties:
          Key: "w"
        Listeners:
          - EntityId: player
            BehaviourId: move forward
      move forward:
        Type: translate
        Properties:
          Displacement: !var step forward
      hold back:
        Type: key hold trigger
        Properties:
          Key: "s"
        Listeners:
          - EntityId: player
            BehaviourId: move back
      move back:
        Type: translate
        Properties:
          Displacement: !var step back
      hold left:
        Type: key hold trigger
        Properties:
          Key: "a"
        Listeners:
          - EntityId: player
            BehaviourId: move left
      move left:
        Type: translate
        Properties:
          Displacement: !var step left
      hold right:
        Type: key hold trigger
        Properties:
          Key: "d"
        Listeners:
          - EntityId: player
            BehaviourId: move right
      move right:
        Type: translate
        Properties:
          Displacement: !var step right
      quit:
        Type: key down trigger
        Properties:
          Key: "Escape"
        Listeners:
          - !gameover

  ground:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      body:
        Type: primitive
        Properties:
          Shape: cube
          Colour: !colour grey
          Size: !vec { X: 40, Y: 0.1, Z: 40 }

  pillar a:
    Position: !vec { X: -6, Y: 1.5, Z: 6 }
    Behaviours:
      body:
        Type: primitive
        Properties:
          Shape: cylinder
          Colour: !colour red
          Size: !vec { X: 1, Y: 1.5, Z: 1 }

  pillar b:
    Position: !vec { X: 6, Y: 1.5, Z: 10 }
    Behaviours:
      body:
        Type: primitive
        Properties:
          Shape: capsule
          Colour: !colour blue
          Size: !vec { X: 1, Y: 1.5, Z: 1 }

  pillar c:
    Position: !vec { X: 0, Y: 1.5, Z: 14 }
    Behaviours:
      body:
        Type: primitive
        Properties:
          Shape: sphere
          Colour: !colour yellow
          Size: !vec { X: 2, Y: 2, Z: 2 }

  camera:
    Tags: [ camera ]
    Position: !var camera start
    Behaviours:
      camera:
        Type: camera
        Properties:
          View: "perspective"
          DefaultBlend: 0.5

  camera rig:
    Position: !var camera start
    Behaviours:
      follow:
        Type: camera follow
        Properties:
          Target: { Tag: player }
          LookAt: { Tag: player }
          Mode: "3d"
          Priority: 10
          Lens: 60
          Damping: 0.5
          FollowOffset: !var follow offset
