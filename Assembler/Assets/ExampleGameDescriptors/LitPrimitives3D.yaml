Game:
  Title: Lit Primitives (3D)
  Description: >
    A WASD-driven cube on a ground plane amid coloured pillars, all rendered with
    real `primitive` meshes (not editor gizmos) lit by a single directional `light`.
    Demonstrates that a 3D scene built from primitives is visible in the Game view
    without any manual editor lighting setup — the directional light is oriented by
    its entity's Rotation (Euler), and a dim point light adds local fill.

World:
  Dimensionality: 3
  BackgroundColor: "#141821"

Constants:
  # Per-frame ground-plane step applied to the analogue move vector. The value
  # action fires every frame, so this is the player's top speed in units/frame.
  move step: 0.12
  follow offset: !vec { X: 0, Y: 5, Z: -10 }
  camera start: !vec { X: 0, Y: 5, Z: -10 }

# Abstract actions + the physical inputs that feed them. Gameplay is wired to the
# named actions; only this block knows about physical keys, so input is bound
# per platform here rather than hard-coded into the entities.
Controls:
  Actions:
    move: { Type: value, ValueType: vector2 }   # emits axis/x/y every frame
    quit: { Type: button, Phase: down }          # fires once on press

  Bindings:
    desktop:
      move:
        - Composite: 2DVector
          Up: "<Keyboard>/w"
          Down: "<Keyboard>/s"
          Left: "<Keyboard>/a"
          Right: "<Keyboard>/d"
      quit:
        - "<Keyboard>/escape"

Entities:
  sun:
    # A directional light shines along its forward axis; tilt it via Rotation so the
    # scene is lit from above-front rather than straight down +Z.
    Rotation: !vec { X: 50, Y: -30, Z: 0 }
    Behaviours:
      light:
        Type: light
        Properties:
          Type: directional
          Colour: !colour white
          Intensity: 1.1

  fill:
    Position: !vec { X: 0, Y: 4, Z: 8 }
    Behaviours:
      light:
        Type: light
        Properties:
          Type: point
          Colour: !colour "#88aaff"
          Intensity: 0.6
          Range: 25

  player:
    Tags: [ player ]
    Position: !vec { X: 0, Y: 0.5, Z: 0 }
    Behaviours:
      body:
        Type: primitive
        Properties:
          Shape: cube
          Colour: !colour green
          Size: !vec { X: 1, Y: 1, Z: 1 }
      # Analogue movement on the ground plane: the move value action emits x/y
      # every frame, mapped to world X (left/right) and Z (forward/back).
      move action:
        Type: input action
        Properties:
          Action: move
        Listeners:
          - EntityId: player
            BehaviourId: apply move
      apply move:
        Type: translate
        Properties:
          Displacement: !expr
            Do: 'new UnityEngine.Vector3(arg0 * arg2, 0f, arg1 * arg2)'
            With:
              - !output x
              - !output y
              - !var move step
      # Press Escape (the quit action's bound key) to give up.
      quit action:
        Type: input action
        Properties:
          Action: quit
        Listeners:
          - !gameover

  ground:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      body:
        Type: primitive
        Properties:
          Shape: cube
          Colour: !colour grey
          Size: !vec { X: 40, Y: 0.1, Z: 40 }

  pillar a:
    Position: !vec { X: -6, Y: 1.5, Z: 6 }
    Behaviours:
      body:
        Type: primitive
        Properties:
          Shape: cylinder
          Colour: !colour red
          Size: !vec { X: 1, Y: 1.5, Z: 1 }

  pillar b:
    Position: !vec { X: 6, Y: 1.5, Z: 10 }
    Behaviours:
      body:
        Type: primitive
        Properties:
          Shape: capsule
          Colour: !colour blue
          Size: !vec { X: 1, Y: 1.5, Z: 1 }

  pillar c:
    Position: !vec { X: 0, Y: 1.5, Z: 14 }
    Behaviours:
      body:
        Type: primitive
        Properties:
          Shape: sphere
          Colour: !colour yellow
          Size: !vec { X: 2, Y: 2, Z: 2 }

  camera:
    Tags: [ camera ]
    Position: !var camera start
    Behaviours:
      camera:
        Type: camera
        Properties:
          View: "perspective"
          DefaultBlend: 0.5

  camera rig:
    Position: !var camera start
    Behaviours:
      follow:
        Type: camera follow
        Properties:
          Target: { Tag: player }
          LookAt: { Tag: player }
          Mode: "3d"
          Priority: 10
          Lens: 60
          Damping: 0.5
          FollowOffset: !var follow offset
