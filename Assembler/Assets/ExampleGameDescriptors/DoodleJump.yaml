Game:
  Title: Doodle Jump
  Description: >
    Move left and right with the arrow keys (or A/D). The doodler bounces
    automatically when it falls onto a platform. Climb as high as you can —
    fall off the bottom of the screen and it's game over. Walking off the
    left or right edge wraps around to the other side.

World:
  Dimensionality: 2
  BackgroundColor: "#FFE5B4"

Physics:
  # Gravity is applied manually to the player's velocity each frame.
  Gravity: !vec { X: 0, Y: 0 }

Constants:
  # --- Player ---
  player start position: !vec { X: 0, Y: 0 }
  player size: !vec { X: 0.7, Y: 0.7 }
  player gravity: 30.0
  player jump speed: 14.0
  player move speed: 6.5
  initial player velocity: !vec { X: 0, Y: 0 }
  player colour: !colour { R: 0.95, G: 0.75, B: 0.2 }

  # --- World bounds (matches camera ortho size & aspect) ---
  world half width: 5.5
  camera size: 7.0
  camera z: -10.0
  game over distance: 8.0

  # --- Platforms ---
  platform size: !vec { X: 1.4, Y: 0.3 }
  platform colour: !colour { R: 0.3, G: 0.75, B: 0.35 }
  initial platform y: -4.0
  platform spacing: 1.4
  spawn lookahead: 12.0
  platform lifetime: 60.0

  # --- Starter platform (so the player has something under it on frame 1) ---
  starter platform position: !vec { X: 0, Y: -2.0 }

  # --- State init ---
  initial max height: 0.0

Variables:
  player position: !var player start position
  player velocity: !var initial player velocity
  # Horizontal input (-1..1), written each frame from the `move` action.
  move x: 0.0
  max height: !var initial max height
  next platform y: !var initial platform y
  is dead: false

# Horizontal movement is wired to one abstract `move` (vector2) action. Desktop
# binds it to A/D + the arrow keys; mobile binds it to the on-screen joystick.
Controls:
  Actions:
    move: { Type: value, ValueType: vector2 }

  Bindings:
    desktop:
      move:
        - Composite: 2DVector
          Up: "<Keyboard>/w"
          Down: "<Keyboard>/s"
          Left: "<Keyboard>/a"
          Right: "<Keyboard>/d"
        - Composite: 2DVector
          Up: "<Keyboard>/upArrow"
          Down: "<Keyboard>/downArrow"
          Left: "<Keyboard>/leftArrow"
          Right: "<Keyboard>/rightArrow"
    mobile:
      move: [ "<Gamepad>/leftStick" ]   # joystick → a stick control

  OnScreen:
    - Type: joystick
      Action: move
      Anchor: lower-left
      Offset: { X: 260, Y: 260 }
      Size:   { X: 360, Y: 360 }

Expressions:
  apply input:
    ArgumentTypes: [ vector, float, float ]
    ArgumentNames: [ vel, moveX, speed ]
    ReturnType: vector
    Expression: |
      return new UnityEngine.Vector3(moveX * speed, vel.y, 0f);

  integrate position:
    ArgumentTypes: [ vector, vector, float, float ]
    ArgumentNames: [ pos, vel, halfW, dt ]
    ReturnType: vector
    Expression: |
      var p = IntegratePosition(pos, vel, dt);
      float nx = p.x;
      if (nx > halfW) nx = nx - 2f * halfW;
      if (nx < -halfW) nx = nx + 2f * halfW;
      return new UnityEngine.Vector3(nx, p.y, 0f);

  random platform position:
    ArgumentTypes: [ float, float ]
    ArgumentNames: [ y, halfW ]
    ReturnType: vector
    Expression: |
      float x = RandomFloat(-halfW, halfW);
      return new UnityEngine.Vector3(x, y, 0f);

  format score:
    ArgumentTypes: [ float ]
    ArgumentNames: [ y ]
    ReturnType: string
    Expression: |
      int s = (int)(y * 10f);
      return "Score: " + s;

Templates:
  platform_template:
    Tags: [ platform ]
    Behaviours:
      gizmo:
        Type: cube gizmo
        Properties:
          Size: !var platform size
          IsWire: false
          Colour: !var platform colour
      collider:
        Type: box collider
        Properties:
          Size: !var platform size
          IsTrigger: true
      lifetime:
        Type: timer trigger
        Properties:
          Delay: !var platform lifetime
        Listeners: [ self destruct ]
      self destruct:
        Type: destroy

Entities:
  # Game-over poll: every frame the gate checks the end condition; when it
  # holds, the gate fires !gameover, which ends and unloads the game.
  game over:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      tick:
        Type: every frame trigger
        Listeners: [ gate ]
      gate:
        Type: condition gate
        Properties:
          Condition: !expr
            Do: 'arg3 || (arg0.y < (arg1 - arg2))'
            With:
              - !var player position
              - !var max height
              - !var game over distance
              - !var is dead
        Listeners:
          - !gameover

  # --- Player (the doodler) ---
  player:
    Tags: [ player ]
    Position: !var player start position
    Behaviours:
      gizmo:
        Type: cube gizmo
        Properties:
          Size: !var player size
          IsWire: false
          Colour: !var player colour
      collider:
        Type: box collider
        Properties:
          Size: !var player size
          IsTrigger: true
      rigidbody:
        Type: rigidbody
        Properties:
          UseGravity: false

      # ---- Per-frame physics tick ----
      tick:
        Type: every frame trigger
        Listeners:
          - apply gravity
          - apply input
          - integrate position
          - write position
          - update max height

      apply gravity:
        Type: vector variable setter
        Properties:
          VariableId: !var player velocity
          Value: !expr
            Do: 'IntegratePosition(arg0, new UnityEngine.Vector3(0f, -arg1, 0f), arg2)'
            With:
              - !var player velocity
              - !var player gravity
              - !clock deltaTime

      apply input:
        Type: vector variable setter
        Properties:
          VariableId: !var player velocity
          Value: !expr
            Do: apply input
            With:
              - !var player velocity
              - !var move x
              - !var player move speed

      integrate position:
        Type: vector variable setter
        Properties:
          VariableId: !var player position
          Value: !expr
            Do: integrate position
            With:
              - !var player position
              - !var player velocity
              - !var world half width
              - !clock deltaTime

      write position:
        Type: position setter
        Properties:
          Position: !var player position

      update max height:
        Type: float variable setter
        Properties:
          VariableId: !var max height
          Value: !expr
            Do: 'Max(arg0, arg1)'
            ArgumentTypes: [ float, float ]
            With:
              - !var max height
              - !expr
                  Do: 'arg0.y'
                  With:
                    - !var player position

      # ---- Input: the `move` action (A/D + arrows on desktop, on-screen joystick
      #      on mobile) writes its x into `move x` each frame; the tick's
      #      `apply input` reads it to set horizontal velocity. ----
      move input:
        Type: input action
        Properties: { Action: move }
        Listeners: [ set move x ]
      set move x:
        Type: float variable setter
        Properties:
          VariableId: !var move x
          Value: !expr
            Do: 'arg0'
            ArgumentTypes: [ float ]
            ReturnType: float
            With:
              - !output x

      # ---- Bouncing on platforms (only when falling) ----
      land on platform:
        Type: trigger enter trigger
        Properties:
          TagsToDetect: [ platform ]
        Listeners: [ bounce gate ]
      bounce gate:
        Type: condition gate
        Properties:
          Condition: !expr
            Do: 'arg0.y < 0f'
            With:
              - !var player velocity
        Listeners: [ bounce ]
      bounce:
        Type: vector variable setter
        Properties:
          VariableId: !var player velocity
          Value: !expr
            Do: 'new UnityEngine.Vector3(arg0.x, arg1, 0f)'
            With:
              - !var player velocity
              - !var player jump speed

  # --- Starter platform so the player has something under it at game start ---
  starter platform:
    Tags: [ platform ]
    Position: !var starter platform position
    Behaviours:
      gizmo:
        Type: cube gizmo
        Properties:
          Size: !var platform size
          IsWire: false
          Colour: !var platform colour
      collider:
        Type: box collider
        Properties:
          Size: !var platform size
          IsTrigger: true

  # --- Platform spawner: streams platforms above the player's max height ---
  platform spawner:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      tick:
        Type: every frame trigger
        Listeners: [ spawn gate ]

      spawn gate:
        Type: condition gate
        Properties:
          Condition: !expr
            Do: 'arg0 < arg1 + arg2'
            With:
              - !var next platform y
              - !var max height
              - !var spawn lookahead
        Listeners: [ spawn platform, advance next y ]

      spawn platform:
        Type: spawner
        Properties:
          TemplateId: platform_template
          Position: !expr
            Do: random platform position
            With:
              - !var next platform y
              - !var world half width
          Rotation: !vec { X: 0, Y: 0, Z: 0 }

      advance next y:
        Type: float variable setter
        Properties:
          VariableId: !var next platform y
          Value: !expr
            Do: 'arg0 + arg1'
            With:
              - !var next platform y
              - !var platform spacing

  # --- Camera follows the player's max height ---
  camera:
    Tags: [ camera ]
    Position: !vec { X: 0, Y: 0, Z: -10 }
    Behaviours:
      camera:
        Type: camera
        Properties:
          View: "orthographic"
          Size: !var camera size
      tick:
        Type: every frame trigger
        Listeners: [ follow ]
      follow:
        Type: position setter
        Properties:
          Position: !expr
            Do: 'new UnityEngine.Vector3(0f, arg0, arg1)'
            With:
              - !var max height
              - !var camera z

  # --- HUD ---
  score display:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      label:
        Type: text label
        Properties:
          Text: !expr
            Do: format score
            With:
              - !var max height
          FontSize: 32
          Rect:
            Anchor: top-left
            X: 20
            Y: 20
            Width: 240
            Height: 50
