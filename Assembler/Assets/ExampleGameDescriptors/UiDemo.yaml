Game:
  Title: UI System Demo
  Description: |
    Demonstrates the composable uGUI UI blocks: a `ui canvas` root, a vertical
    `ui container` that auto-lays-out its children responsively, two `text label`s
    (one static, one bound to a live variable via an expression), and two
    `ui button`s.

    The "Click me" button is wired (via a listener) to an `int variable setter`
    that increments `clicks`; the counter label re-reads the value every frame, so
    it updates live — proving the click -> NotifyListeners -> setter -> bound-label
    loop. The "Quit" button fires the framework's `!gameover` path to end the game.

    Requires the UI prefab library: run `Assembler > UI > Generate UI Prefabs`
    (or Tools/generate-ui-prefabs.sh) once before playing.

World:
  Dimensionality: 2
  BackgroundColor: "#101018"

Variables:
  clicks: 0

Expressions:
  increment:
    ArgumentTypes: [ int ]
    ArgumentNames: [ n ]
    ReturnType: int
    Expression: 'return n + 1;'
  format clicks:
    ArgumentTypes: [ int ]
    ArgumentNames: [ n ]
    ReturnType: string
    Expression: 'return "Clicks: " + n;'

Entities:
  ui:
    Behaviours:
      canvas:
        Type: ui canvas
        Properties:
          MatchWidthOrHeight: 0.5
    Children:
      root:
        Behaviours:
          layout:
            Type: ui container
            Properties:
              Direction: vertical
              Spacing: 16
              Padding: 24
              ChildAlignment: middle-center
        Children:
          title:
            Behaviours:
              label:
                Type: text label
                Properties:
                  Text: "UI System Demo"
                  FontSize: 48
                  PreferredWidth: 500
                  PreferredHeight: 80
          counter:
            Behaviours:
              label:
                Type: text label
                Properties:
                  Text: !expr
                    ExpressionId: format clicks
                    Arguments:
                      - !var clicks
                  FontSize: 32
                  PreferredWidth: 500
                  PreferredHeight: 60
          click button:
            Behaviours:
              button:
                Type: ui button
                Properties:
                  Label: "Click me"
                  PreferredWidth: 240
                  PreferredHeight: 70
                Listeners:
                  - EntityId: ui/root/logic
                    BehaviourId: inc
          quit button:
            Behaviours:
              button:
                Type: ui button
                Properties:
                  Label: "Quit"
                  PreferredWidth: 240
                  PreferredHeight: 70
                Listeners:
                  - !gameover
          logic:
            Behaviours:
              inc:
                Type: int variable setter
                Properties:
                  VariableId: !var clicks
                  Value: !expr
                    ExpressionId: increment
                    Arguments:
                      - !var clicks
