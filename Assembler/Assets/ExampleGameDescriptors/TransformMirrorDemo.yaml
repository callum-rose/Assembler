Game:
  Title: Transform Mirror Demo
  Description: |
    Shows off the `!entity { Id, Property }` tag reading all three transform
    properties — Position, Rotation, and Scale — live, every frame.

    A single gold `leader` cube drives itself:
      * it ORBITS the origin (position changes every frame),
      * it SPINS in place (rotation changes every frame, via `angular velocity`),
      * it PULSES bigger/smaller once a second (scale changes, via `scale animation`).

    Three "mirror" cubes each read ONE of the leader's transform properties off
    its transform — no shared variables — and react to it:
      * blue  `position mirror` copies `!entity { Id: leader, Property: Position }`
              (offset downward) so it orbits in lock-step below the leader.
      * green `rotation mirror` sets its own rotation to
              `!entity { Id: leader, Property: Rotation }` so it spins in sync,
              while staying put on the left.
      * red   `scale mirror` reads `!entity { Id: leader, Property: Scale }` and
              bobs up/down on the right as the leader pulses (taller leader =
              higher bob). There is no "scale setter" behaviour, so the scale
              read is visualised as vertical position instead.

    Press Escape to end.

World:
  Dimensionality: 2
  BackgroundColor: "#0d0d18"

Physics:
  Gravity: !vec { X: 0, Y: 0 }

Constants:
  spin speed: !vec { X: 0, Y: 0, Z: 90 }# leader self-spin, degrees/sec (Euler)
  big scale: !vec { X: 1.7, Y: 1.7, Z: 1.7 }
  small scale: !vec { X: 0.6, Y: 0.6, Z: 0.6 }
  unit size: !vec { X: 1, Y: 1, Z: 1 }

  leader colour: !colour { R: 1.0, G: 0.8, B: 0.2, A: 1 }
  position colour: !colour { R: 0.3, G: 0.6, B: 1.0, A: 1 }
  rotation colour: !colour { R: 0.4, G: 0.9, B: 0.4, A: 1 }
  scale colour: !colour { R: 1.0, G: 0.4, B: 0.4, A: 1 }

Variables:
  leader big: false                     # toggled each pulse to alternate grow/shrink

Controls:
  Actions:
    quit:  { Type: button, Phase: down }

  Bindings:
    desktop:
      quit:  [ "<Keyboard>/escape" ]
    mobile:
      quit: [ "<Gamepad>/start" ]

  OnScreen:
    - { Type: button, Action: quit, Label: "Quit", Anchor: upper-right, Offset: { X: 120, Y: 120 }, Size: { X: 180, Y: 180 } }

Entities:

  # ---- The leader: drives its own position, rotation, and scale ----
  leader:
    Position: !vec { X: 3, Y: 0 }       # start on the orbit
    Behaviours:
      body:
        Type: primitive
        Properties:
          Shape: cube
          Colour: !var leader colour
          Size: !var unit size
      spin:                             # continuous self-rotation (no trigger needed)
        Type: angular velocity
        Properties:
          AngularVelocity: !var spin speed
      orbit tick:
        Type: every frame trigger
        Listeners: [ orbit move ]
      orbit move:                       # teleport onto the orbit each frame
        Type: position setter
        Properties:
          Position: !expr
            Do: 'Rotate2D(new Vector3(3f, 0f, 0f), time * 50f)'
            With:
              time: !clock time
            ArgumentTypes: [ float ]
            RegisterTypes: [ UnityEngine.Vector3 ]
            ReturnType: vector
      pulse:                            # once a second: flip the target, retween scale
        Type: interval trigger
        Properties: { Interval: 1.0, AutoStart: true }
        Listeners: [ flip size, resize ]
      flip size:
        Type: bool variable setter
        Properties:
          VariableId: !var leader big
          Value: !expr { Do: '!big', With: { big: !var leader big }, ArgumentTypes: [ bool ], ReturnType: bool }
      resize:
        Type: scale animation
        Properties:
          End: !expr
            Do: 'leader_big ? big_scale : small_scale'
            With:
              leader_big: !var leader big
              big_scale: !var big scale
              small_scale: !var small scale
            ArgumentTypes: [ bool, vector, vector ]
            ReturnType: vector
          Duration: 1.0

  # ---- Position mirror: reads leader Position, orbits below it ----
  position mirror:
    Position: !vec { X: 3, Y: -4 }
    Behaviours:
      body:
        Type: primitive
        Properties:
          Shape: cube
          Colour: !var position colour
          Size: !var unit size
      track tick:
        Type: every frame trigger
        Listeners: [ copy position ]
      copy position:
        Type: position setter
        Properties:
          Position: !expr
            Do: 'leader_pos + new Vector3(0f, -4f, 0f)'
            With:
              leader_pos: !entity { Id: leader, Property: Position }
            ArgumentTypes: [ vector ]
            RegisterTypes: [ UnityEngine.Vector3 ]
            ReturnType: vector

  # ---- Rotation mirror: reads leader Rotation, spins in sync (stays put) ----
  rotation mirror:
    Position: !vec { X: -6, Y: 3 }
    Behaviours:
      body:
        Type: primitive
        Properties:
          Shape: cube
          Colour: !var rotation colour
          Size: !var unit size
      track tick:
        Type: every frame trigger
        Listeners: [ copy rotation ]
      copy rotation:                    # direct !entity read — no expression needed
        Type: rotation setter
        Properties:
          Rotation: !entity { Id: leader, Property: Rotation }

  # ---- Scale mirror: reads leader Scale, bobs vertically (no scale setter exists) ----
  scale mirror:
    Position: !vec { X: 6, Y: 0 }
    Behaviours:
      body:
        Type: primitive
        Properties:
          Shape: cube
          Colour: !var scale colour
          Size: !var unit size
      track tick:
        Type: every frame trigger
        Listeners: [ bob with scale ]
      bob with scale:
        Type: position setter
        Properties:
          Position: !expr
            Do: 'new Vector3(6f, (leader_scale.y - 1f) * 5f, 0f)'
            With:
              leader_scale: !entity { Id: leader, Property: Scale }
            ArgumentTypes: [ vector ]
            RegisterTypes: [ UnityEngine.Vector3 ]
            ReturnType: vector

  # ---- Camera ----
  camera:
    Position: !vec { X: 0, Y: 0, Z: -10 }
    Behaviours:
      cam:
        Type: camera
        Properties: { View: orthographic, Size: 8 }

  # ---- End the game ----
  end game:
    Behaviours:
      quit:
        Type: input action
        Properties: { Action: quit }
        Listeners:
          - !gameover
