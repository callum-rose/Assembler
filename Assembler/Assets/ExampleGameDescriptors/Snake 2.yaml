Game:
  Title: Snake 2
  Description: >
    Classic Snake. Use WASD (or the on-screen d-pad) to change direction. The
    snake moves one cell every interval, leaving body segments behind it. Eat
    food to grow longer and gain points. Hit a wall or your own tail and it's
    game over. Reach 10 points to win.

World:
  Dimensionality: 2
  BackgroundColor: "#000000"

Physics:
  Gravity: !vec { X: 0, Y: 0 }

Constants:
  # Scoring
  initial score: 0
  score per food: 1
  score to win: 10

  # Grid / movement
  cell size: 0.6
  step interval: 0.15
  initial segment lifetime: 0.75

  # Directions (one cell per step)
  dir up: !vec { X: 0, Y: 0.6 }
  dir down: !vec { X: 0, Y: -0.6 }
  dir left: !vec { X: -0.6, Y: 0 }
  dir right: !vec { X: 0.6, Y: 0 }
  zero vec: !vec { X: 0, Y: 0 }

  # Starting state
  head start position: !vec { X: 0, Y: 0 }
  initial direction: !vec { X: 0.6, Y: 0 }

  # Sizes
  head size: !vec { X: 0.55, Y: 0.55 }
  segment size: !vec { X: 0.5, Y: 0.5 }
  food size: !vec { X: 0.5, Y: 0.5 }
  horizontal wall size: !vec { X: 15.6, Y: 0.6 }
  vertical wall size: !vec { X: 0.6, Y: 15.6 }

  # Wall positions
  top wall position: !vec { X: 0, Y: 7.5 }
  bottom wall position: !vec { X: 0, Y: -7.5 }
  left wall position: !vec { X: -7.5, Y: 0 }
  right wall position: !vec { X: 7.5, Y: 0 }

  # Camera
  camera position: !vec { X: 0, Y: 0, Z: -10 }
  camera rotation: !vec { X: 0, Y: 0, Z: 0 }
  camera view: "orthographic"
  camera size: 8

Variables:
  score: !var initial score

  # Direction the snake will move on the next step. Updated by the move action.
  direction: !var initial direction

  # Tracks the head's logical grid position so spawners can place segments
  # at the snake's *previous* cell each tick (the spawner Position is a value
  # provider, so we can drive it from this variable).
  head pos: !var head start position

  # Where the head was on the previous tick — this is where new segments
  # spawn (one cell behind the head, so the head never overlaps its own
  # freshly-spawned tail piece).
  prev head pos: !var head start position

  # Lifetime applied to each spawned tail segment. Eating food extends this
  # so segments persist longer, making the snake effectively longer.
  segment lifetime: !var initial segment lifetime

  # Game over flag — set when the snake hits a wall or its own tail.
  is dead: false

  # Positions currently occupied by snake body segments. Updated each step:
  # the previous head cell is appended when a segment spawns, the oldest entry
  # is removed when a segment expires. The food-spawn expression reads this
  # to avoid placing food on top of the snake.
  segment positions: !vec []

# Driving is wired to one abstract `move` (vector2) action. On desktop WASD feeds
# it via a 2DVector composite; on mobile the on-screen d-pad feeds the same action.
# `snap dir` converts the analogue/d-pad vector into a cardinal cell step, holding
# the current heading when the input is neutral (so the snake keeps moving).
Controls:
  Actions:
    move: { Type: value, ValueType: vector2 }

  Bindings:
    desktop:
      move:
        - Composite: 2DVector
          Up: "<Keyboard>/w"
          Down: "<Keyboard>/s"
          Left: "<Keyboard>/a"
          Right: "<Keyboard>/d"
    mobile:
      move: [ "<Gamepad>/dpad" ]   # d-pad → a Vector2 dpad control

  OnScreen:
    - Type: dpad
      Action: move
      Anchor: lower-left
      Offset: { X: 280, Y: 280 }
      Size:   { X: 380, Y: 380 }

Expressions:
  intAdd:
    ArgumentTypes: [ int, int ]
    ArgumentNames: [ a, b ]
    ReturnType: int
    Expression: "a + b;"

  floatAdd:
    ArgumentTypes: [ float, float ]
    ArgumentNames: [ a, b ]
    ReturnType: float
    Expression: "a + b;"

  vecAdd:
    ArgumentTypes: [ vector, vector ]
    ArgumentNames: [ a, b ]
    ReturnType: vector
    Expression: "new UnityEngine.Vector3(a.x + b.x, a.y + b.y, a.z + b.z);"

  intGreaterOrEqual:
    ArgumentTypes: [ int, int ]
    ArgumentNames: [ a, b ]
    ReturnType: bool
    Expression: "a >= b;"

  isGameOver:
    ArgumentTypes: [ int, int, bool ]
    ArgumentNames: [ score, target, dead ]
    ReturnType: bool
    Expression: "score >= target || dead;"

  # Random food position snapped to the cell grid, within the arena bounds.
  # Takes the list of cells currently occupied by the snake so food never
  # spawns inside the body. Bails out after 50 attempts if the snake fills
  # the arena (in practice this never happens at score-to-win = 10).
  nextFoodPosition:
    ArgumentTypes: [ vector list ]
    ArgumentNames: [ taken ]
    ReturnType: vector
    RegisterTypes: [ UnityEngine.Vector3 ]
    Expression: >
      float halfArena = 6.6f;
      float cell = 0.6f;
      int attempts = 0;
      float x = 0f;
      float y = 0f;
      while (attempts < 50)
      {
          x = Round(RandomFloat(-halfArena, halfArena) / cell) * cell;
          y = Round(RandomFloat(-halfArena, halfArena) / cell) * cell;
          float fx = x;
          float fy = y;
          bool clash = taken.Any(p => p.x == fx && p.y == fy);
          if (!clash) { return new Vector3(x, y, 0f); }
          attempts++;
      }
      return new Vector3(x, y, 0f);

  formatScore:
    ArgumentTypes: [ int ]
    ArgumentNames: [ s ]
    ReturnType: string
    Expression: "\"Score: \" + s;"

  # Convert the move action's analogue/d-pad vector into a single cardinal cell
  # step (magnitude `cell`). A neutral input keeps the current heading, so the
  # snake glides on between presses exactly as the old key-down version did.
  snapDir:
    ArgumentTypes: [ vector, vector, float ]
    ArgumentNames: [ input, current, cell ]
    ReturnType: vector
    RegisterTypes: [ UnityEngine.Vector3 ]
    Expression: >
      if (Abs(input.x) < 0.3f && Abs(input.y) < 0.3f) { return current; }
      if (Abs(input.x) >= Abs(input.y)) { return new Vector3(input.x > 0f ? cell : -cell, 0f, 0f); }
      return new Vector3(0f, input.y > 0f ? cell : -cell, 0f);

Templates:
  h_wall_template:
    Tags: [ wall ]
    Behaviours:
      gizmo:
        Type: cube gizmo
        Properties:
          Size: !var horizontal wall size
          IsWire: false
          Colour: !colour white
      box collider:
        Type: box collider
        Properties:
          Size: !var horizontal wall size
          IsTrigger: false

  v_wall_template:
    Tags: [ wall ]
    Behaviours:
      gizmo:
        Type: cube gizmo
        Properties:
          Size: !var vertical wall size
          IsWire: false
          Colour: !colour white
      box collider:
        Type: box collider
        Properties:
          Size: !var vertical wall size
          IsTrigger: false

  # Body segment — spawned at the head's *previous* cell each step.
  # Has a timer trigger that destroys it after `segment lifetime` seconds,
  # creating the tail. Effective length = segment lifetime / step interval.
  segment_template:
    Tags: [ segment ]
    Behaviours:
      gizmo:
        Type: cube gizmo
        Properties:
          Size: !var segment size
          IsWire: false
          Colour: !colour green
      box collider:
        Type: box collider
        Properties:
          Size: !var segment size
          IsTrigger: true
      lifetime timer:
        Type: timer trigger
        Properties:
          Delay: !var segment lifetime
        Listeners:
          # Untrack first (segments expire FIFO, so index 0 is always the one
          # currently expiring), then destroy the GameObject.
          - EntityId: segment manager
            BehaviourId: untrack oldest segment
          - self destruct
      self destruct:
        Type: destroy

  # Food — visually a yellow square. On contact with the head it hides,
  # then food manager spawns the next piece and score is incremented.
  # Has a rigidbody so trigger detection works reliably even though the
  # head moves via transform-driven `translate`.
  food_template:
    Tags: [ food ]
    Behaviours:
      gizmo:
        Type: cube gizmo
        Properties:
          Size: !var food size
          IsWire: false
          Colour: !colour yellow
      box collider:
        Type: box collider
        Properties:
          Size: !var food size
          IsTrigger: true
      rigidbody:
        Type: rigidbody
        Properties:
          UseGravity: false
      eaten trigger:
        Type: trigger enter trigger
        Properties:
          TagsToDetect:
            - head
        Listeners:
          - EntityId: food manager
            BehaviourId: spawn next food
          - EntityId: score tracker
            BehaviourId: increment score
          - EntityId: segment manager
            BehaviourId: grow snake
          - self destruct
      self destruct:
        Type: destroy

Entities:
  # Game-over poll: every frame the gate checks the end condition; when it
  # holds, the gate fires !gameover, which ends and unloads the game.
  game over:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      tick:
        Type: every frame trigger
        Listeners: [ gate ]
      gate:
        Type: condition gate
        Properties:
          Condition: !expr
            Do: isGameOver
            With:
              score: !var score
              target: !var score to win
              dead: !var is dead
        Listeners:
          - !gameover

  # --- Walls ---
  top wall:
    Template: { Id: h_wall_template }
    Position: !var top wall position

  bottom wall:
    Template: { Id: h_wall_template }
    Position: !var bottom wall position

  left wall:
    Template: { Id: v_wall_template }
    Position: !var left wall position

  right wall:
    Template: { Id: v_wall_template }
    Position: !var right wall position

  # --- Snake Head ---
  snake head:
    Tags: [ head ]
    Position: !var head start position
    Behaviours:
      gizmo:
        Type: cube gizmo
        Properties:
          Size: !var head size
          IsWire: false
          Colour: !colour red

      box collider:
        Type: box collider
        Properties:
          Size: !var head size
          IsTrigger: false

      rigidbody:
        Type: rigidbody
        Properties:
          UseGravity: false

      # Stepped movement: every interval, record current head pos as the
      # previous cell, advance the logical head pos by direction, move the
      # transform, then spawn a segment at the previous cell.
      # Listener order matters — segment manager fires LAST so it reads the
      # updated `prev head pos` variable.
      step timer:
        Type: interval trigger
        Properties:
          Interval: !var step interval
        Listeners:
          - record prev pos
          - advance head pos
          - step move
          - EntityId: segment manager
            BehaviourId: spawn segment
          # After spawning the visible segment, record its position so the
          # food-spawn expression can avoid placing food there.
          - EntityId: segment manager
            BehaviourId: track segment position

      record prev pos:
        Type: vector variable setter
        Properties:
          VariableId: !var prev head pos
          Value: !var head pos

      advance head pos:
        Type: vector variable setter
        Properties:
          VariableId: !var head pos
          Value: !expr
            Do: vecAdd
            With:
              a: !var head pos
              b: !var direction

      step move:
        Type: translate
        Properties:
          Displacement: !var direction

      # Direction input — the `move` action (WASD on desktop, on-screen d-pad on
      # mobile) fires every frame; `snap dir` turns its vector into a cardinal
      # cell step, keeping the current heading when the stick/pad is neutral.
      move input:
        Type: input action
        Properties: { Action: move }
        Listeners: [ apply dir ]
      apply dir:
        Type: vector variable setter
        Properties:
          VariableId: !var direction
          Value: !expr
            Do: snapDir
            With:
              input: !output axis
              current: !var direction
              cell: !var cell size

      # Death triggers — wall collision (solid) or tail trigger sets is dead.
      wall hit:
        Type: collision enter trigger
        Properties:
          TagsToDetect:
            - wall
        Listeners:
          - EntityId: game manager
            BehaviourId: set dead

      self hit:
        Type: trigger enter trigger
        Properties:
          TagsToDetect:
            - segment
        Listeners:
          - EntityId: game manager
            BehaviourId: set dead

  # --- Segment Manager ---
  # Spawns a segment at the head's *previous* cell each tick. The segment
  # auto-destroys after `segment lifetime` seconds, so the tail trails the
  # head and naturally shortens at the back. Eating food increases the
  # lifetime, effectively growing the snake.
  segment manager:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      spawn segment:
        Type: spawner
        Properties:
          TemplateId: segment_template
          Position: !var prev head pos

      track segment position:
        Type: vector list add
        Properties:
          List: !var segment positions
          Value: !var prev head pos

      untrack oldest segment:
        Type: vector list remove at
        Properties:
          List: !var segment positions
          Index: 0

      grow snake:
        Type: float variable setter
        Properties:
          VariableId: !var segment lifetime
          Value: !expr
            Do: floatAdd
            With:
              a: !var segment lifetime
              b: !var step interval

  # --- Score Tracker ---
  score tracker:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      increment score:
        Type: int variable setter
        Properties:
          VariableId: !var score
          Value: !expr
            Do: intAdd
            With:
              a: !var score
              b: !var score per food

  # --- Food Manager ---
  # Spawns first food on start, then a new piece each time the current one
  # is eaten. Position is re-evaluated each spawn via the random expression.
  food manager:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      on start:
        Type: on start trigger
        Listeners: [ spawn next food ]

      spawn next food:
        Type: spawner
        Properties:
          TemplateId: food_template
          Position: !expr
            Do: nextFoodPosition
            With:
              taken: !var segment positions

  # --- Game Manager ---
  game manager:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      set dead:
        Type: bool variable setter
        Properties:
          VariableId: !var is dead
          Value: true

  # --- Score Display ---
  score display:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      score text:
        Type: text label
        Properties:
          Text: !expr
            Do: formatScore
            With:
              s: !var score
          FontSize: 32
          Rect:
            Anchor: top-left
            X: 20
            Y: 20
            Width: 200
            Height: 50

  # --- Camera ---
  camera:
    Tags: [ camera ]
    Position: !var camera position
    Rotation: !var camera rotation
    Behaviours:
      camera:
        Type: camera
        Properties:
          View: !var camera view
          Size: !var camera size
