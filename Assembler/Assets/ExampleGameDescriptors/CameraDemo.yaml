Game:
  Title: Camera Follow Demo
  Description: >
    A player cube driven by the arrow keys, followed by a Cinemachine virtual camera.
    Demonstrates the camera brain (on the output camera) plus a 2D `camera follow` vcam
    that tracks the player by entity tag, with dead-zone and damping framing.

World:
  Dimensionality: 2
  BackgroundColor: "#101018"

Constants:
  move step: !vec { X: 0.12, Y: 0, Z: 0 }
  move step left: !vec { X: -0.12, Y: 0, Z: 0 }
  move step up: !vec { X: 0, Y: 0.12, Z: 0 }
  move step down: !vec { X: 0, Y: -0.12, Z: 0 }
  camera position: !vec { X: 0, Y: 0, Z: -10 }

Controls:
  Actions:
    right: { Type: button, Phase: hold }
    left:  { Type: button, Phase: hold }
    up:    { Type: button, Phase: hold }
    down:  { Type: button, Phase: hold }
    quit:  { Type: button, Phase: down }

  Bindings:
    desktop:
      right: [ "<Keyboard>/rightArrow" ]
      left:  [ "<Keyboard>/leftArrow" ]
      up:    [ "<Keyboard>/upArrow" ]
      down:  [ "<Keyboard>/downArrow" ]
      quit:  [ "<Keyboard>/q" ]
    mobile:
      right: [ "<Gamepad>/dpad/right" ]
      left:  [ "<Gamepad>/dpad/left" ]
      up:    [ "<Gamepad>/dpad/up" ]
      down:  [ "<Gamepad>/dpad/down" ]
      quit:  [ "<Gamepad>/start" ]

  OnScreen:
    - { Type: button, Action: up,    Label: "▲", Anchor: lower-left,  Offset: { X: 305, Y: 450 }, Size: { X: 200, Y: 200 } }
    - { Type: button, Action: down,  Label: "▼", Anchor: lower-left,  Offset: { X: 305, Y: 20 },  Size: { X: 200, Y: 200 } }
    - { Type: button, Action: left,  Label: "◀", Anchor: lower-left,  Offset: { X: 80,  Y: 235 }, Size: { X: 200, Y: 200 } }
    - { Type: button, Action: right, Label: "▶", Anchor: lower-left,  Offset: { X: 530, Y: 235 }, Size: { X: 200, Y: 200 } }
    - { Type: button, Action: quit,  Label: "Quit", Anchor: upper-right, Offset: { X: 120, Y: 120 }, Size: { X: 180, Y: 180 } }

Entities:
  controls:
    Behaviours:
      quit:
        Type: input action
        Properties: { Action: quit }
        Listeners: [ !gameover ]

  player:
    Tags: [ player ]
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      body:
        Type: cube gizmo
        Properties:
          Size: !vec { X: 1, Y: 1 }
          IsWire: false
          Colour: !colour green
      hold right:
        Type: input action
        Properties:
          Action: right
        Listeners:
          - EntityId: player
            BehaviourId: move right
      move right:
        Type: translate
        Properties:
          Displacement: !var move step
      hold left:
        Type: input action
        Properties:
          Action: left
        Listeners:
          - EntityId: player
            BehaviourId: move left
      move left:
        Type: translate
        Properties:
          Displacement: !var move step left
      hold up:
        Type: input action
        Properties:
          Action: up
        Listeners:
          - EntityId: player
            BehaviourId: move up
      move up:
        Type: translate
        Properties:
          Displacement: !var move step up
      hold down:
        Type: input action
        Properties:
          Action: down
        Listeners:
          - EntityId: player
            BehaviourId: move down
      move down:
        Type: translate
        Properties:
          Displacement: !var move step down

  marker a:
    Position: !vec { X: -8, Y: 0, Z: 0 }
    Behaviours:
      body:
        Type: cube gizmo
        Properties:
          Size: !vec { X: 0.6, Y: 3 }
          IsWire: false
          Colour: !colour red

  marker b:
    Position: !vec { X: 6, Y: 2, Z: 0 }
    Behaviours:
      body:
        Type: cube gizmo
        Properties:
          Size: !vec { X: 0.6, Y: 3 }
          IsWire: false
          Colour: !colour blue

  marker c:
    Position: !vec { X: 12, Y: -2, Z: 0 }
    Behaviours:
      body:
        Type: cube gizmo
        Properties:
          Size: !vec { X: 0.6, Y: 3 }
          IsWire: false
          Colour: !colour yellow

  camera:
    Tags: [ camera ]
    Position: !var camera position
    Behaviours:
      camera:
        Type: camera
        Properties:
          View: "orthographic"
          Size: 5
          DefaultBlend: 0.5

  camera rig:
    Position: !vec { X: 0, Y: 0, Z: -10 }
    Behaviours:
      follow:
        Type: camera follow
        Properties:
          Target: { Tag: player }
          Mode: "2d"
          Priority: 10
          Lens: 5
          Damping: 0.6
          DeadZone: 0.1
          CameraDistance: 10
          ScreenOffset: !vec { X: 0, Y: 0 }
