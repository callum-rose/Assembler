Game:
  Title: UI Showcase
  Description: |
    Shows off the composable uGUI UI system. A green player cube (WASD) collects
    cyan orbs that spawn around the field; each orb adds points to a live score.

    The UI is the star and is built entirely from composable blocks declared in
    this descriptor:
      - a `ui canvas` root + a vertical `ui container` that auto-lays-out the HUD
        responsively (no hand-placed coordinates);
      - a `text label` bound to the `score` variable via a localised template, so
        it updates live as you play;
      - a `ui slider` whose `value` output is written into the `points per pickup`
        variable, so dragging it changes how many points each orb is worth — and a
        second label reflects the current value live;
      - a "Reset Score" `ui button` wired (through the listener system) to a
        variable setter;
      - a "Quit" `ui button` whose only listener is `- !gameover`.

    The Quit button's `!gameover` listener also satisfies the build-time
    requirement that every game have a way to end.

World:
  Dimensionality: 2
  BackgroundColor: "#101018"

Physics:
  Gravity: !vec { X: 0, Y: 0 }

Constants:
  player colour: !colour { R: 0.3, G: 0.85, B: 0.4, A: 1 }
  orb colour: !colour cyan

  player size: !vec { X: 0.6, Y: 0.6, Z: 0.6 }
  orb radius: 0.35

  # Per-frame movement steps. Left/down are derived by negating these (see the
  # `negate` expression), so each axis has a single source of truth.
  step right: !vec { X: 0.01, Y: 0, Z: 0 }
  step up: !vec { X: 0, Y: 0.01, Z: 0 }

  spawn interval: 1.2

  start score: 0.0
  start points: 1.0

  camera position: !vec { X: 0, Y: 0, Z: -10 }
  camera view: "orthographic"
  camera size: 5

Variables:
  # Seeded from decimal constants so they are float-typed (written by float setters).
  score: !var start score
  points per pickup: !var start points

Expressions:
  negate:
    ArgumentTypes: [ vector ]
    ArgumentNames: [ v ]
    ReturnType: vector
    RegisterTypes: [ UnityEngine.Vector3 ]
    Expression: "return new Vector3(-v.x, -v.y, -v.z);"
Localisation:
  DefaultLocale: en
  Locales:
    en:
      hud.title: "UI Showcase"
      hud.instructions: "WASD to move - collect the cyan orbs"
      hud.score: "Score: {0}"
      hud.points: "Points per orb: {0}"
      btn.reset: "Reset Score"
      btn.quit: "Quit"

Templates:
  # A collectable orb. Detects the player overlapping it, awards points, and
  # destroys itself. Needs only a trigger collider; the player carries the
  # rigidbody that makes the trigger event fire.
  orb_template:
    Tags: [ orb ]
    Behaviours:
      body:
        Type: sphere gizmo
        Properties:
          Radius: !var orb radius
          IsWire: false
          Colour: !var orb colour
      collider:
        Type: box collider
        Properties:
          Size: !vec { X: 0.7, Y: 0.7, Z: 0.7 }
          IsTrigger: true
      collect:
        Type: trigger enter trigger
        Properties:
          TagsToDetect: [ player ]
        Listeners:
          - EntityId: scorer
            BehaviourId: add point
          - BehaviourId: remove self
      remove self:
        Type: destroy

Controls:
  Actions:
    left:   { Type: button, Phase: hold }
    right:  { Type: button, Phase: hold }
    up:     { Type: button, Phase: hold }
    down:   { Type: button, Phase: hold }
    quit:   { Type: button, Phase: down }

  Bindings:
    desktop:
      left:   [ "<Keyboard>/a" ]
      right:  [ "<Keyboard>/d" ]
      up:     [ "<Keyboard>/w" ]
      down:   [ "<Keyboard>/s" ]
      quit:   [ "<Keyboard>/q" ]
    mobile:
      left:   [ "<Gamepad>/dpad/left" ]
      right:  [ "<Gamepad>/dpad/right" ]
      up:     [ "<Gamepad>/dpad/up" ]
      down:   [ "<Gamepad>/dpad/down" ]
      quit:   [ "<Gamepad>/start" ]

  OnScreen:
    - { Type: button, Action: up,    Label: "▲", Anchor: lower-left,  Offset: { X: 305, Y: 450 }, Size: { X: 200, Y: 200 } }
    - { Type: button, Action: down,  Label: "▼", Anchor: lower-left,  Offset: { X: 305, Y: 20 },  Size: { X: 200, Y: 200 } }
    - { Type: button, Action: left,  Label: "◀", Anchor: lower-left,  Offset: { X: 80,  Y: 235 }, Size: { X: 200, Y: 200 } }
    - { Type: button, Action: right, Label: "▶", Anchor: lower-left,  Offset: { X: 530, Y: 235 }, Size: { X: 200, Y: 200 } }
    - { Type: button, Action: quit,  Label: "Quit", Anchor: upper-right, Offset: { X: 120, Y: 120 }, Size: { X: 180, Y: 180 } }

Entities:
  controls:
    Behaviours:
      quit:
        Type: input action
        Properties: { Action: quit }
        Listeners: [ !gameover ]

  player:
    Tags: [ player ]
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      body:
        Type: cube gizmo
        Properties:
          Size: !var player size
          IsWire: false
          Colour: !var player colour
      collider:
        Type: box collider
        Properties:
          Size: !var player size
          IsTrigger: true
      rigidbody:
        Type: rigidbody
        Properties:
          UseGravity: false

      # --- WASD movement: each input-action trigger drives a translate while held. ---
      hold left:
        Type: input action
        Properties: { Action: left }
        Listeners: [ move left ]
      move left:
        Type: translate
        Properties:
          Displacement: !expr { Do: negate, With: { v: !var step right } }

      hold right:
        Type: input action
        Properties: { Action: right }
        Listeners: [ move right ]
      move right:
        Type: translate
        Properties:
          Displacement: !var step right

      hold up:
        Type: input action
        Properties: { Action: up }
        Listeners: [ move up ]
      move up:
        Type: translate
        Properties:
          Displacement: !var step up

      hold down:
        Type: input action
        Properties: { Action: down }
        Listeners: [ move down ]
      move down:
        Type: translate
        Properties:
          Displacement: !expr { Do: negate, With: { v: !var step up } }

  # Spawns an orb on start and then every `spawn interval` seconds.
  orb spawner:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      spawn first:
        Type: on start trigger
        Listeners: [ spawn orb ]
      tick:
        Type: interval trigger
        Properties:
          Interval: !var spawn interval
        Listeners: [ spawn orb ]
      spawn orb:
        Type: spawner
        Properties:
          TemplateId: orb_template
          Position: !expr { Do: 'new Vector3(RandomFloat(-4f, 4f), RandomFloat(-3f, 3f), 0)', RegisterTypes: [ UnityEngine.Vector3 ] }

  # Holds the score-mutating behaviours, targeted by the orbs and the UI buttons/slider.
  scorer:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      add point:
        Type: float variable setter
        Properties:
          VariableId: !var score
          Value: !expr
            Do: 'score + points'
            With:
              score: !var score
              points: !var points per pickup
      reset score:
        Type: float variable setter
        Properties:
          VariableId: !var score
          Value: !var start score
      # Driven by the slider: writes the slider's `value` output into the variable.
      set points:
        Type: float variable setter
        Properties:
          VariableId: !var points per pickup
          Value: !output value

  # ---- The UI tree: canvas -> vertical container -> labels, slider, buttons ----
  ui:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      canvas:
        Type: ui canvas
        Properties:
          MatchWidthOrHeight: 0.5
    Children:
      hud:
        Behaviours:
          layout:
            Type: ui container
            Properties:
              Direction: vertical
              Spacing: 12
              Padding: 24
              ChildAlignment: upper-left
              FitContent: false
        Children:
          title:
            Behaviours:
              label:
                Type: text label
                Properties:
                  Text: !text hud.title
                  FontSize: 36
                  PreferredWidth: 600
                  PreferredHeight: 56
          instructions:
            Behaviours:
              label:
                Type: text label
                Properties:
                  Text: !text hud.instructions
                  FontSize: 20
                  PreferredWidth: 600
                  PreferredHeight: 32
          score:
            Behaviours:
              label:
                Type: text label
                Properties:
                  Text: !text { Key: hud.score, Arguments: [ !var score ] }
                  FontSize: 30
                  PreferredWidth: 400
                  PreferredHeight: 44
          points:
            Behaviours:
              label:
                Type: text label
                Properties:
                  Text: !text { Key: hud.points, Arguments: [ !var points per pickup ] }
                  FontSize: 22
                  PreferredWidth: 400
                  PreferredHeight: 36
          points slider:
            Behaviours:
              slider:
                Type: ui slider
                Properties:
                  InitialValue: !var start points
                  MinValue: 1
                  MaxValue: 10
                  PreferredWidth: 320
                  PreferredHeight: 30
                Listeners:
                  - EntityId: scorer
                    BehaviourId: set points
          reset button:
            Behaviours:
              button:
                Type: ui button
                Properties:
                  Label: !text btn.reset
                  PreferredWidth: 240
                  PreferredHeight: 56
                Listeners:
                  - EntityId: scorer
                    BehaviourId: reset score
          quit button:
            Behaviours:
              button:
                Type: ui button
                Properties:
                  Label: !text btn.quit
                  PreferredWidth: 240
                  PreferredHeight: 56
                Listeners:
                  - !gameover

  camera:
    Position: !var camera position
    Behaviours:
      camera:
        Type: camera
        Properties:
          View: !var camera view
          Size: !var camera size
