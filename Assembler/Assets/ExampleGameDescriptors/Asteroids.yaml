Game:
  Title: Asteroids
  Description: >
    Classic Asteroids. A/D rotates the ship, W adds thrust in the facing direction
    (momentum persists), S brakes, Space fires a bullet. Destroy asteroids for
    points. Colliding with an asteroid costs a life. Reach 15 points to win;
    lose all 3 lives and it's game over.

World:
  Dimensionality: 2
  BackgroundColor: "#000010"

Physics:
  Gravity: !vec { X: 0, Y: 0 }

Constants:
  # Scoring / lives
  initial score: 0
  initial lives: 3
  score per asteroid: 1
  life cost: 1
  score to win: 15
  zero int: 0

  # Ship
  ship size: !vec { X: 0.45, Y: 0.45 }
  ship start position: !vec { X: 0, Y: 0 }
  ship initial facing: !vec { X: 0, Y: 1 }
  ship initial velocity: !vec { X: 0, Y: 0 }
  thrust impulse: 0.03
  turn deg: 1.0          # ship yaw per frame at full steer (matches the old A/D feel)
  brake velocity: !vec { X: 0, Y: 0 }

  # Bullet
  bullet size: !vec { X: 0.15, Y: 0.15 }
  bullet speed: 9.0
  bullet lifetime: 1.2

  # Asteroid
  asteroid radius: 0.45
  asteroid size: !vec { X: 0.9, Y: 0.9 }
  asteroid speed: 2.0
  asteroid lifetime: 6.0
  asteroid spawn interval: 1.2

  # Arena bounds (kill zone for ship straying off-screen handled by life loss via asteroid only)
  half arena: 7.5

  # Camera
  camera position: !vec { X: 0, Y: 0, Z: -10 }
  camera rotation: !vec { X: 0, Y: 0, Z: 0 }
  camera view: "orthographic"
  camera size: 7

Variables:
  score: !var initial score
  lives: !var initial lives
  is dead: false
  ship position: !var ship start position
  ship velocity: !var ship initial velocity
  ship facing: !var ship initial facing

# Flying is wired to abstract actions, not physical keys. `move` (vector2) carries
# steering on x and thrust on y; `fire`/`brake` are button presses. Desktop binds
# them to A/D/W/S + Space; mobile binds them to the on-screen joystick + buttons.
Controls:
  Actions:
    move:  { Type: value, ValueType: vector2 }   # x steers (A/D), y>0 thrusts (W)
    fire:  { Type: button, Phase: down }
    brake: { Type: button, Phase: down }

  Bindings:
    desktop:
      move:
        - Composite: 2DVector
          Up: "<Keyboard>/w"
          Down: "<Keyboard>/s"
          Left: "<Keyboard>/a"
          Right: "<Keyboard>/d"
      fire:  [ "<Keyboard>/space" ]
      brake: [ "<Keyboard>/s" ]
    mobile:
      move:  [ "<Gamepad>/leftStick" ]   # joystick → a stick control
      fire:  [ "<Gamepad>/buttonSouth" ]
      brake: [ "<Gamepad>/buttonEast" ]

  OnScreen:
    - Type: joystick
      Action: move
      Anchor: lower-left
      Offset: { X: 260, Y: 260 }
      Size:   { X: 360, Y: 360 }
    - Type: button
      Action: fire
      Label: Fire
      Anchor: lower-right
      Offset: { X: 210, Y: 210 }
      Size:   { X: 230, Y: 230 }
    - Type: button
      Action: brake
      Label: Brake
      Anchor: lower-right
      Offset: { X: 210, Y: 470 }
      Size:   { X: 200, Y: 200 }

Templates:
  bullet_template:
    Tags: [ bullet ]
    Variables:
      bullet velocity: !parameter initial_velocity
    Behaviours:
      gizmo:
        Type: cube gizmo
        Properties:
          Size: !var bullet size
          IsWire: false
          Colour: !colour yellow
      collider:
        Type: box collider
        Properties:
          Size: !var bullet size
          IsTrigger: true
      rigidbody:
        Type: rigidbody
        Properties:
          UseGravity: false
      move:
        Type: velocity
        Properties:
          Velocity: !var bullet velocity
      asteroid hit:
        Type: trigger enter trigger
        Properties:
          TagsToDetect: [ asteroid ]
        Listeners: [ self destruct ]
      lifetime:
        Type: timer trigger
        Properties:
          Delay: !var bullet lifetime
        Listeners: [ self destruct ]
      self destruct:
        Type: destroy

  asteroid_template:
    Tags: [ asteroid ]
    Variables:
      asteroid velocity: !parameter initial_velocity
    Behaviours:
      gizmo:
        Type: sphere gizmo
        Properties:
          Radius: !var asteroid radius
          Colour: !colour grey
      collider:
        Type: sphere collider
        Properties:
          Radius: !var asteroid radius
          IsTrigger: true
      rigidbody:
        Type: rigidbody
        Properties:
          UseGravity: false
      move:
        Type: velocity
        Properties:
          Velocity: !var asteroid velocity
      bullet hit:
        Type: trigger enter trigger
        Properties:
          TagsToDetect: [ bullet ]
        Listeners:
          - EntityId: score tracker
            BehaviourId: increment score
          - BehaviourId: self destruct
      ship hit:
        Type: trigger enter trigger
        Properties:
          TagsToDetect: [ ship ]
        Listeners:
          - EntityId: life tracker
            BehaviourId: decrement lives
          - BehaviourId: self destruct
      lifetime:
        Type: timer trigger
        Properties:
          Delay: !var asteroid lifetime
        Listeners: [ self destruct ]
      self destruct:
        Type: destroy

  # A larger, darker asteroid variant. The spawner mixes it in with the
  # default asteroid for visual variety (see "spawn asteroid").
  large_asteroid_template:
    Tags: [ asteroid ]
    Variables:
      asteroid velocity: !parameter initial_velocity
    Behaviours:
      gizmo:
        Type: sphere gizmo
        Properties:
          Radius: 0.8
          Colour: !colour { R: 0.35, G: 0.3, B: 0.28 }
      collider:
        Type: sphere collider
        Properties:
          Radius: 0.8
          IsTrigger: true
      rigidbody:
        Type: rigidbody
        Properties:
          UseGravity: false
      move:
        Type: velocity
        Properties:
          Velocity: !var asteroid velocity
      bullet hit:
        Type: trigger enter trigger
        Properties:
          TagsToDetect: [ bullet ]
        Listeners:
          - EntityId: score tracker
            BehaviourId: increment score
          - BehaviourId: self destruct
      ship hit:
        Type: trigger enter trigger
        Properties:
          TagsToDetect: [ ship ]
        Listeners:
          - EntityId: life tracker
            BehaviourId: decrement lives
          - BehaviourId: self destruct
      lifetime:
        Type: timer trigger
        Properties:
          Delay: !var asteroid lifetime
        Listeners: [ self destruct ]
      self destruct:
        Type: destroy

Entities:
  # Game-over poll: every frame the gate checks the end condition; when it
  # holds, the gate fires !gameover, which ends and unloads the game.
  game over:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      tick:
        Type: every frame trigger
        Listeners: [ gate ]
      gate:
        Type: condition gate
        Properties:
          Condition: !expr
            Do: 'arg0 >= arg1 || arg2'
            With:
              - !var score
              - !var score to win
              - !var is dead
        Listeners:
          - !gameover

  # --- Ship ---
  ship:
    Tags: [ ship ]
    Position: !var ship start position
    Behaviours:
      gizmo:
        Type: cube gizmo
        Properties:
          Size: !var ship size
          IsWire: false
          Colour: !colour green
      facing indicator:
        Type: sphere gizmo
        Properties:
          Radius: 0.12
          IsWire: false
          Colour: !colour yellow
      facing line:
        Type: line gizmo
        Properties:
          Start: !vec { X: 0, Y: 0 }
          End: !var ship facing
          Colour: !colour yellow
      collider:
        Type: box collider
        Properties:
          Size: !var ship size
          IsTrigger: true
      move:
        Type: velocity
        Properties:
          Velocity: !var ship velocity

      # --- Per-frame position tracking (for bullet spawn position) ---
      tick:
        Type: every frame trigger
        Listeners: [ track position ]
      track position:
        Type: vector variable setter
        Properties:
          VariableId: !var ship position
          Value: !expr
            Do: 'IntegratePosition(arg0, arg1, arg2)'
            With:
              - !var ship position
              - !var ship velocity
              - !clock deltaTime

      # --- Steering + thrust: one analogue `move` action drives both. x steers
      #     (A/D or stick-x), y > 0 thrusts (W or stick-up). It fires every frame,
      #     so a neutral stick rotates by 0 and adds no thrust.
      move input:
        Type: input action
        Properties: { Action: move }
        Listeners: [ apply steer, apply thrust ]
      apply steer:
        Type: vector variable setter
        Properties:
          VariableId: !var ship facing
          Value: !expr
            Do: 'Rotate2D(arg0, -arg1 * arg2)'
            ArgumentTypes: [ vector, float, float ]
            ReturnType: vector
            With:
              - !var ship facing
              - !output x
              - !var turn deg
      apply thrust:
        Type: vector variable setter
        Properties:
          VariableId: !var ship velocity
          Value: !expr
            Do: 'AddVector(arg0, ScaleVector(arg1, arg2 * Max(arg3, 0f)))'
            ArgumentTypes: [ vector, vector, float, float ]
            ReturnType: vector
            With:
              - !var ship velocity
              - !var ship facing
              - !var thrust impulse
              - !output y

      # --- Brake (S / on-screen Brake button) ---
      brake key:
        Type: input action
        Properties: { Action: brake }
        Listeners: [ brake ]
      brake:
        Type: vector variable setter
        Properties:
          VariableId: !var ship velocity
          Value: !var brake velocity

      # --- Fire (Space / on-screen Fire button) ---
      fire key:
        Type: input action
        Properties: { Action: fire }
        Listeners: [ fire bullet ]
      fire bullet:
        Type: spawner
        Properties:
          TemplateId: bullet_template
          Position: !var ship position
          Parameters:
            initial_velocity: !expr
              Do: 'ScaleVector(arg0, arg1)'
              ReturnType: vector
              With:
                - !var ship facing
                - !var bullet speed

  # --- Score tracker ---
  score tracker:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      increment score:
        Type: int variable setter
        Properties:
          VariableId: !var score
          Value: !expr
            Do: 'arg0 + arg1'
            With:
              - !var score
              - !var score per asteroid

  # --- Life tracker ---
  life tracker:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      decrement lives:
        Type: int variable setter
        Properties:
          VariableId: !var lives
          Value: !expr
            Do: 'arg0 - arg1'
            With:
              - !var lives
              - !var life cost
      death check:
        Type: condition gate
        Properties:
          Condition: !expr
            Do: 'arg0 <= arg1'
            With:
              - !var lives
              - !var zero int
        Listeners: [ set dead ]
      set dead:
        Type: bool variable setter
        Properties:
          VariableId: !var is dead
          Value: true

  # --- Asteroid spawner ---
  asteroid spawner:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      tick:
        Type: interval trigger
        Properties:
          Interval: !var asteroid spawn interval
        Listeners: [ spawn asteroid ]
      spawn asteroid:
        Type: spawner
        Properties:
          # One spawner now mixes asteroid variants for variety. 'random' (the
          # default) picks weighted by Weight; the large variant is rarer.
          Selection: random
          Templates:
            - asteroid_template                 # bare id ⇒ weight 1
            - Template: large_asteroid_template
              Weight: 0.4
          Position: !expr { Do: 'RandomOnCircle(6.8f)' }
          Parameters:
            initial_velocity: !expr
              Do: 'RandomOnCircle(arg0)'
              ReturnType: vector
              With:
                - !var asteroid speed

  # --- Camera ---
  camera:
    Tags: [ camera ]
    Position: !var camera position
    Rotation: !var camera rotation
    Behaviours:
      camera:
        Type: camera
        Properties:
          View: !var camera view
          Size: !var camera size

  # --- HUD ---
  score display:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      label:
        Type: text label
        Properties:
          Text: !expr
            Do: '"Score: " + arg0'
            With:
              - !var score
          FontSize: 28
          Rect:
            Anchor: top-left
            X: 20
            Y: 20
            Width: 200
            Height: 50

  lives display:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      label:
        Type: text label
        Properties:
          Text: !expr
            Do: '"Lives: " + arg0'
            With:
              - !var lives
          FontSize: 28
          Rect:
            Anchor: top-right
            X: -200
            Y: 20
            Width: 180
            Height: 50
