Game:
  Title: Entity Position Demo
  Description: |
    Demonstrates the `!entity { Id, Property }` YAML tag — a live wrapper around
    another entity's Transform that always returns the current frame's
    property (Position, Rotation, or Scale), never a stale value.

      * The `leader` cube moves left/right with A/D (and up/down with W/S).
      * Two followers track the leader by reading
        `!entity { Id: leader, Property: Position }` every frame and applying
        an offset.
      * The `follower above` is declared in YAML BEFORE the leader, proving
        that declaration order does not matter — the registry is populated
        for every entity before any behaviour resolves its properties.
      * The `follower below` is declared after, for symmetry.

    There is no `vector variable setter` writing the leader's position
    anywhere — followers read it directly from the transform, so they cannot
    lag behind regardless of behaviour execution order within a frame.

World:
  Dimensionality: 2
  BackgroundColor: "#101020"

Physics:
  Gravity: !vec { X: 0, Y: 0 }

Constants:
  leader speed: 4

  follower above offset y: 1.5
  follower below offset y: -1.5

  leader colour: !colour { R: 0.9, G: 0.7, B: 0.2, A: 1 }
  follower colour: !colour { R: 0.4, G: 0.7, B: 1.0, A: 1 }

  camera position: !vec { X: 0, Y: 0, Z: -10 }
  camera view: "orthographic"
  camera size: 5

Variables:
  # Leader movement state, written by the WASD key edges and integrated each
  # frame by the single `move` velocity behaviour (see issue #201).
  leader velocity: !vec { X: 0, Y: 0, Z: 0 }

Expressions:
  shift y:
    ArgumentTypes: [ vector, float ]
    ArgumentNames: [ pos, yoffset ]
    ReturnType: vector
    RegisterTypes: [ UnityEngine.Vector3 ]
    Expression: "return new Vector3(pos.x, pos.y + yoffset, pos.z);"

Entities:
  # Declared BEFORE `leader` on purpose: proves declaration order is irrelevant
  # for `!entity` reads. Property resolution happens after every
  # entity has registered its transform.
  follower above:
    Position: !vec { X: 0, Y: 1.5, Z: 0 }
    Behaviours:
      body:
        Type: cube gizmo
        Properties:
          Size: !vec { X: 0.6, Y: 0.6, Z: 0.6 }
          IsWire: false
          Colour: !var follower colour
      tick:
        Type: every frame trigger
        Listeners:
          - EntityId: follower above
            BehaviourId: track
      track:
        Type: position setter
        Properties:
          Position: !expr
            Do: shift y
            With:
              - !entity { Id: leader, Property: Position }
              - !var follower above offset y

  leader:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      body:
        Type: cube gizmo
        Properties:
          Size: !vec { X: 0.8, Y: 0.8, Z: 0.8 }
          IsWire: false
          Colour: !var leader colour

      # WASD-driven motion: a key press sets the shared `leader velocity` variable
      # and releasing it stops; the single `move` velocity behaviour integrates
      # that variable each frame. Targeting a `velocity` behaviour from a trigger
      # is a no-op — velocity already runs every frame — and is now a build error
      # (see issue #201).
      move:
        Type: velocity
        Properties:
          Velocity: !var leader velocity
      press left:
        Type: key down trigger
        Properties: { Key: "a" }
        Listeners:
          - EntityId: leader
            BehaviourId: go left
      release left:
        Type: key up trigger
        Properties: { Key: "a" }
        Listeners:
          - EntityId: leader
            BehaviourId: stop
      go left:
        Type: vector variable setter
        Properties:
          VariableId: !var leader velocity
          Value: !vec { X: -4, Y: 0, Z: 0 }
      press right:
        Type: key down trigger
        Properties: { Key: "d" }
        Listeners:
          - EntityId: leader
            BehaviourId: go right
      release right:
        Type: key up trigger
        Properties: { Key: "d" }
        Listeners:
          - EntityId: leader
            BehaviourId: stop
      go right:
        Type: vector variable setter
        Properties:
          VariableId: !var leader velocity
          Value: !vec { X: 4, Y: 0, Z: 0 }
      press up:
        Type: key down trigger
        Properties: { Key: "w" }
        Listeners:
          - EntityId: leader
            BehaviourId: go up
      release up:
        Type: key up trigger
        Properties: { Key: "w" }
        Listeners:
          - EntityId: leader
            BehaviourId: stop
      go up:
        Type: vector variable setter
        Properties:
          VariableId: !var leader velocity
          Value: !vec { X: 0, Y: 4, Z: 0 }
      press down:
        Type: key down trigger
        Properties: { Key: "s" }
        Listeners:
          - EntityId: leader
            BehaviourId: go down
      release down:
        Type: key up trigger
        Properties: { Key: "s" }
        Listeners:
          - EntityId: leader
            BehaviourId: stop
      go down:
        Type: vector variable setter
        Properties:
          VariableId: !var leader velocity
          Value: !vec { X: 0, Y: -4, Z: 0 }
      stop:
        Type: vector variable setter
        Properties:
          VariableId: !var leader velocity
          Value: !vec { X: 0, Y: 0, Z: 0 }

  follower below:
    Position: !vec { X: 0, Y: -1.5, Z: 0 }
    Behaviours:
      body:
        Type: cube gizmo
        Properties:
          Size: !vec { X: 0.6, Y: 0.6, Z: 0.6 }
          IsWire: false
          Colour: !var follower colour
      tick:
        Type: every frame trigger
        Listeners:
          - EntityId: follower below
            BehaviourId: track
      track:
        Type: position setter
        Properties:
          Position: !expr
            Do: shift y
            With:
              - !entity { Id: leader, Property: Position }
              - !var follower below offset y

  camera:
    Position: !var camera position
    Behaviours:
      camera:
        Type: camera
        Properties:
          View: !var camera view
          Size: !var camera size
