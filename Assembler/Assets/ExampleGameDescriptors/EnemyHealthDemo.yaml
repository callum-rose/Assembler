Game:
  Title: Enemy Health Demo
  Description: |
    Demonstrates per-entity dynamic variables. Each enemy spawns from the same
    template but owns its own `health` variable, seeded by a !parameter at
    spawn time. The player (the green square, moved with WASD) bumps into
    enemies to damage them. When an enemy's *own* health reaches zero it
    self-destructs. Try walking into each enemy a different number of times.

World:
  Dimensionality: 2
  BackgroundColor: "#101820"

Physics:
  Gravity: !vec { X: 0, Y: 0 }

Constants:
  player up key: "w"
  player down key: "s"
  player left key: "a"
  player right key: "d"
  player speed: 4
  damage per hit: 1
  zero: 0
  player size: !vec { X: 0.6, Y: 0.6 }
  enemy size: !vec { X: 0.8, Y: 0.8 }
  stopped: !vec { X: 0, Y: 0 }
  player up vel: !vec { X: 0, Y: 4 }
  player down vel: !vec { X: 0, Y: -4 }
  player left vel: !vec { X: -4, Y: 0 }
  player right vel: !vec { X: 4, Y: 0 }
  camera position: !vec { X: 0, Y: 0, Z: -10 }
  camera rotation: !vec { X: 0, Y: 0, Z: 0 }
  camera view: "orthographic"
  camera size: 5

Variables:
  enemies remaining: 3

Templates:
  enemy_template:
    Tags: [ enemy ]
    Variables:
      # Each spawned enemy gets its OWN `health`, seeded by the
      # `initial_health` parameter supplied at instantiation.
      health: !parameter initial_health
    Behaviours:
      gizmo:
        Type: cube gizmo
        Properties:
          Size: !var enemy size
          IsWire: false
          Colour: !colour red
      box collider:
        Type: box collider
        Properties:
          Size: !var enemy size
          IsTrigger: true
      player hit detector:
        Type: trigger enter trigger
        Properties:
          TagsToDetect: [ player ]
        Listeners:
          - EntityId: !parameter self_id
            BehaviourId: take damage
      take damage:
        Type: int variable setter
        # !var health resolves to THIS entity's `health`, not a global one,
        # because the per-entity scope shadows the global registry.
        Properties:
          VariableId: !var health
          Value: !expr
            ExpressionId: int sub
            Arguments:
              - !var health
              - !var damage per hit
      death check:
        Type: condition gate
        Properties:
          Condition: !expr
            ExpressionId: int less or equal
            Arguments:
              - !var health
              - !var zero
        Listeners:
          - EntityId: !parameter self_id
            BehaviourId: on death decrement counter
          - EntityId: !parameter self_id
            BehaviourId: self destruct
      on death decrement counter:
        Type: int variable setter
        Properties:
          VariableId: !var enemies remaining
          Value: !expr
            ExpressionId: int sub
            Arguments:
              - !var enemies remaining
              - !var damage per hit
      self destruct:
        Type: destroy

  player_template:
    Tags: [ player ]
    Behaviours:
      gizmo:
        Type: cube gizmo
        Properties:
          Size: !var player size
          IsWire: false
          Colour: !colour green
      box collider:
        Type: box collider
        Properties:
          Size: !var player size
          IsTrigger: true
      rigidbody:
        Type: rigidbody
        Properties:
          UseGravity: false
      # WASD movement: holding a key sets velocity in that direction.
      up hold:
        Type: key hold trigger
        Properties: { Key: !var player up key }
        Listeners:
          - EntityId: !parameter self_id
            BehaviourId: go up
      go up:
        Type: velocity
        Properties: { Velocity: !var player up vel }
      down hold:
        Type: key hold trigger
        Properties: { Key: !var player down key }
        Listeners:
          - EntityId: !parameter self_id
            BehaviourId: go down
      go down:
        Type: velocity
        Properties: { Velocity: !var player down vel }
      left hold:
        Type: key hold trigger
        Properties: { Key: !var player left key }
        Listeners:
          - EntityId: !parameter self_id
            BehaviourId: go left
      go left:
        Type: velocity
        Properties: { Velocity: !var player left vel }
      right hold:
        Type: key hold trigger
        Properties: { Key: !var player right key }
        Listeners:
          - EntityId: !parameter self_id
            BehaviourId: go right
      go right:
        Type: velocity
        Properties: { Velocity: !var player right vel }

Expressions:
  int sub:
    ArgumentTypes: [ int, int ]
    ArgumentNames: [ a, b ]
    ReturnType: int
    Expression: "a - b;"
  int less or equal:
    ArgumentTypes: [ int, int ]
    ArgumentNames: [ a, b ]
    ReturnType: bool
    Expression: "a <= b;"
  int equal zero:
    ArgumentTypes: [ int ]
    ArgumentNames: [ a ]
    ReturnType: bool
    Expression: "a <= 0;"
  format remaining:
    ArgumentTypes: [ int ]
    ArgumentNames: [ n ]
    ReturnType: string
    Expression: "\"Enemies remaining: \" + n;"

Entities:
  player:
    Template: { Id: player_template }
    Position: !vec { X: 0, Y: 0 }

  # Three enemies sharing one template, but each gets its OWN `health`.
  weak enemy:
    Template:
      Id: enemy_template
      Parameters:
        initial_health: 1
    Position: !vec { X: -3, Y: 2 }
  medium enemy:
    Template:
      Id: enemy_template
      Parameters:
        initial_health: 2
    Position: !vec { X: 0, Y: 2 }
  tough enemy:
    Template:
      Id: enemy_template
      Parameters:
        initial_health: 3
    Position: !vec { X: 3, Y: 2 }

  camera:
    Tags: [ camera ]
    Position: !var camera position
    Rotation: !var camera rotation
    Behaviours:
      camera:
        Type: camera
        Properties:
          View: !var camera view
          Size: !var camera size

  remaining display:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      label:
        Type: text label
        Properties:
          Text: !expr
            ExpressionId: format remaining
            Arguments:
              - !var enemies remaining
          FontSize: 28
          Rect:
            Anchor: top-left
            X: 20
            Y: 20
            Width: 300
            Height: 50

GameOverCondition: !expr
  ExpressionId: int equal zero
  Arguments:
    - !var enemies remaining
