Game:
  Title: Enemy Health Demo
  Description: |
    Demonstrates per-entity dynamic variables. Each enemy spawns from the same
    template but owns its own `health` variable, seeded by a !parameter at
    spawn time. The player (the green square, moved with WASD) bumps into
    enemies to damage them. When an enemy's *own* health reaches zero it
    self-destructs. Try walking into each enemy a different number of times.

World:
  Dimensionality: 2
  BackgroundColor: "#101820"

Physics:
  Gravity: !vec { X: 0, Y: 0 }

Constants:
  player speed: 4
  damage per hit: 1
  zero: 0
  player size: !vec { X: 0.6, Y: 0.6 }
  enemy size: !vec { X: 0.8, Y: 0.8 }
  stopped: !vec { X: 0, Y: 0 }
  player up vel: !vec { X: 0, Y: 4 }
  player down vel: !vec { X: 0, Y: -4 }
  player left vel: !vec { X: -4, Y: 0 }
  player right vel: !vec { X: 4, Y: 0 }
  camera position: !vec { X: 0, Y: 0, Z: -10 }
  camera rotation: !vec { X: 0, Y: 0, Z: 0 }
  camera view: "orthographic"
  camera size: 5

Variables:
  enemies remaining: 3

Localisation:
  DefaultLocale: en
  Locales:
    en:
      hud.remaining: "Enemies remaining: {0}"

Templates:
  enemy_template:
    Tags: [ enemy ]
    Variables:
      # Each spawned enemy gets its OWN `health`, seeded by the
      # `initial_health` parameter supplied at instantiation.
      health: !parameter initial_health
    Behaviours:
      gizmo:
        Type: cube gizmo
        Properties:
          Size: !var enemy size
          IsWire: false
          Colour: !colour red
      box collider:
        Type: box collider
        Properties:
          Size: !var enemy size
          IsTrigger: true
      player hit detector:
        Type: trigger enter trigger
        Properties:
          TagsToDetect: [ player ]
        Listeners: [ take damage ]
      take damage:
        Type: int variable setter
        # !var health resolves to THIS entity's `health`, not a global one,
        # because the per-entity scope shadows the global registry.
        Properties:
          VariableId: !var health
          Value: !expr
            Do: intSub
            With:
              a: !var health
              b: !var damage per hit
      death check:
        Type: condition gate
        Properties:
          Condition: !expr
            Do: 'health <= zero'
            ArgumentTypes: [ int, int ]
            With:
              health: !var health
              zero: !var zero
        Listeners:
          - on death decrement counter
          - self destruct
      on death decrement counter:
        Type: int variable setter
        Properties:
          VariableId: !var enemies remaining
          Value: !expr
            Do: intSub
            With:
              a: !var enemies remaining
              b: !var damage per hit
      self destruct:
        Type: destroy

  player_template:
    Tags: [ player ]
    Variables:
      # Movement state, mutated by the WASD key edges and integrated each frame
      # by the single `move` velocity behaviour below (see issue #201).
      velocity: !var stopped
    Behaviours:
      gizmo:
        Type: cube gizmo
        Properties:
          Size: !var player size
          IsWire: false
          Colour: !colour green
      box collider:
        Type: box collider
        Properties:
          Size: !var player size
          IsTrigger: true
      rigidbody:
        Type: rigidbody
        Properties:
          UseGravity: false
      # WASD movement: a key press sets the shared `velocity` variable to that
      # direction and releasing it resets to stopped; the single `move` velocity
      # behaviour integrates that variable each frame. Wiring a key trigger
      # straight at a `velocity` behaviour is a no-op — velocity already runs every
      # frame — and is now a build error (see issue #201).
      move:
        Type: velocity
        Properties: { Velocity: !var velocity }
      up press:
        Type: input action
        Properties: { Action: up }
        Listeners: [ go up ]
      up release:
        Type: input action
        Properties: { Action: up-release }
        Listeners: [ stop ]
      go up:
        Type: vector variable setter
        Properties:
          VariableId: !var velocity
          Value: !var player up vel
      down press:
        Type: input action
        Properties: { Action: down }
        Listeners: [ go down ]
      down release:
        Type: input action
        Properties: { Action: down-release }
        Listeners: [ stop ]
      go down:
        Type: vector variable setter
        Properties:
          VariableId: !var velocity
          Value: !var player down vel
      left press:
        Type: input action
        Properties: { Action: left }
        Listeners: [ go left ]
      left release:
        Type: input action
        Properties: { Action: left-release }
        Listeners: [ stop ]
      go left:
        Type: vector variable setter
        Properties:
          VariableId: !var velocity
          Value: !var player left vel
      right press:
        Type: input action
        Properties: { Action: right }
        Listeners: [ go right ]
      right release:
        Type: input action
        Properties: { Action: right-release }
        Listeners: [ stop ]
      go right:
        Type: vector variable setter
        Properties:
          VariableId: !var velocity
          Value: !var player right vel
      stop:
        Type: vector variable setter
        Properties:
          VariableId: !var velocity
          Value: !var stopped

Expressions:
  intSub:
    ArgumentTypes: [ int, int ]
    ArgumentNames: [ a, b ]
    ReturnType: int
    Expression: "a - b;"
# WASD movement as abstract actions: each direction is a button with both a
# press (down) and a release (up) action, replacing the old per-key triggers.
# Rebinding is now a binding change here, not a `player <dir> key` constant.
Controls:
  Actions:
    up:            { Type: button, Phase: down }
    up-release:    { Type: button, Phase: up }
    down:          { Type: button, Phase: down }
    down-release:  { Type: button, Phase: up }
    left:          { Type: button, Phase: down }
    left-release:  { Type: button, Phase: up }
    right:         { Type: button, Phase: down }
    right-release: { Type: button, Phase: up }
    quit:          { Type: button, Phase: down }

  Bindings:
    desktop:
      up:            [ "<Keyboard>/w" ]
      up-release:    [ "<Keyboard>/w" ]
      down:          [ "<Keyboard>/s" ]
      down-release:  [ "<Keyboard>/s" ]
      left:          [ "<Keyboard>/a" ]
      left-release:  [ "<Keyboard>/a" ]
      right:         [ "<Keyboard>/d" ]
      right-release: [ "<Keyboard>/d" ]
      quit:          [ "<Keyboard>/q" ]
    mobile:
      up:            [ "<Gamepad>/dpad/up" ]
      up-release:    [ "<Gamepad>/dpad/up" ]
      down:          [ "<Gamepad>/dpad/down" ]
      down-release:  [ "<Gamepad>/dpad/down" ]
      left:          [ "<Gamepad>/dpad/left" ]
      left-release:  [ "<Gamepad>/dpad/left" ]
      right:         [ "<Gamepad>/dpad/right" ]
      right-release: [ "<Gamepad>/dpad/right" ]
      quit:          [ "<Gamepad>/start" ]

  OnScreen:
    - { Type: button, Action: up,    Label: "▲", Anchor: lower-left, Offset: { X: 305, Y: 450 }, Size: { X: 200, Y: 200 } }
    - { Type: button, Action: down,  Label: "▼", Anchor: lower-left, Offset: { X: 305, Y: 20 },  Size: { X: 200, Y: 200 } }
    - { Type: button, Action: left,  Label: "◀", Anchor: lower-left, Offset: { X: 80, Y: 235 },  Size: { X: 200, Y: 200 } }
    - { Type: button, Action: right, Label: "▶", Anchor: lower-left, Offset: { X: 530, Y: 235 }, Size: { X: 200, Y: 200 } }
    - { Type: button, Action: quit,  Label: "Quit",  Anchor: upper-right, Offset: { X: 120, Y: 120 }, Size: { X: 180, Y: 180 } }

Entities:
  controls:
    Behaviours:
      quit:
        Type: input action
        Properties: { Action: quit }
        Listeners: [ !gameover ]

  # Game-over poll: every frame the gate checks the end condition; when it
  # holds, the gate fires !gameover, which ends and unloads the game.
  game over:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      tick:
        Type: every frame trigger
        Listeners: [ gate ]
      gate:
        Type: condition gate
        Properties:
          Condition: !expr
            Do: 'enemies_remaining <= 0'
            With:
              enemies_remaining: !var enemies remaining
        Listeners:
          - !gameover

  player:
    Template: { Id: player_template }
    Position: !vec { X: 0, Y: 0 }

  # Three enemies sharing one template, but each gets its OWN `health`.
  weak enemy:
    Template:
      Id: enemy_template
      Parameters:
        initial_health: 1
    Position: !vec { X: -3, Y: 2 }
  medium enemy:
    Template:
      Id: enemy_template
      Parameters:
        initial_health: 2
    Position: !vec { X: 0, Y: 2 }
  tough enemy:
    Template:
      Id: enemy_template
      Parameters:
        initial_health: 3
    Position: !vec { X: 3, Y: 2 }

  camera:
    Tags: [ camera ]
    Position: !var camera position
    Rotation: !var camera rotation
    Behaviours:
      camera:
        Type: camera
        Properties:
          View: !var camera view
          Size: !var camera size

  # HUD: a ui canvas roots the tree; a vertical ui container auto-lays-out its
  # child labels. The label's Text is re-read each frame, so binding it to a
  # localised template that reads `enemies remaining` shows the live count.
  ui:
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      canvas:
        Type: ui canvas
        Properties:
          MatchWidthOrHeight: 0.5
    Children:
      hud:
        Behaviours:
          layout:
            Type: ui container
            Properties:
              Direction: vertical
              Spacing: 12
              Padding: 24
              ChildAlignment: upper-left
              FitContent: false
        Children:
          remaining:
            Behaviours:
              label:
                Type: text label
                Properties:
                  Text: !text { Key: hud.remaining, Arguments: [ !var enemies remaining ] }
                  FontSize: 28
                  PreferredWidth: 400
                  PreferredHeight: 44
