Game:
  Title: Simple Pong Game
  Description: A basic implementation of the classic Pong game with two paddles and a ball.

World:
  Dimensionality: 2
  BackgroundColor: "#000000"

Physics:
  Gravity: !vec { X: 0, Y: 0 }
  
Assets:
  - Id: square
    Type: sprite
    Source: resources
    Path: Textures/white_box
  - Id: circle
    Type: sprite
    Source: resources
    Path: Textures/white_circle
    
Constants:
  - Id: initial score
    Value: 0
  - Id: left paddle initial position
    Value: !vec { X: -5, Y: 0 }
  - Id: right paddle initial position
    Value: !vec { X: 5, Y: 0 }
  - Id: paddle up speed
    Value: 2
  - Id: paddle down speed
    Value: -2
  - Id: left paddle up key
    Value: "w"
  - Id: left paddle down key
    Value: "s"
  - Id: right paddle up key
    Value: "up"
  - Id: right paddle down key
    Value: "down"
  - Id: upper wall position
    Value: !vec { X: 0, Y: 3 }
  - Id: lower wall position
    Value: !vec { X: 0, Y: -3 }
  - Id: left goal position
    Value: !vec { X: -6, Y: 0 }
  - Id: right goal position
    Value: !vec { X: 6, Y: 0 }
  - Id: goal size
    Value: !vec { X: 0.2, Y: 6 }
  - Id: wall width
    Value: 12.2
  - Id: wall height
    Value: 0.2
  - Id: paddle height
    Value: 1
  - Id: paddle width
    Value: 0.2
  - Id: ball radius
    Value: 0.2
  - Id: score per goal
    Value: 1
  - Id: score to win
    Value: 5
  - Id: camera position
    Value: !vec { X: 0, Y: 0, Z: -10 }
  - Id: camera rotation
    Value: !vec { X: 0, Y: 0, Z: 0 }
  - Id: camera view
    Value: "orthographic"
  - Id: camera size
    Value: 4

Variables:
  - Id: left score
    Value: !const initial score
  - Id: right score
    Value: !const initial score
  - Id: ball velocity
    Value: !vec { X: 1, Y: 1 }

Templates:
  - Id: paddle_template
    Behaviours:
      - Type: sprite
        Id: sprite
        Properties:
          Sprite: !asset square
          Size: !vec
            X: !const paddle width
            Y: !const paddle height
      - Type: box collider
        Id: box collider
        Properties:
          Size: !vec
            X: !const paddle width
            Y: !const paddle height
          IsTrigger: false
      - Type: key hold trigger
        Id: up key trigger
        Properties:
          Key: !parameter up_key
        Listeners:
          - EntityId: !parameter self_id
            BehaviourId: move up
      - Type: velocity
        Id: move up
        Properties:
          Velocity: !vec
            X: 0
            Y: !const paddle up speed
      - Type: key hold trigger
        Id: down key trigger
        Properties:
          Key: !parameter down_key
        Listeners:
          - EntityId: !parameter self_id
            BehaviourId: move down
      - Type: velocity
        Id: move down
        Properties:
          Velocity: !vec
            X: 0
            Y: !const paddle down speed
  - Id: wall_template
    Tags:
      - wall
    Behaviours:
      - Type: sprite
        Id: sprite
        Properties:
          Sprite: !asset square
          Size: !vec
            X: !const wall width
            Y: !const wall height
      - Type: box collider
        Id: box collider
        Properties:
          Size: !vec
            X: !const wall width
            Y: !const wall height
  - Id: goal_template
    Tags:
      - goal
    Behaviours:
      - Type: box collider
        Id: box collider
        Properties:
          Size: !const goal size
          IsTrigger: true
      - Type: trigger enter trigger
        Id: goal trigger
        Properties:
          TagsToDetect:
            - ball
        Listeners:
          - EntityId: !parameter self_id
            BehaviourId: score incrementer
      - Type: int variable setter
        Id: score incrementer
        Properties:
          VariableId: !parameter score_var
          Value: !expr
            ExpressionId: int add
            Arguments:
              - !parameter score_var
              - !const score per goal
  - Id: ball_template
    Tags:
      - ball
    Behaviours:
      - Type: sprite
        Id: sprite
        Properties:
          Sprite: !asset circle
          Size: !vec
            X: !const ball radius
            Y: !const ball radius
      - Type: sphere collider
        Id: sphere collider
        Properties:
          Radius: !const ball radius
      - Type: rigidbody
        Id: rigidbody
        Properties:
          UseGravity: false
      - Type: velocity
        Id: velocity
        Properties:
          Velocity: !var ball velocity
      - Type: collision enter trigger
        Id: paddle collision trigger
        Properties:
          TagsToDetect:
            - left paddle
            - right paddle
        Listeners:
          - EntityId: !parameter self_id
            BehaviourId: paddle bounce velocity setter
      - Type: vector variable setter
        Id: paddle bounce velocity setter
        Properties:
          VariableId: !var ball velocity
          Value: !expr
            ExpressionId: vec multiply
            Arguments:
              - !var ball velocity
              - !vec { X: -1, Y: 1 }
      - Type: collision enter trigger
        Id: wall collision trigger
        Properties:
          TagsToDetect:
            - wall
        Listeners:
          - EntityId: !parameter self_id
            BehaviourId: wall bounce velocity setter
      - Type: vector variable setter
        Id: wall bounce velocity setter
        Properties:
          VariableId: !var ball velocity
          Value: !expr
            ExpressionId: vec multiply
            Arguments:
              - !var ball velocity
              - !vec { X: 1, Y: -1 }
      - Type: trigger enter trigger
        Id: goal detector
        Properties:
          TagsToDetect:
            - goal
        Listeners:
          - EntityId: !parameter self_id
            BehaviourId: self destructor
          - EntityId: ball spawner
            BehaviourId: spawn ball
      - Type: destroy
        Id: self destructor

Expressions:
  - Id: vec multiply
    ArgumentTypes: [ vector, vector ]
    ArgumentNames: [ a, b ]
    ReturnType: vector
    Expression: "new UnityEngine.Vector3(a.x * b.x, a.y * b.y, a.z * b.z);"
  - Id: int add
    ArgumentTypes: [ int, int ]
    ArgumentNames: [ a, b ]
    ReturnType: int
    Expression: "a + b;"
  - Id: int greater or equal
    ArgumentTypes: [ int, int ]
    ArgumentNames: [ a, b ]
    ReturnType: bool
    Expression: "a >= b;"
  - Id: random ball initial position
    ReturnType: vector
    Expression: "new UnityEngine.Vector3(0, UnityEngine.Random.Range(-2f, 2f), 0);"
  - Id: is game over
    ArgumentTypes: [ int, int, int ]
    ArgumentNames: [ a, b, w ]
    ReturnType: bool
    Expression: "a >= w || b >= w;"

Entities:
  - Id: left paddle
    Template:
      Id: paddle_template
      Parameters:
        up_key: !const left paddle up key
        down_key: !const left paddle down key
    Tags: [ left paddle ]
    Position: !const left paddle initial position
  - Id: right paddle
    Template:
      Id: paddle_template
      Parameters:
        up_key: !const right paddle up key
        down_key: !const right paddle down key
    Tags: [ right paddle ]
    Position: !const right paddle initial position
  - Id: upper wall
    Template: { Id: wall_template }
    Position: !const upper wall position
  - Id: lower wall
    Template: { Id: wall_template }
    Position: !const lower wall position
  - Id: left goal
    Template:
      Id: goal_template
      Parameters:
        score_var: !var right score
    Position: !const left goal position
  - Id: right goal
    Template:
      Id: goal_template
      Parameters:
        score_var: !var left score
    Position: !const right goal position
  - Id: camera
    Tags:
      - camera
    Position: !const camera position
    Rotation: !const camera rotation
    Behaviours:
      - Type: camera
        Id: camera
        Properties:
          View: !const camera view
          Size: !const camera size
  - Id: win condition checker
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      - Type: condition trigger
        Id: left score win condition trigger
        Properties:
          Condition: !expr
            ExpressionId: int greater or equal
            Arguments:
              - !var left score
              - !const score to win
      - Type: condition trigger
        Id: right score win condition trigger
        Properties:
          Condition: !expr
            ExpressionId: int greater or equal
            Arguments:
              - !var right score
              - !const score to win
  - Id: ball spawner
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      - Type: on start trigger
        Id: initial spawn trigger
        Listeners:
          - EntityId: ball spawner
            BehaviourId: spawn ball
      - Type: spawner
        Id: spawn ball
        Properties:
          TemplateId: ball_template
          Position: !expr { ExpressionId: random ball initial position }

GameOverCondition: !expr
  ExpressionId: is game over
  Arguments:
    - !var left score
    - !var right score
    - !const score to win
