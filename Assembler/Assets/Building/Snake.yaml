Game:
  Title: Snake
  Description: >
    Classic Snake. Use WASD to change direction. The snake moves one step every
    interval. Eat food to grow and score points. Hit a wall or yourself and it's
    game over. Reach 10 points to win.

World:
  Dimensionality: 2
  BackgroundColor: "#000000"

Physics:
  Gravity: !vec { X: 0, Y: 0 }

Constants:
  # Scoring
  - Id: initial score
    Value: 0
  - Id: score per food
    Value: 1
  - Id: score to win
    Value: 10

  # Grid / movement
  - Id: cell size
    Value: 0.6
  - Id: step interval
    Value: 0.15

  # Directions (one cell per step)
  - Id: dir up
    Value: !vec { X: 0, Y: 0.6 }
  - Id: dir down
    Value: !vec { X: 0, Y: -0.6 }
  - Id: dir left
    Value: !vec { X: -0.6, Y: 0 }
  - Id: dir right
    Value: !vec { X: 0.6, Y: 0 }

  # Starting state
  - Id: head start position
    Value: !vec { X: 0, Y: 0 }
  - Id: initial direction
    Value: !vec { X: 0.6, Y: 0 }

  # Sizes
  - Id: head size
    Value: !vec { X: 0.55, Y: 0.55 }
  - Id: segment size
    Value: !vec { X: 0.55, Y: 0.55 }
  - Id: food size
    Value: !vec { X: 0.5, Y: 0.5 }
  - Id: horizontal wall size
    Value: !vec { X: 15.6, Y: 0.6 }
  - Id: vertical wall size
    Value: !vec { X: 0.6, Y: 15.6 }

  # Wall positions
  - Id: top wall position
    Value: !vec { X: 0, Y: 7.5 }
  - Id: bottom wall position
    Value: !vec { X: 0, Y: -7.5 }
  - Id: left wall position
    Value: !vec { X: -7.5, Y: 0 }
  - Id: right wall position
    Value: !vec { X: 7.5, Y: 0 }

  # Offscreen dump
  - Id: food offscreen
    Value: !vec { X: 999, Y: 999 }

  # Camera
  - Id: camera position
    Value: !vec { X: 0, Y: 0, Z: -10 }
  - Id: camera rotation
    Value: !vec { X: 0, Y: 0, Z: 0 }

Variables:
  - Id: score
    Value: !const initial score
  - Id: direction
    Value: !const initial direction
  - Id: is dead
    Value: false

Expressions:
  - Id: int add
    ArgumentTypes: [ int, int ]
    ArgumentNames: [ a, b ]
    ReturnType: int
    Expression: "a + b;"

  - Id: int greater or equal
    ArgumentTypes: [ int, int ]
    ArgumentNames: [ a, b ]
    ReturnType: bool
    Expression: "a >= b;"

  - Id: is game over
    ArgumentTypes: [ int, int, bool ]
    ArgumentNames: [ score, target, dead ]
    ReturnType: bool
    Expression: "score >= target || dead;"

  # Returns a random food position snapped to the cell grid, within the arena bounds
  - Id: next food position
    ReturnType: vector
    Expression: >
      float halfArena = 6.6f;
      float cell = 0.6f;
      float x = UnityEngine.Mathf.Round(UnityEngine.Random.Range(-halfArena, halfArena) / cell) * cell;
      float y = UnityEngine.Mathf.Round(UnityEngine.Random.Range(-halfArena, halfArena) / cell) * cell;
      return new UnityEngine.Vector3(x, y, 0f);

  - Id: vec add
    ArgumentTypes: [ vector, vector ]
    ArgumentNames: [ a, b ]
    ReturnType: vector
    Expression: "new UnityEngine.Vector3(a.x + b.x, a.y + b.y, a.z + b.z);"

Templates:
  - Id: h_wall_template
    Tags:
      - wall
    Behaviours:
      - Type: box collider
        Id: box collider
        Properties:
          Size: !const horizontal wall size
          IsTrigger: false

  - Id: v_wall_template
    Tags:
      - wall
    Behaviours:
      - Type: box collider
        Id: box collider
        Properties:
          Size: !const vertical wall size
          IsTrigger: false

  # Body segment — spawned at the head's position each step.
  # Has a timer trigger that destroys it after a delay, creating
  # the tail effect. The delay controls effective snake length:
  # delay = cell_size * num_segments * step_interval
  # Starting length ~5 segments = 5 * 0.15 = 0.75s
  - Id: segment_template
    Tags:
      - segment
    Behaviours:
      - Type: box collider
        Id: box collider
        Properties:
          Size: !const segment size
          IsTrigger: true
      - Type: timer trigger
        Id: lifetime timer
        Properties:
          Delay: 0.75
        Listeners:
          - EntityId: !parameter self_id
            BehaviourId: self destruct
      - Type: destroy
        Id: self destruct

  # Food — hides itself on contact, advances food index, spawns next food
  - Id: food_template
    Tags:
      - food
    Behaviours:
      - Type: box collider
        Id: box collider
        Properties:
          Size: !const food size
          IsTrigger: true
      - Type: trigger enter trigger
        Id: eaten trigger
        Properties:
          TagsToDetect:
            - head
        Listeners:
          - EntityId: !parameter self_id
            BehaviourId: hide self
          - EntityId: food manager
            BehaviourId: spawn next food
          - EntityId: score tracker
            BehaviourId: increment score
      - Type: position setter
        Id: hide self
        Properties:
          Position: !const food offscreen

Entities:
  # --- Walls ---
  - Id: top wall
    Template: { Id: h_wall_template }
    Position: !const top wall position

  - Id: bottom wall
    Template: { Id: h_wall_template }
    Position: !const bottom wall position

  - Id: left wall
    Template: { Id: v_wall_template }
    Position: !const left wall position

  - Id: right wall
    Template: { Id: v_wall_template }
    Position: !const right wall position

  # --- Snake Head ---
  - Id: snake head
    Tags:
      - head
    Position: !const head start position
    Behaviours:
      - Type: box collider
        Id: box collider
        Properties:
          Size: !const head size
          IsTrigger: false

      - Type: rigidbody
        Id: rigidbody
        Properties:
          UseGravity: false

      # Stepped movement: fires every interval
      - Type: interval trigger
        Id: step timer
        Properties:
          Interval: !const step interval
        Listeners:
          - EntityId: snake head
            BehaviourId: step move
          - EntityId: segment manager
            BehaviourId: spawn segment at head

      - Type: translate
        Id: step move
        Properties:
          Displacement: !var direction

      # Direction input — key down (one event per press, not continuous)
      - Type: key down trigger
        Id: up key
        Properties:
          Key: "w"
        Listeners:
          - EntityId: snake head
            BehaviourId: set dir up
      - Type: vector variable setter
        Id: set dir up
        Properties:
          VariableId: !var direction
          Value: !const dir up

      - Type: key down trigger
        Id: down key
        Properties:
          Key: "s"
        Listeners:
          - EntityId: snake head
            BehaviourId: set dir down
      - Type: vector variable setter
        Id: set dir down
        Properties:
          VariableId: !var direction
          Value: !const dir down

      - Type: key down trigger
        Id: left key
        Properties:
          Key: "a"
        Listeners:
          - EntityId: snake head
            BehaviourId: set dir left
      - Type: vector variable setter
        Id: set dir left
        Properties:
          VariableId: !var direction
          Value: !const dir left

      - Type: key down trigger
        Id: right key
        Properties:
          Key: "d"
        Listeners:
          - EntityId: snake head
            BehaviourId: set dir right
      - Type: vector variable setter
        Id: set dir right
        Properties:
          VariableId: !var direction
          Value: !const dir right

      # Death triggers — wall or self collision sets is dead = true
      - Type: collision enter trigger
        Id: wall hit
        Properties:
          TagsToDetect:
            - wall
        Listeners:
          - EntityId: game manager
            BehaviourId: set dead

      - Type: trigger enter trigger
        Id: self hit
        Properties:
          TagsToDetect:
            - segment
        Listeners:
          - EntityId: game manager
            BehaviourId: set dead

  # --- Segment Manager ---
  # Spawns a segment at the head's current position on each step tick.
  # The segment's own timer trigger destroys it after its lifetime elapses,
  # so the tail naturally shortens at the back as it grows at the front.
  - Id: segment manager
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      - Type: spawner
        Id: spawn segment at head
        Properties:
          TemplateId: segment_template
          Position: !vec { X: 0, Y: 0 }

  # --- Score Tracker ---
  - Id: score tracker
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      - Type: int variable setter
        Id: increment score
        Properties:
          VariableId: !var score
          Value: !expr
            ExpressionId: int add
            Arguments:
              - !var score
              - !const score per food

  # --- Food Manager ---
  # Spawns first food on start, then a new piece each time the current one is eaten.
  - Id: food manager
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      - Type: on start trigger
        Id: on start
        Listeners:
          - EntityId: food manager
            BehaviourId: spawn next food

      - Type: spawner
        Id: spawn next food
        Properties:
          TemplateId: food_template
          Position: !expr
            ExpressionId: next food position

  # --- Game Manager ---
  - Id: game manager
    Position: !vec { X: 0, Y: 0, Z: 0 }
    Behaviours:
      - Type: bool variable setter
        Id: set dead
        Properties:
          VariableId: !var is dead
          Value: true

      - Type: condition trigger
        Id: win condition trigger
        Properties:
          Condition: !expr
            ExpressionId: int greater or equal
            Arguments:
              - !var score
              - !const score to win

  # --- Camera ---
  - Id: camera
    Tags:
      - camera
    Position: !const camera position
    Rotation: !const camera rotation
    Behaviours:
      - Type: camera
        Id: camera
        Properties:
          View: "orthographic"
          Size: 10

GameOverCondition: !expr
  ExpressionId: is game over
  Arguments:
    - !var score
    - !const score to win
    - !var is dead