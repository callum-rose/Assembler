game:
  title: Simple Pong Game
  description: A basic implementation of the classic Pong game with two paddles and a ball.
world:
  dimensionality: 2
  background color: '#000000'
physics:
  gravity: &o1
    Val:
      x: &o0
        Val: 0
      y: *o0
      z: &o3 {}
constants:
- id: left initial score
  value: *o0
- id: right initial score
  value: *o0
- id: ball initial position
  value: *o1
- id: ball initial velocity
  value:
    Val:
      x: &o2
        Val: 1
      y: *o2
      z: *o3
- id: left paddle initial position
  value:
    Val:
      x:
        Val: -5
      y: *o0
      z: *o3
- id: right paddle initial position
  value:
    Val:
      x: &o7
        Val: 5
      y: *o0
      z: *o3
- id: paddle speed
  value: &o4
    Val: 0.2
- id: ball speed per second speed add
  value:
    Val: 0.05
- id: left paddle up key
  value:
    Val: w
- id: left paddle down key
  value:
    Val: s
- id: right paddle up key
  value:
    Val: up
- id: right paddle down key
  value:
    Val: down
- id: upper wall position
  value:
    Val:
      x: *o0
      y:
        Val: 3
      z: *o3
- id: lower wall position
  value:
    Val:
      x: *o0
      y:
        Val: -3
      z: *o3
- id: left goal position
  value:
    Val:
      x:
        Val: -6
      y: *o0
      z: *o3
- id: right goal position
  value:
    Val:
      x: &o5
        Val: 6
      y: *o0
      z: *o3
- id: left goal size
  value: &o6
    Val:
      x: *o4
      y: *o5
      z: *o3
- id: right goal size
  value: *o6
- id: paddle height
  value:
    Val: 1
- id: paddle width
  value: *o4
- id: ball size
  value: *o4
- id: score per goal
  value: *o2
- id: score to win
  value: *o7
- id: camera position
  value:
    Val:
      x: *o0
      y: *o0
      z:
        Val: -10
- id: camera rotation
  value:
    Val:
      x: *o0
      y: *o0
      z: *o0
- id: camera view
  value:
    Val: orthographic
- id: camera size
  value:
    Val: 10
variables:
- id: left score
  initial value:
    Ref: left initial score
- id: right score
  initial value:
    Ref: right initial score
- id: ball velocity
  initial value:
    Ref: ball initial velocity
expressions:
- id: ball and paddle velocity change
  type: vector
  expression: a * new Vector(-1, 1)
  arguments:
  - &o8
    Ref: ball velocity
- id: ball and wall velocity change
  type: vector
  expression: a * new Vector(1, -1)
  arguments:
  - *o8
- id: left score adder
  type: int
  expression: a + b
  arguments:
  - &o10
    Ref: left score
  - &o9
    Ref: score per goal
- id: right score adder
  type: int
  expression: a + b
  arguments:
  - &o11
    Ref: right score
  - *o9
- id: left player has won
  type: boolean
  expression: a >= b
  arguments:
  - *o10
  - &o12
    Ref: score to win
- id: right player has won
  type: boolean
  expression: a >= b
  arguments:
  - *o11
  - *o12
entities:
- id: left paddle
  tags:
  - left paddle
  position: left paddle initial position
  rotation: 
  behaviours:
  - type: box collider
    id: box collider
    properties:
      size:
        Val:
          x:
            Ref: paddle width
          y:
            Ref: paddle height
          z: *o3
      is trigger:
        Val: false
  - type: key hold trigger
    id: up key trigger
    properties:
      key:
        Val: left paddle up key
      listeners:
      - entity ref: left paddle
        behaviour ref: move up
  - type: translate
    id: move up
    properties:
      displacement:
        Val:
          x: *o0
          y:
            Ref: -(paddle speed)
          z: *o3
  - type: key hold trigger
    id: down key trigger
    properties:
      key: left paddle down key
      listeners:
      - entity ref: left paddle
        behaviour ref: move down
  - type: translate
    id: move down
    properties:
      displacement:
        x: 0
        y: paddle speed
- id: right paddle
  tags:
  - right paddle
  position: right paddle initial position
  rotation: 
  behaviours:
  - type: box collider
    id: box collider
    properties:
      size:
        x: paddle width
        y: paddle height
  - type: key hold trigger
    id: up key trigger
    properties:
      key: right paddle up key
      listeners:
      - entity ref: right paddle
        behaviour ref: move up
  - type: translate
    id: move up
    properties:
      displacement:
        x: 0
        y: -(paddle speed)
  - type: key hold trigger
    id: down key trigger
    properties:
      key: right paddle down key
      listeners:
      - entity ref: right paddle
        behaviour ref: move down
  - type: translate
    id: move down
    properties:
      displacement:
        x: 0
        y: paddle speed
- id: ball
  tags:
  - ball
  position: ball initial position
  rotation: 
  behaviours:
  - type: sphere collider
    id: sphere collider
    properties:
      size: ball size
  - type: rigidbody
    id: rigidbody
    properties:
      use gravity: false
  - type: velocity
    id: velocity
    properties:
      velocity variable ref: ball velocity
  - type: collision enter trigger
    id: paddle collision trigger
    properties:
      tags to detect:
      - left paddle
      - right paddle
      listeners:
      - entity ref: ball
        behaviour ref: paddle bounce velocity setter
  - type: vector variable setter
    id: paddle bounce velocity setter
    properties:
      variable to set ref: ball velocity
      expression ref: ball and paddle velocity change
  - type: collision enter trigger
    id: wall collision trigger
    properties:
      tags to detect:
      - wall
      listeners:
      - entity ref: ball
        behaviour ref: wall bounce velocity setter
  - type: vector variable setter
    id: wall bounce velocity setter
    properties:
      variable to set ref: ball velocity
      expression ref: ball and wall velocity change
  - type: position variable setter
    id: position resetter
    properties:
      variable to set ref: position
      value expression: ball initial position
- id: upper wall
  tags:
  - wall
  position: upper wall position
  rotation: 
  behaviours:
  - type: box collider
    id: box collider
    properties: {}
- id: lower wall
  tags:
  - wall
  position: lower wall position
  rotation: 
  behaviours:
  - type: box collider
    id: box collider
    properties: {}
- id: left goal
  tags:
  - goal
  position: left goal position
  rotation: 
  behaviours:
  - type: box collider
    id: box collider
    properties:
      size: left goal size
  - type: trigger enter trigger
    id: goal trigger
    properties:
      tags to detect:
      - ball
      listeners:
      - entity ref: left goal
        behaviour ref: right score incrementer
      - entity ref: ball
        behaviour ref: ball resetter
  - type: int variable setter
    id: right score incrementer
    properties:
      variable to set ref: right score
      expression ref: right score adder
  - type: position variable setter
    id: ball resetter
    properties:
      variable to set ref: position
      value expression: ball initial position
- id: right goal
  tags:
  - goal
  position: right goal position
  rotation: 
  behaviours:
  - type: box collider
    id: box collider
    properties:
      size: right goal size
  - type: trigger enter trigger
    id: goal trigger
    properties:
      tags to detect:
      - ball
      listeners:
      - entity ref: right goal
        behaviour ref: left score incrementer
      - entity ref: ball
        behaviour ref: ball resetter
  - type: int variable setter
    id: left score incrementer
    properties:
      variable to set ref: left score
      expression ref: left score adder
  - type: position variable setter
    id: ball resetter
    properties:
      variable to set ref: position
      value expression: ball initial position
- id: camera
  tags:
  - camera
  position: camera position
  rotation: camera rotation
  behaviours:
  - type: camera
    id: camera
    properties:
      view: camera view
      size: camera size
- id: win condition checker
  tags: 
  position: 
  rotation: 
  behaviours:
  - type: condition trigger
    id: left score win condition trigger
    properties:
      condition expression ref: left player has won
  - type: condition trigger
    id: right score win condition trigger
    properties:
      condition expression ref: right player has won
